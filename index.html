const BG='#07070f',S1='#111120',S2='#1a1a2e',BD='rgba(255,255,255,0.07)',TX='#e8e0d4',MU='#555570',AC='#ff3f5b',GD='#f0c060',LB='#00c030';
const CC={ugc:'#ff3f5b',pathe:'#f0c060',gaumont:'#4a9eff'};

// ═══════════ DONNÉES — chargées depuis /api/programme ═══════════
let FILMS = {};
let CINEMAS = [];
let dataLoaded = false;

async function loadProgramme(date) {
  const d = date || (typeof st !== 'undefined' ? st.date : null) || new Date().toISOString().split('T')[0];
  try {
    const res = await fetch('/api/programme?date=' + d);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    FILMS   = data.films   || {};
    CINEMAS = data.cinemas || [];
    dataLoaded = true;
    if (st.screen === 'home' || st.screen === 'cinemas' || st.screen === 'cinema-detail' || st.screen === 'film') render();
    if (st.screen === 'film' && st.film) loadGroupesFilm(st.film);
    console.log(`✅ Programme ${d}: ${Object.keys(FILMS).length} films, ${CINEMAS.length} cinémas`);
  } catch (e) {
    console.warn('⚠️ API indisponible, fallback données locales', e.message);
    FILMS = FILMS_FALLBACK;
    CINEMAS = CINEMAS_FALLBACK;
    dataLoaded = true;
    render();
  }
}

const PSEUDO_COLORS=['#e74c3c','#3498db','#2ecc71','#9b59b6','#ff8c42','#00c030','#f0c060','#e91e8c'];
function pseudoColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))%PSEUDO_COLORS.length;return PSEUDO_COLORS[Math.abs(h)];}
function pseudoInitial(name){return name.trim().charAt(0).toUpperCase()||'?';}

// ── MESSAGES ──
function msgHTML(m){
  const me=m.pseudo===st.pseudo;
  const bg=pseudoColor(m.pseudo),av=pseudoInitial(m.pseudo);
  const t=new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  return `<div style="display:flex;gap:8px;margin-bottom:13px;align-items:flex-end;flex-direction:${me?'row-reverse':'row'};">
    <div style="width:26px;height:26px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">${av}</div>
    <div><div style="font-size:8px;color:${MU};margin-bottom:3px;text-align:${me?'right':'left'};">${m.pseudo} · ${t}</div>
    <div style="padding:8px 12px;border-radius:14px;font-size:12px;line-height:1.55;max-width:195px;word-break:break-word;background:${me?AC:S2};border-bottom-left-radius:${me?'14px':'3px'};border-bottom-right-radius:${me?'3px':'14px'};">${m.texte}</div></div>
  </div>`;
}
function appendMsg(m){
  const ca=document.getElementById('ca');if(!ca)return;
  const typing=document.getElementById('typing-indicator');
  const div=document.createElement('div');div.innerHTML=msgHTML(m);
  if(typing)ca.insertBefore(div.firstChild,typing);else ca.appendChild(div.firstChild);
  ca.scrollTop=ca.scrollHeight;
}
let typingTimeout=null,typingUsers={};
function showTyping(){
  const el=document.getElementById('typing-indicator');if(!el)return;
  const others=Object.keys(typingUsers).filter(p=>p!==st.pseudo);
  if(others.length===0){el.style.display='none';return;}
  el.style.display='flex';
  el.querySelector('.typing-names').textContent=others.length===1?others[0]+' écrit…':others.join(', ')+' écrivent…';
}
let typingChannel=null,realtimeChannel=null;
function setupTypingChannel(){
  if(typingChannel)supa.removeChannel(typingChannel);
  if(realtimeChannel)supa.removeChannel(realtimeChannel);
  const g=st.groupe||'general';
  typingChannel=supa.channel('typing-'+g,{config:{presence:{key:st.pseudo}}});
  typingChannel.on('presence',{event:'sync'},()=>{
    const s=typingChannel.presenceState();typingUsers={};
    Object.values(s).flat().forEach(u=>{if(u.typing)typingUsers[u.pseudo]=true;else delete typingUsers[u.pseudo];});
    showTyping();
  }).subscribe();
  realtimeChannel=supa.channel('db-msg-'+g)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>appendMsg(p.new))
    .subscribe();
}
function onTyping(){
  if(!typingChannel)return;
  typingChannel.track({pseudo:st.pseudo,typing:true});
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>typingChannel.track({pseudo:st.pseudo,typing:false}),2000);
}
async function loadMessages(){
  const g=st.groupe||'general';
  const{data,error}=await supa.from('messages').select('*').eq('groupe',g).order('created_at',{ascending:true}).limit(80);
  if(error){console.error(error);return;}
  const ca=document.getElementById('ca');if(!ca)return;
  ca.innerHTML='';
  if(data.length===0){const e=document.createElement('div');e.style.cssText=`text-align:center;padding:40px 0;color:${MU};font-size:12px;`;e.innerHTML='Aucun message encore…<br>Soyez le premier ! 🎬';ca.appendChild(e);}
  data.forEach(m=>{const d=document.createElement('div');d.innerHTML=msgHTML(m);ca.appendChild(d.firstChild);});
  const t=document.createElement('div');t.id='typing-indicator';t.style.cssText=`display:none;align-items:center;gap:8px;padding:4px 0 8px;`;
  t.innerHTML=`<div style="display:flex;gap:3px;">${[0,150,300].map(d=>`<div style="width:5px;height:5px;background:${MU};border-radius:50%;animation:pulse 1.2s ${d}ms infinite;"></div>`).join('')}</div><span class="typing-names" style="font-size:10px;color:${MU};font-style:italic;"></span>`;
  ca.appendChild(t);
  ca.scrollTop=ca.scrollHeight;
}
async function sendMsg(){
  const inp=document.getElementById('ci');if(!inp||!inp.value.trim())return;
  const texte=inp.value.trim();inp.value='';inp.focus();
  if(typingChannel)typingChannel.track({pseudo:st.pseudo,typing:false});
  clearTimeout(typingTimeout);
  await supa.from('messages').insert({pseudo:st.pseudo,texte,groupe:st.groupe||'general'});
}

      <div style="flex:1;"><div style="font-size:13px;font-weight:500;">${m.pseudo}${m.pseudo===st.pseudo?' <span style="color:'+MU+';font-size:10px;">(moi)</span>':''}</div>
      <div style="font-size:9px;color:${MU};">Rejoint ${new Date(m.joined_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div></div>
    </div>`).join('')||`<div style="text-align:center;padding:30px 0;color:${MU};font-size:12px;">Aucun membre encore</div>`;

async function rejoindreGroupe(){
  const g=st.groupe||'general';
  await supa.from('groupe_membres').upsert({groupe:g,pseudo:st.pseudo},{onConflict:'groupe,pseudo'});
  await loadMembres();
}
function subscribeMembers(){
  const g=st.groupe||'general';
  supa.channel('db-membres-'+g)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'groupe_membres',filter:`groupe=eq.${g}`},async()=>{
      await loadMembres();
      // Mettre à jour le compteur dans le header
      const el=document.getElementById('membres-count');
      if(el)el.textContent=membresData.length;

    .subscribe();
}

// ── VOTES ──
let votesData=[];
async function loadVotes(){
  const g=st.groupe||'general';
  const{data}=await supa.from('votes').select('*').eq('groupe',g);
  votesData=data||[];
  if(st.tab==='vote')renderVotesDOM();
}
function renderVotesDOM(){
  const el=document.getElementById('votes-list');if(!el)return;
  const total=votesData.length||1;
  const heures=['19h00','19h30','20h00','20h30','21h00'];
  el.innerHTML=heures.map(h=>{
    const voters=votesData.filter(v=>v.heure===h);
    const pct=Math.round(voters.length/total*100);
    const myVote=votesData.find(v=>v.pseudo===st.pseudo&&v.heure===h);
    return `<div onclick="castVote('${h}')" style="background:${S1};border:1px solid ${myVote?GD:BD};border-radius:11px;padding:12px 13px;margin-bottom:6px;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;gap:9px;">
      <div style="position:absolute;left:0;top:0;bottom:0;width:${voters.length?pct:0}%;background:${myVote?'rgba(240,192,96,0.09)':'rgba(255,63,91,0.05)'};border-radius:11px;transition:width 0.4s;"></div>
      <div class="serif" style="font-size:16px;z-index:1;min-width:48px;">${h}</div>
      <div style="flex:1;display:flex;gap:-4px;z-index:1;">
        ${voters.slice(0,5).map(v=>`<div style="width:18px;height:18px;border-radius:50%;background:${pseudoColor(v.pseudo)};border:2px solid ${BG};display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;margin-left:-4px;">${pseudoInitial(v.pseudo)}</div>`).join('')}
        ${voters.length>0?`<span style="font-size:9px;color:${MU};margin-left:6px;align-self:center;">${voters.length} vote${voters.length>1?'s':''}</span>`:'<span style="font-size:9px;color:'+MU+';">—</span>'}
      </div>
      <span style="font-weight:600;font-size:12px;color:${myVote?GD:TX};z-index:1;">${voters.length?pct+'%':''}</span>
      ${myVote?'<span style="z-index:1;">👑</span>':''}
    </div>`;
  }).join('');
  // Résultat en tête
  const winner=heures.reduce((a,h)=>votesData.filter(v=>v.heure===h).length>votesData.filter(v=>v.heure===a).length?h:a,heures[0]);
  const myVote=votesData.find(v=>v.pseudo===st.pseudo);
  const res=document.getElementById('vote-result');
  if(res)res.innerHTML=myVote?`✅ Votre vote : <strong>${myVote.heure}</strong>${votesData.length>1?' · 🏆 Tête : <strong>'+winner+'</strong> ('+votesData.filter(v=>v.heure===winner).length+' votes)':''}`:`<span style="color:${MU};">Votez pour une heure de RDV ↑</span>`;
}
async function castVote(heure){
  const g=st.groupe||'general';
  await supa.from('votes').upsert({groupe:g,pseudo:st.pseudo,heure},{onConflict:'groupe,pseudo'});
  await loadVotes();
}
function subscribeVotes(){
  const g=st.groupe||'general';
  supa.channel('db-votes-'+g)
    .on('postgres_changes',{event:'*',schema:'public',table:'votes',filter:`groupe=eq.${g}`},async()=>{
      await loadVotes();
    }).subscribe();
}

async function creerGroupe(){
  const filmId=st.film;
  const f=FILMS[filmId];if(!f)return;
  const nom=prompt('Nom de votre groupe (ex: "Séance 20h IMAX") :');
  if(!nom||!nom.trim())return;
  const id=filmId+'-'+Date.now();
  await supa.from('groupes').insert({id,film_id:filmId,nom:nom.trim(),createur:st.pseudo});
  openGroup(filmId,id);
}

async function loadMesGroupes(){
  const{data}=await supa.from('groupe_membres').select('groupe').eq('pseudo',st.pseudo);
  if(!data||data.length===0){mesGroupes=[];return;}
  const ids=[...new Set(data.map(d=>d.groupe))];
  const{data:gs}=await supa.from('groupes').select('*').in('id',ids);
  mesGroupes=gs||[];
}

function subscribeGroupesFilm(filmId){
  supa.channel('db-groupes-'+filmId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'groupes',filter:`film_id=eq.${filmId}`},async()=>{
      await loadGroupesFilm(filmId);
    }).subscribe();
}

// ═══════════ STATE ═══════════
const _saved=(()=>{try{return JSON.parse(localStorage.getItem('cm2')||'{}')}catch(e){return{}}})();

// Helpers date
function todayStr(){return new Date().toISOString().split('T')[0];}
function dateLabel(d){
  const today=todayStr();
  const diff=Math.round((new Date(d)-new Date(today))/(86400000));
  if(diff===0)return"Aujourd'hui";
  if(diff===1)return'Demain';
  return new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}).replace(/^\w/,x=>x.toUpperCase());
}
function next7days(){
  return Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i);
    return d.toISOString().split('T')[0];
  });
}

let st={
  screen: _saved.pseudo ? 'home' : 'pseudo',
  pseudo: _saved.pseudo || '',
  pseudoInput: '',
  cinema:null, film:null, filmSrc:'home', groupe:null,
  genre:'tous', cinFilter:'tous', secs:3600, syncing:false, syncLabel:'',
  tab:'vote', voted:'19h30',
  msgs:[],
  date: todayStr(),
};
function save(){try{localStorage.setItem('cm2',JSON.stringify({pseudo:st.pseudo}))}catch(e){}}

function setDate(d){
  if(st.date===d)return;
  st.date=d;
  dataLoaded=false;
  render();
  loadProgramme(d);
}

function dayPicker(){
  const days=next7days();
  return `<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;">
    ${days.map(d=>{
      const lbl=dateLabel(d);
      const active=st.date===d;
      const isToday=d===todayStr();
      return `<div onclick="setDate('${d}')" style="flex-shrink:0;border-radius:12px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${active?GD:BD};background:${active?'rgba(240,192,96,0.12)':'rgba(255,255,255,0.02)'};color:${active?GD:MU};text-align:center;min-width:72px;">
        ${isToday&&!active?`<span style="color:${AC};font-size:8px;display:block;line-height:1;margin-bottom:2px;">● </span>`:''}
        ${lbl}
      </div>`;
    }).join('')}
  </div>`;
}
function isPast(h){const[hh,mm]=h.replace('h',':').split(':').map(Number),n=new Date();return n.getHours()>hh||(n.getHours()===hh&&n.getMinutes()>mm);}

// ACTIONS
function go(sc){
  st.screen=sc;
  if(sc==='group'){
    st.tab='chat';
    render();
    if(mesGroupes.length>0){
      const g=mesGroupes[0];
      st.groupe=g.id; st.film=g.film_id;
      setupTypingChannel(); subscribeMembers(); subscribeVotes();
      loadMessages(); rejoindreGroupe(); loadVotes();
    }
  } else render();
}
function switchGroupe(val){
  const[filmId,groupeId]=val.split('|||');
  openGroup(filmId,groupeId);
}
function openCinema(id){st.cinema=id;st.screen='cinema-detail';render();}
function openFilm(id,src){
  st.film=id;if(src)st.filmSrc=src;
  st.screen='film';
  groupesFilm=[];
  render();
  loadGroupesFilm(id);
  subscribeGroupesFilm(id);
}
function openGroup(filmId, groupeId){
  st.groupe=groupeId||filmId;
  st.film=filmId;
  st.screen='group';
  st.tab='chat';
  typingChannel=null; realtimeChannel=null;
  render();
  setupTypingChannel();
  subscribeMembers();
  subscribeVotes();
  loadMessages();
  rejoindreGroupe();
  loadVotes();
  loadMesGroupes();
}
function setGenre(g){st.genre=g;render();}
function setCinFilter(f){st.cinFilter=f;render();}
function setTab(t){
  st.tab=t; render();
  if(t==='chat'){loadMessages();setupTypingChannel();}
  if(t==='membres'){loadMembres();}
  if(t==='vote'){loadVotes();}
}
function setVote(h){st.voted=h;render();}
function doSync(){if(st.syncing)return;st.syncing=true;render();setTimeout(()=>{st.syncing=false;st.syncLabel='à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});st.secs=3600;render();},1500);}

function confirmPseudo(){
  const inp=document.getElementById('pseudoInput');
  const val=(inp?inp.value:st.pseudoInput).trim();
  if(!val||val.length<2)return;
  st.pseudo=val; save(); st.screen='home'; render();

}

  <div style="flex:1;overflow-y:auto;">

    <div style="padding:11px 18px 4px;font-size:12px;color:#8a8aaa;line-height:1.8;">${f.s}</div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;padding:10px 18px 9px;">
      <span class="serif" style="font-size:16px;">Groupes disponibles</span>
      <span style="font-size:10px;color:${MU};" id="groupes-count">${groupesFilm.length>0?groupesFilm.length+' groupe'+(groupesFilm.length>1?'s':''):'Aucun groupe'}</span>
    </div>
    <div id="groupes-film-list" style="padding:0 18px;">
      <div style="text-align:center;padding:20px 0;color:${MU};font-size:11px;">Chargement… ⏳</div>
    </div>
    <div style="display:flex;align-items:baseline;justify-content:space-between;padding:6px 18px 6px;">
      <span class="serif" style="font-size:16px;">Où voir ce film</span>
      <span style="font-size:10px;color:${MU};">${wf.length} cinémas</span>
    </div>
    <div style="padding:0 18px 10px;">${dayPicker()}</div>
    ${wf.slice(0,6).map(c=>{const sf=c.films.find(x=>x.id===st.film),next=sf.h.find(h=>!isPast(h))||sf.h[sf.h.length-1];return`<div style="margin:0 18px 6px;background:${S1};border:1px solid ${BD};border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px;"><span style="font-size:17px;">${c.icon}</span><div style="flex:1;"><div style="font-size:12px;font-weight:500;margin-bottom:1px;">${c.name}</div><div style="font-size:9px;color:${MU};">${c.metro}</div></div><span style="background:${S2};border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;color:${GD};">${next}</span></div>`;}).join('')}
    <div style="height:24px;"></div>
  </div>`;
}

function sGroup(){
  const f=st.film&&FILMS[st.film]?FILMS[st.film]:null;
  const filmNom=f?f.t:'Groupe général';
  const filmIcon=f?f.e:'🎬';
  // Nom du groupe actuel
  const groupeActuel=mesGroupes.find(g=>g.id===st.groupe);
  const groupeNom=groupeActuel?groupeActuel.nom:(f?f.t:'Groupe');
  const tabs=[['vote','Vote'],['membres','Membres'],['chat','Chat 💬']];
  let tc='';
  if(st.tab==='vote'){
    tc=`<div style="flex:1;overflow-y:auto;padding:15px 18px;">
      <div class="serif" style="font-size:16px;margin-bottom:4px;">Heure de rendez-vous ?</div>
      <div style="font-size:10px;color:${MU};margin-bottom:13px;">Votez — résultats en direct 🔴</div>
      <div id="votes-list"><div style="text-align:center;padding:30px 0;color:${MU};font-size:11px;">Chargement… ⏳</div></div>
      <div id="vote-result" style="background:rgba(240,192,96,0.06);border:1px solid rgba(240,192,96,0.18);border-radius:11px;padding:11px;font-size:11px;margin-top:7px;"></div>
    </div>`;
  } else if(st.tab==='membres'){
    tc=`<div style="flex:1;overflow-y:auto;padding:14px 18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;">
        <div class="serif" style="font-size:16px;">Membres <span id="membres-count" style="color:${AC};">${membresData.length}</span></div>
        <div style="width:7px;height:7px;background:${LB};border-radius:50%;" class="pulse"></div>
      </div>
      <div id="membres-list"><div style="text-align:center;padding:30px 0;color:${MU};font-size:11px;">Chargement… ⏳</div></div>
    </div>`;
  } else {
    tc=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 18px 4px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:6px;">
        <div style="width:7px;height:7px;background:${LB};border-radius:50%;" class="pulse"></div>
        <span style="font-size:10px;color:${MU};">Chat en direct · <strong style="color:${TX};">${st.pseudo}</strong></span>
      </div>
      <span onclick="st.pseudo='';st.screen='pseudo';save();render();" style="font-size:9px;color:${MU};cursor:pointer;text-decoration:underline;">changer</span>
    </div>
    <div id="ca" style="flex:1;overflow-y:auto;padding:8px 18px;">
      <div style="text-align:center;padding:30px 0 10px;color:${MU};font-size:11px;">Chargement… ⏳</div>
    </div>
    <div style="display:flex;gap:8px;padding:9px 18px 14px;background:${BG};border-top:1px solid ${BD};flex-shrink:0;">
      <input id="ci" type="text" placeholder="Écrire à tous…"
        style="flex:1;background:${S2};border:1px solid ${BD};border-radius:18px;padding:9px 14px;font-size:11px;color:${TX};outline:none;"
        onkeydown="if(event.key==='Enter')sendMsg()" oninput="onTyping()">
      <button onclick="sendMsg()" style="width:36px;height:36px;background:${AC};border:none;border-radius:50%;font-size:14px;flex-shrink:0;">↑</button>
    </div>`;
  }

  // Menu déroulant mes groupes
  const menuGroupes = mesGroupes.length > 1 ? `
  <div style="padding:0 18px 10px;flex-shrink:0;">
    <div style="position:relative;">
      <select onchange="switchGroupe(this.value)" style="width:100%;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 32px 8px 12px;font-size:11px;color:${TX};appearance:none;outline:none;cursor:pointer;">
        ${mesGroupes.map(g=>{
          const gf=FILMS[g.film_id];
          return `<option value="${g.film_id}|||${g.id}" ${g.id===st.groupe?'selected':''}>${gf?gf.e+' ':''} ${g.nom}</option>`;
        }).join('')}
      </select>
      <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:10px;color:${MU};">▾</span>
    </div>
  </div>` : '';

  return `
  <div style="background:linear-gradient(to bottom,${S1},${BG});padding:50px 18px 12px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;">
      <button onclick="openFilm('${st.film}','${st.filmSrc||'home'}')" style="width:34px;height:34px;border-radius:50%;background:${S2};border:1px solid ${BD};color:${TX};font-size:14px;display:flex;align-items:center;justify-content:center;">←</button>
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;color:${MU};margin-bottom:1px;">${filmIcon} ${filmNom}</div>
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${groupeNom}</div>
      </div>
      <span style="font-size:9px;background:${AC}18;border:1px solid ${AC}35;color:${AC};border-radius:8px;padding:2px 7px;flex-shrink:0;" id="membres-badge">${membresData.length} membre${membresData.length!==1?'s':''}</span>
    </div>
  </div>
  ${menuGroupes}
  <div style="display:flex;border-bottom:1px solid ${BD};flex-shrink:0;">
    ${tabs.map(([id,lb])=>`<button onclick="setTab('${id}')" style="flex:1;padding:11px 0 9px;font-size:11px;font-weight:500;color:${st.tab===id?TX:MU};border:none;background:none;cursor:pointer;position:relative;">${lb}${st.tab===id?`<div style="position:absolute;bottom:-1px;left:15%;right:15%;height:2px;background:${AC};border-radius:2px;"></div>`:''}</button>`).join('')}
  </div>
  ${tc}
  ${st.tab!=='chat'?nav('group'):''}`;
}

function sProfile(){
  return `
  <div style="background:linear-gradient(to bottom,${S1},${BG});padding:50px 18px 18px;flex-shrink:0;">
    <div style="display:flex;align-items:flex-start;gap:13px;margin-bottom:16px;">
      <div style="width:62px;height:62px;border-radius:17px;background:${pseudoColor(st.pseudo)};display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;position:relative;flex-shrink:0;">${pseudoInitial(st.pseudo)}<div style="position:absolute;bottom:-3px;right:-3px;background:${LB};border:2px solid ${BG};border-radius:6px;padding:1px 4px;font-size:7px;font-weight:900;color:#000;">LBD</div></div>
      <div>
        <div class="serif" style="font-size:19px;margin-bottom:2px;">${st.pseudo}</div>
        <div style="font-size:11px;color:${LB};margin-bottom:4px;">@${st.pseudo.toLowerCase().replace(/\s+/g,'')} · Letterboxd connecté</div>
        <div style="font-size:10px;color:${MU};">Cinéphile 🎬 · Paris</div>
        <div style="margin-top:7px;"><span onclick="st.pseudo='';st.screen='pseudo';save();render();" style="font-size:10px;color:${MU};cursor:pointer;text-decoration:underline;border:1px solid ${BD};border-radius:8px;padding:3px 8px;">✏️ Changer de pseudo</span></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;">
      ${[['12','Séances'],['156','Films vus'],['8','Groupes']].map(([v,l])=>`<div style="background:${S2};border:1px solid ${BD};border-radius:11px;padding:10px;text-align:center;"><div class="serif" style="font-size:20px;">${v}</div><div style="font-size:8px;color:${MU};text-transform:uppercase;letter-spacing:1px;margin-top:2px;">${l}</div></div>`).join('')}
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;">
    <div style="margin:12px 18px;background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.2);border-radius:15px;padding:15px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;"><div class="serif" style="font-size:16px;">Mon Letterboxd</div><span style="font-size:9px;color:${LB};cursor:pointer;">↻ Sync</span></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px;">
        ${[['156','Films'],['42','Watchlist'],['★3.4','Moy.']].map(([v,l])=>`<div style="text-align:center;"><div class="serif" style="font-size:17px;color:${LB};">${v}</div><div style="font-size:8px;color:${MU};">${l}</div></div>`).join('')}
      </div>
      <div style="display:flex;gap:5px;">${[['💀','#4a3010'],['🌿','#1e7a40'],['🏓','#8a1020'],['⚡','#3a1060'],['🧵','#4a1060']].map(([e,c])=>`<div style="width:38px;height:54px;border-radius:6px;background:linear-gradient(135deg,#0d0d0d,${c});display:flex;align-items:center;justify-content:center;font-size:20px;">${e}</div>`).join('')}</div>
    </div>
    <div style="padding:4px 18px 8px;">
      <div class="serif" style="font-size:16px;margin-bottom:11px;">Mes genres</div>
      ${[['🎭 Drame',38],['🚀 Sci-Fi',24],['🕵️ Thriller',18],['😱 Horreur',12],['🎬 Arthouse',8]].map(([g,p])=>`<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:11px;">${g}</span><span style="font-size:10px;color:${MU};">${p}%</span></div><div style="height:5px;background:${S2};border-radius:3px;overflow:hidden;"><div style="width:${p}%;height:100%;background:linear-gradient(to right,${AC},#ff8c42);border-radius:3px;"></div></div></div>`).join('')}
    </div>
    <div style="padding:4px 18px 22px;">
      <div class="serif" style="font-size:16px;margin-bottom:11px;">Historique</div>
      ${[['💀','Hamnet','15 Fév · Groupe de 4','★★★★'],['🏓','Marty Supreme','1 Mars · Groupe de 5','★★★★½'],['🔪','Scream 7','22 Jan · Groupe de 3','★★★']].map(([e,t,m,r])=>`<div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid ${BD};"><div style="width:38px;height:38px;background:${S2};border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${e}</div><div style="flex:1;"><div style="font-size:12px;font-weight:500;margin-bottom:1px;">${t}</div><div style="font-size:9px;color:${MU};">${m}</div></div><div style="font-size:13px;">${r}</div></div>`).join('')}
    </div>
  </div>
  ${nav('profile')}`;
}

// RENDER
function render(){
  const app=document.getElementById('app');
  const phone=document.createElement('div');
  phone.className='phone screen';
  phone.innerHTML='<div class="notch"><div class="notch-bar"></div></div>';
  const inner=document.createElement('div');
  inner.style.cssText='display:flex;flex-direction:column;height:100%;';
  try{
    if(st.screen==='pseudo')        inner.innerHTML=sPseudo();
    else if(st.screen==='home')     inner.innerHTML=sHome();
    else if(st.screen==='cinemas')  inner.innerHTML=sCinemas();
    else if(st.screen==='cinema-detail') inner.innerHTML=sCinemaDetail();
    else if(st.screen==='film')     inner.innerHTML=sFilm();
    else if(st.screen==='group')    inner.innerHTML=sGroup();
    else if(st.screen==='profile')  inner.innerHTML=sProfile();
  }catch(e){inner.innerHTML=`<div style="padding:80px 20px;color:#ff3f5b;font-size:12px;">Erreur: ${e.message}</div>`;}
  phone.appendChild(inner);
  app.innerHTML='';
  app.appendChild(phone);
  if(st.tab==='chat'){setTimeout(()=>{const c=document.getElementById('ca');if(c)c.scrollTop=c.scrollHeight;},50);}
}

// TIMER
setInterval(()=>{
  if(st.secs>0)st.secs--;else st.secs=3600;
  if(st.screen==='cinemas'){
    const mm=String(Math.floor(st.secs/60)).padStart(2,'0'),ss=String(st.secs%60).padStart(2,'0');
    const el=document.querySelector('[data-refresh]');
    if(el)el.textContent=mm+':'+ss;
    else render();
  }
},1000);

// INIT
render();
if(st.pseudo) loadMesGroupes();
loadProgramme();
</script>
</body>
</html>
