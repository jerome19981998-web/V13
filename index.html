const GENRE_EMOJI = {
  'drame':'🎭','comedie':'😂','comédie':'😂','horreur':'👻','thriller':'🔪',
  'romance':'💕','animation':'🎨','polar':'🕵️','action':'💥','aventure':'🌍',
  'sci-fi':'🚀','biopic':'📖','documentaire':'🎞️','fantastique':'✨','guerre':'⚔️',
};
function genreEmoji(g){
  if(!g)return'🎬';
  const k=g.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for(const[key,v]of Object.entries(GENRE_EMOJI)){if(k.includes(key))return v;}
  return'🎬';
}
const PALETTE=[
  ['#1a0a08','linear-gradient(135deg,#0d0805,#2a1008)'],
  ['#0a1520','linear-gradient(135deg,#050a14,#0a1828)'],
  ['#1a0a1a','linear-gradient(135deg,#100810,#241224)'],
  ['#0a1a10','linear-gradient(135deg,#050d08,#0f2518)'],
  ['#1e1408','linear-gradient(135deg,#100d05,#2a1c08)'],

  ['#0a0a1a','linear-gradient(135deg,#050508,#10101e)'],

  ['#200a10','linear-gradient(135deg,#140508,#2a0f14)'],

  ['#1a1508','linear-gradient(135deg,#100d05,#1e1a08)'],
  ['#0f1a20','linear-gradient(135deg,#080f14,#101e28)'],
];
function filmPalette(slug){
  let h=0;for(const c of(slug||''))h=(h*31+c.charCodeAt(0))&0xffff;
  return PALETTE[h%PALETTE.length];
}

async function initDynamicData(dateStr){

    for(const f of(filmsRes.data||[])){
      const[c,bg]=filmPalette(f.id);
      FILMS[f.id]={
        e:genreEmoji(f.genre),c,bg,
        g:(f.genre||'DIVERS').toUpperCase(),
        t:f.title,d:f.duration||'',dir:f.director||'',
        s:f.synopsis||'',poster:f.poster_url||null,
        tmdbNote:f.tmdb_note||null,trailerKey:f.trailer_key||null,
        lbd:false,
      };

    const sm={};
    for(const s of(seancesRes.data||[])){

      sm[s.cinema_id][s.film_id]=s.heures||[];
    }
    SEANCES=sm;

    // Cinémas
    CINEMAS=(cinemasRes.data||[]).map(c=>({
      id:c.id,lat:c.lat,lng:c.lng,chain:c.chain,

      films:Object.keys(sm[c.id]||{}).map(id=>({id})),
    }));

    DATA_LOADED=true;
  }catch(e){console.error('initDynamicData:',e);}
}

function toast(msg, type='info', dur=2800){
  const colors={info:MU, success:LB, error:AC, warning:GD};
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:${S2};border:1px solid ${colors[type]||BD};border-radius:12px;padding:10px 16px;font-size:12px;color:${TX};z-index:9999;opacity:0;transition:all 0.25s;white-space:nowrap;max-width:300px;text-align:center;`;
  t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';setTimeout(()=>t.remove(),300);},dur);
}

let userPos = null;
function getDistance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distLabel(km){ return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km'; }
function requestGeoLoc(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{
    userPos={lat:p.coords.latitude,lng:p.coords.longitude};
    if(['cinemas','cinema-detail'].includes(st.screen))render();
  },()=>{},{timeout:8000});
}
function sortedCinemas(chain){
  const list=chain?CINEMAS.filter(c=>c.chain===chain):CINEMAS;
  if(!userPos)return list;
  return [...list].sort((a,b)=>{
    const da=(a.lat&&a.lng)?getDistance(userPos.lat,userPos.lng,a.lat,a.lng):999;
    const db=(b.lat&&b.lng)?getDistance(userPos.lat,userPos.lng,b.lat,b.lng):999;
    return da-db;
  });
}
requestGeoLoc();

// ═══════════ LBD ═══════════
let lbdSeen=new Set(),lbdWatchlist=new Set();
function normTitle(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function filmInLbd(filmId,list){
  const f=FILMS[filmId];if(!f)return false;
  const titles=[f.t,...(f.alt||[])].map(normTitle);
  for(const t of list){for(const n of titles){if(t.includes(n)||n.includes(t))return true;}}
  return false;
}
function isVu(id){return filmInLbd(id,lbdSeen);}
function isWatchlist(id){return filmInLbd(id,lbdWatchlist);}

async function loadLbd(pseudo){
  try{
    const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok)return false;
    const d=await r.json();
    lbdSeen=new Set();lbdWatchlist=new Set();
    (d.items||[]).forEach(item=>{
      const n=normTitle(item.title);
      // Dans le RSS Letterboxd, les items du diary = films vus
      // Les items avec cat 'wishlist' = watchlist, sinon = vu
      if(item.cats&&item.cats.includes('wishlist'))lbdWatchlist.add(n);
      else lbdSeen.add(n);
    });
    return true;
  }catch(e){return false;}
}

// LBD membres
const membresLbd={};
async function loadMemberLbd(pseudo){
  if(membresLbd[pseudo])return membresLbd[pseudo];
  try{
    const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok)return null;
    const d=await r.json();
    const seen=new Set(),wl=new Set();
    (d.items||[]).forEach(item=>{
      const n=normTitle(item.title);
      if(item.cats&&item.cats.includes('wishlist'))wl.add(n);
      else seen.add(n);
    });
    membresLbd[pseudo]={seen,wl};
    return membresLbd[pseudo];
  }catch(e){return null;}
}

function formatDate(ds){
  const d=new Date(ds+'T12:00:00');
  const jours=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const mois=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  return jours[d.getDay()]+' '+d.getDate()+' '+mois[d.getMonth()];
}

function countdown(date,heure){
  if(!date||!heure)return'';
  const h=heure.replace('h',':');
  const target=new Date(date+'T'+h+':00');
  const now=new Date();
  const diff=target-now;
  if(diff<=0)return'✓ Séance passée';
  const days=Math.floor(diff/86400000);
  const hrs=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  if(days>0)return`dans ${days}j ${hrs}h`;
  if(hrs>0)return`dans ${hrs}h ${mins}min`;
  return`dans ${mins}min`;
}

  await supa.from('groupes').update({confirmed_cinema:cinemaId,confirmed_heure:heure,confirmed_date:date}).eq('id',st.groupe);
  const msg='🎬 Plan confirmé ! '+( f?.t||'')+' au '+(cinema?.name||cinemaId)+', le '+formatDate(date)+' à '+heure+' 🍿';
  await supa.from('messages').insert({groupe:st.groupe,pseudo:'📢 CinéMatch',texte:msg,reactions:[]});

function subscribeAll(){
  if(realtimeChannel){supa.removeChannel(realtimeChannel);realtimeChannel=null;}
  if(votesChannel){supa.removeChannel(votesChannel);votesChannel=null;}
  const g=st.groupe||'general';
  realtimeChannel=supa.channel('db-msg-'+g)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>appendMsg(p.new))
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>{
      if(p.new.reactions!==undefined){reactionsData[p.new.id]=p.new.reactions||[];refreshReactionsDOM();}
    })
    .subscribe();
  votesChannel=supa.channel('db-votes-'+g)
    .on('postgres_changes',{event:'*',schema:'public',table:'votes',filter:`groupe=eq.${g}`},async()=>await loadVotes())
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'groupes',filter:`id=eq.${g}`},async()=>{await loadGroupeInfo();render();if(st.tab==='vote')renderVotesDOM();if(st.tab==='membres')renderMembresDOM();})
    .subscribe();
}

function appendMsg(m){
  const ca=document.getElementById('chat-area');
  if(!ca)return;
  ca.insertAdjacentHTML('beforeend',msgHTML(m));
  ca.scrollTop=ca.scrollHeight;
}

const REACTION_EMOJIS=['❤️','😂','🔥','👏','😮','🎬'];

async function loadReactions(){
  const g=st.groupe||'general';
  const{data}=await supa.from('messages').select('id,reactions').eq('groupe',g);
  reactionsData={};
  (data||[]).forEach(m=>{if(m.reactions)reactionsData[m.id]=m.reactions;});

}

function refreshReactionsDOM(){
  document.querySelectorAll('[data-reactions]').forEach(el=>{
    el.innerHTML=reactionsHTML(el.dataset.reactions);
  });
}

function reactionsHTML(msgId){
  const reacts=reactionsData[msgId]||[];
  const grouped={};
  reacts.forEach(r=>{if(!grouped[r.emoji])grouped[r.emoji]=[];grouped[r.emoji].push(r.pseudo);});
  const myReact=reacts.find(r=>r.pseudo===st.pseudo)?.emoji;
  let html=Object.entries(grouped).map(([e,users])=>`<span onclick="toggleReaction('${msgId}','${e}')" style="display:inline-flex;align-items:center;gap:3px;background:${myReact===e?'rgba(255,63,91,0.15)':'rgba(255,255,255,0.06)'};border:1px solid ${myReact===e?AC:BD};border-radius:20px;padding:2px 7px;font-size:11px;cursor:pointer;">${e}<span style="font-size:9px;color:${MU};">${users.length}</span></span>`).join('');
  html+=`<span onclick="showReactionPicker('${msgId}')" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:rgba(255,255,255,0.04);border:1px solid ${BD};border-radius:50%;font-size:11px;cursor:pointer;opacity:0.5;">+</span>`;
  return html;
}

function showReactionPicker(msgId){
  const existing=document.getElementById('rpicker');
  if(existing){existing.remove();return;}
  const picker=document.createElement('div');
  picker.id='rpicker';
  picker.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:8px 12px;display:flex;gap:8px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
  picker.innerHTML=REACTION_EMOJIS.map(e=>`<span onclick="toggleReaction('${msgId}','${e}');document.getElementById('rpicker')?.remove();" style="font-size:22px;cursor:pointer;">${e}</span>`).join('');
  document.body.appendChild(picker);
  setTimeout(()=>picker.remove(),4000);
}

async function toggleReaction(msgId,emoji){
  const reacts=reactionsData[msgId]||[];
  const existing=reacts.find(r=>r.pseudo===st.pseudo&&r.emoji===emoji);
  let newReacts;
  if(existing){newReacts=reacts.filter(r=>!(r.pseudo===st.pseudo&&r.emoji===emoji));}
  else{const withoutMe=reacts.filter(r=>r.pseudo!==st.pseudo);newReacts=[...withoutMe,{emoji,pseudo:st.pseudo}];}
  reactionsData[msgId]=newReacts;
  refreshReactionsDOM();
  await supa.from('messages').update({reactions:newReacts}).eq('id',msgId);
}

function pseudoColor(p){const h=[...p].reduce((a,c)=>a+c.charCodeAt(0),0);const colors=['#e54','#d4a','#59e','#4b9','#e84','#a5e','#4ce','#e75'];return colors[h%colors.length];}
function pseudoInitial(p){return(p||'?')[0].toUpperCase();}

function getAvatar(pseudo){

function isPast(heure){
  const now=new Date();
  const[h,m]=heure.replace('h',':').split(':').map(Number);
  const t=new Date();t.setHours(h,m,0,0);
  if(st.date!==todayStr())return false;
  return t<now;
}

function renderVotesDOM(){
  const el=document.getElementById('votes-container');
  if(!el||!st.film)return;
  // Récupérer toutes les séances de tous les cinémas pour ce film
  const tousCinemas=CINEMAS.filter(c=>c.films.some(f=>f.id===st.film));
  // Si un cinéma est sélectionné, filtrer sur lui uniquement
  const cinemasActifs=st.cinema?tousCinemas.filter(c=>c.id===st.cinema):tousCinemas;
  // Collecter toutes les séances (dédupliquées par heure)
  const heuresVues=new Set();
  const allSeances=[];
  cinemasActifs.forEach(c=>{
    ((SEANCES[c.id]||{})[st.film]||[]).forEach(h=>{
      if(!heuresVues.has(h)){heuresVues.add(h);allSeances.push(h);}
    });
  });
  allSeances.sort();
  if(!allSeances.length){el.innerHTML=`<div style="text-align:center;padding:30px;color:${MU};font-size:12px;">Aucune séance ce jour</div>`;return;}

  // Trouver l'horaire avec le plus de votes (pour "C'est décidé !")
  let maxVotes=0,bestHeure=null;
  allSeances.forEach(h=>{const k=st.date+' '+h;const n=(votesData[k]||[]).length;if(n>maxVotes){maxVotes=n;bestHeure=h;}});
  const majority=membresData.length>0&&maxVotes>=Math.ceil(membresData.length/2);
  const confirmBtn=(majority&&bestHeure&&!groupeInfo.confirmed_heure)?`<div onclick="confirmerPlan('${st.cinema}','${bestHeure}','${st.date}')" style="margin-bottom:12px;padding:12px 14px;border-radius:14px;background:rgba(0,192,48,0.12);border:1px solid rgba(0,192,48,0.4);cursor:pointer;text-align:center;">
    <div style="font-size:13px;font-weight:700;color:${LB};">✅ C'est décidé !</div>
    <div style="font-size:10px;color:${MU};margin-top:2px;">Confirmer ${bestHeure} · ${maxVotes} vote${maxVotes>1?'s':''}</div>
  </div>`:'';

  el.innerHTML=confirmBtn+allSeances.map(h=>{
    const past=isPast(h);
    const k=st.date+' '+h;
    const voters=votesData[k]||[];
    const voted=voters.some(v=>v.pseudo===st.pseudo);

function confirmPseudo(){
  const inp=document.getElementById('pseudoInput');
  const val=(inp?inp.value:st.pseudoInput).trim();
  if(!val)return;
  st.pseudo=val;save();
  if(st._inviteGroupe&&st._inviteFilm){
    const gid=st._inviteGroupe,fid=st._inviteFilm;
    st._inviteGroupe=null;st._inviteFilm=null;
    history.replaceState({},'','/');
    loadMesGroupes().then(()=>openGroup(fid,gid));
  }else{
    st.screen='home';render();loadMesGroupes();
  }
}

function sHome(){
  const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  const searchQ=norm(st.search||'');

    const genreOk=st.genre==='tous'||filmGenre(id).includes(norm(st.genre==='comedie'?'comedie':st.genre));
    const searchOk=!searchQ||norm(f.t).includes(searchQ)||norm(f.dir||'').includes(searchQ)||norm(f.g).includes(searchQ)||norm(f.s||'').includes(searchQ);
    return genreOk&&searchOk;

      </div>
      <div onclick="go('profile')" style="display:flex;align-items:center;gap:7px;background:${S1};border:1px solid ${BD};border-radius:18px;padding:5px 10px 5px 5px;cursor:pointer;">
        ${avatarEl(st.pseudo,26)}
        <span style="font-size:11px;">@${st.pseudo.toLowerCase().replace(/\s+/g,'')} <span style="color:${LB}">✓</span></span>
      </div>
    </div>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;">
      ${genres.map(([id,lb])=>`<div onclick="setGenre('${id}')" style="border-radius:20px;padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid ${st.genre===id?AC:BD};background:${st.genre===id?AC:'rgba(255,255,255,0.03)'};color:${st.genre===id?'#fff':MU};white-space:nowrap;flex-shrink:0;">${lb}</div>`).join('')}
    </div>
  </div>
  <div style="padding:0 18px 10px;flex-shrink:0;">
    <div style="position:relative;">
      <input id="search-input" placeholder="🔍  Rechercher un film…" value="${st.search||''}"

        style="width:100%;background:${S1};border:1px solid ${BD};border-radius:12px;padding:9px 14px 9px 36px;font-size:12px;color:${TX};outline:none;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;opacity:0.5;">🔍</span>
      ${(st.search||'')?`<span onclick="st.search='';render();" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:${MU};cursor:pointer;">✕</span>`:''}
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;">
    ${(()=>{
      // Recommandation dynamique : film en watchlist pas encore vu, ou film non vu
      const wlFilms=Object.entries(FILMS).filter(([id])=>isWatchlist(id)&&!isVu(id));
      const nonVus=Object.entries(FILMS).filter(([id])=>!isVu(id));

          <div style="font-size:9px;color:${MU};">${f.d}${ratings[id]?' · <span style="color:'+GD+';">★ '+ratings[id].note+'</span>':''}</div>
        </div>

    </div>
  </div>
  <div style="display:flex;background:${S1};border-top:1px solid ${BD};flex-shrink:0;">
    ${[['home','🎬','Films'],['cinemas','🏛','Cinémas'],['group','👥','Groupes'],['profile','👤','Profil']].map(([sc,ic,lb])=>`

      </div>
      <div style="font-size:9px;color:${MU};">${lb}</div>

      <div onclick="st.showAvatarPicker=!st.showAvatarPicker;render();" style="width:62px;height:62px;border-radius:17px;background:${pseudoColor(st.pseudo)};display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;cursor:pointer;position:relative;">
        ${st.avatar}
        <div style="position:absolute;bottom:-4px;right:-4px;background:${S2};border:1px solid ${BD};border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;">✏️</div>
      </div>
      <div>
        <div style="font-size:18px;font-weight:600;">${st.pseudo}</div>
        <div style="font-size:11px;color:${MU};margin-bottom:6px;">@${st.pseudo.toLowerCase().replace(/\s+/g,'')}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:4px;">
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;">
        <div style="font-size:20px;font-weight:700;color:${AC};">${groupesActifs}</div>
        <div style="font-size:9px;color:${MU};">groupe${groupesActifs!==1?'s':''}</div>
      </div>
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;">
        <div style="font-size:20px;font-weight:700;color:${LB};">${groupesConfirmes}</div>
        <div style="font-size:9px;color:${MU};">plan${groupesConfirmes!==1?'s':''} confirmé${groupesConfirmes!==1?'s':''}</div>
      </div>
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;">
        <div style="font-size:20px;font-weight:700;color:${GD};">${vuCount}</div>
        <div style="font-size:9px;color:${MU};">film${vuCount!==1?'s':''} vus</div>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    ${st.showAvatarPicker?buildPickerGrid():''}
    ${lbdBlock}
    ${changePseudoBlock}
    ${logoutBlock}
  </div>
  <div style="display:flex;background:${S1};border-top:1px solid ${BD};flex-shrink:0;">
    ${[['home','🎬','Films'],['cinemas','🏛','Cinémas'],['group','👥','Groupes'],['profile','👤','Profil']].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:10px 0;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:18px;position:relative;display:inline-block;">${ic}${sc==='group'&&mesGroupes.some(g=>g.confirmed_heure)?'<div style="position:absolute;top:-3px;right:-5px;width:7px;height:7px;border-radius:50%;background:#00c030;border:1.5px solid #07070f;"></div>':''}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
  </div>`;
}

function sMemberProfile(){
  const pseudo=st.viewedMember;
  const lbd=membresLbd[pseudo];
  const myLbd=st.lbdPseudo;
  let commonFilms=[];
  if(lbd&&myLbd){
    commonFilms=Object.entries(FILMS).filter(([id])=>isVu(id)&&filmInLbd(id,lbd.seen)).map(([id,f])=>f.t);
  }
  return `<div style="padding:52px 18px 12px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div onclick="st.screen='group';render();" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;">←</div>
      <div class="serif" style="font-size:20px;">${pseudo}</div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    <div style="display:flex;justify-content:center;margin-bottom:20px;">
      ${avatarEl(pseudo,72,'18px')}
    </div>
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:20px;font-weight:600;">${pseudo}</div>
    </div>
    ${(()=>{
      const moi=membresData.find(m=>m.pseudo===pseudo);
      const statut=moi?.statut||'maybe';
      const STATUTS={yes:{e:'✅',l:'Vient'},maybe:{e:'❓',l:'Peut-être'},no:{e:'❌',l:'Pas dispo'}};
      const s=STATUTS[statut];
      const cinema_pref=moi?.cinema_pref?CINEMAS.find(c=>c.id===moi.cinema_pref)?.name:'';
      return `<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:14px;">
        <div style="display:flex;gap:12px;align-items:center;">
          <span style="font-size:13px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid ${BD};">${s.e} ${s.l}</span>
          ${cinema_pref?`<span style="font-size:11px;color:${MU};">🏛 ${cinema_pref}</span>`:''}
        </div>
      </div>`;
    })()}
    ${lbd?`<div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="font-size:11px;color:${LB};font-weight:600;margin-bottom:10px;">Letterboxd</div>
      <div style="display:flex;gap:12px;margin-bottom:${commonFilms.length?'10px':'0'};">
        ${chip('✓ '+lbd.seen.size+' vus',LB,'rgba(0,192,48,0.12)','rgba(0,192,48,0.3)',10)}
        ${chip('🔖 '+lbd.wl.size+' watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',10)}
      </div>
      ${commonFilms.length?`<div><div style="font-size:10px;color:${MU};margin-bottom:6px;">Films que vous avez tous les deux vus :</div>${commonFilms.slice(0,5).map(t=>`<div style="font-size:11px;padding:4px 0;border-bottom:1px solid ${BD};">✓ ${t}</div>`).join('')}${commonFilms.length>5?`<div style="font-size:10px;color:${MU};margin-top:4px;">+${commonFilms.length-5} autres</div>`:''}</div>`:''}
    </div>`:`<div style="text-align:center;padding:20px;color:${MU};font-size:12px;background:${S1};border:1px solid ${BD};border-radius:14px;margin-bottom:14px;">Letterboxd non connecté</div>`}
  </div>`;
}

// ═══════════ RENDER ═══════════
function render(){
  const inner=document.getElementById('inner');
  if(!inner)return;
  if(st.screen==='pseudo')         inner.innerHTML=sPseudo();
  else if(st.screen==='home')      inner.innerHTML=sHome();
  else if(st.screen==='cinemas')   inner.innerHTML=sCinemas();
  else if(st.screen==='cinema-detail') inner.innerHTML=sCinemaDetail();
  else if(st.screen==='film')      inner.innerHTML=sFilm();
  else if(st.screen==='group')     {inner.innerHTML=sGroup(); if(st.groupe&&st.tab==='vote'){renderVotesDOM();} if(st.groupe&&st.tab==='membres')renderMembresDOM(); if(st.groupe&&st.tab==='chat')loadMessages();}
  else if(st.screen==='profile')   inner.innerHTML=sProfile();
  else if(st.screen==='member-profile') inner.innerHTML=sMemberProfile();
}

// ═══════════ INIT ═══════════
(function handleInvite(){
  const params=new URLSearchParams(window.location.search);
  const gid=params.get('groupe'),fid=params.get('film');
  if(gid&&fid&&st.pseudo){history.replaceState({},'','/');openGroup(fid,gid);}
  else if(gid&&fid){st._inviteGroupe=gid;st._inviteFilm=fid;}
})();

(async function init(){
  document.getElementById('app').innerHTML=`
    <div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0f;">
      <div style="font-size:36px;">🎬</div>
      <div style="font-size:13px;color:#666;letter-spacing:2px;">Chargement des séances…</div>
    </div>`;
  await initDynamicData(st.date);
  render();
  if(st.pseudo){loadMesGroupes();if(st.lbdPseudo)loadLbd(st.lbdPseudo);}
  loadPosters();
})();

setInterval(()=>{
  if(st.screen==='cinemas'||st.screen==='cinema-detail'||st.screen==='group')render();
  // Mettre à jour les countdowns sans re-render complet
  document.querySelectorAll('[data-countdown]').forEach(el=>{
    const [d,h]=el.dataset.countdown.split('|');
    el.textContent=countdown(d,h);
  });
},30*1000);
</script>
</body>
</html>
