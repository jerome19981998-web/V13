  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{height:100%;overflow:hidden;position:fixed;width:100%;}
    body{margin:0;padding:0;width:100%;height:100%;background:#07070f;font-family:'Outfit',sans-serif;overflow:hidden;position:fixed;-webkit-overflow-scrolling:touch;}
    /* Prevent phantom bottom space on iOS */
    html{height:-webkit-fill-available;}body{min-height:-webkit-fill-available;height:100%;}
    .serif{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;}
    .phone{width:100%;background:#07070f;display:flex;flex-direction:column;color:#e8e0d4;font-size:13px;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0;}
    .notch{display:none;}
    @media(min-width:600px){
      body{display:flex;align-items:center;justify-content:center;background:#04040a;overflow:auto;position:static;}
      html{overflow:auto;position:static;}
      .phone{position:relative;width:390px;height:844px;height:min(844px,95vh);border-radius:46px;border:1.5px solid #252535;box-shadow:0 30px 80px rgba(0,0,0,0.9);top:auto;left:auto;right:auto;bottom:auto;}
      .notch{display:flex;position:absolute;top:12px;left:50%;transform:translateX(-50%);width:100px;height:28px;background:#07070f;border-radius:28px;z-index:100;align-items:center;justify-content:center;}
      .notch-bar{width:52px;height:5px;background:#1a1a2e;border-radius:3px;}
    }
    #inner{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-top:max(env(safe-area-inset-top),0px);padding-bottom:0;font-size:var(--fs-md);}
    @media(min-width:600px){#inner{padding-top:40px;padding-bottom:0;}}
    @supports(padding-bottom:env(safe-area-inset-bottom)){
      .pb-safe{padding-bottom:env(safe-area-inset-bottom)!important;}
    }
    .tap{transition:opacity .15s;}
    .tap:active{opacity:.6;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#252535;border-radius:3px;}
    :root{
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --fs-xs:10px;--fs-sm:11px;--fs-md:13px;--fs-lg:15px;--fs-xl:18px;--fs-2xl:24px;--fs-3xl:28px;
      --sp-xs:6px;--sp-sm:10px;--sp-md:14px;--sp-lg:18px;--sp-xl:24px;
      --btn-h:48px;--nav-h:64px;--radius:14px;
      --poster-sm:40px;--poster-md:56px;--poster-lg:80px;
    }
    @media(max-height:680px){:root{--fs-xs:9px;--fs-sm:10px;--fs-md:12px;--fs-lg:14px;--fs-xl:16px;--fs-2xl:20px;--fs-3xl:24px;--sp-xs:4px;--sp-sm:8px;--sp-md:10px;--sp-lg:14px;--sp-xl:18px;--btn-h:42px;--nav-h:56px;--radius:12px;--poster-sm:36px;--poster-md:48px;--poster-lg:68px;}}
    @media(min-height:900px){:root{--fs-xs:11px;--fs-sm:12px;--fs-md:14px;--fs-lg:16px;--fs-xl:20px;--fs-2xl:26px;--fs-3xl:32px;--sp-xs:8px;--sp-sm:12px;--sp-md:16px;--sp-lg:22px;--sp-xl:28px;--btn-h:54px;--nav-h:72px;--radius:16px;--poster-sm:44px;--poster-md:64px;--poster-lg:90px;}}
    .fs-sm{font-size:var(--fs-sm);}.fs-md{font-size:var(--fs-md);}.fs-lg{font-size:var(--fs-lg);}.fs-xl{font-size:var(--fs-xl);}.fs-2xl{font-size:var(--fs-2xl);}.sp-sm{padding:var(--sp-sm);}.sp-md{padding:var(--sp-md);}
    #inner,#inner *{font-size:inherit;}
    input,button{font-family:'Outfit',sans-serif;}
    /* ── LBD-inspired: horizontal scroll rows ── */
    .row-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 18px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    .row-scroll::-webkit-scrollbar{display:none;}
    /* Poster card large (LBD style) */
    .poster-card-lg{flex-shrink:0;width:110px;cursor:pointer;position:relative;}
    .poster-card-lg .poster-img{width:110px;height:165px;border-radius:10px;overflow:hidden;position:relative;}
    .poster-card-lg .poster-img img{width:100%;height:100%;object-fit:cover;}
    .poster-card-lg .poster-title{font-size:11px;font-weight:500;margin-top:5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .poster-card-lg .poster-meta{font-size:9px;color:#555570;margin-top:2px;}
    /* Hero featured film banner */
    .hero-film{position:relative;height:200px;overflow:hidden;border-radius:0;margin-bottom:0;}
    .hero-film img{width:100%;height:100%;object-fit:cover;filter:brightness(0.5);}
    .hero-film .hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,0.2) 0%,rgba(7,7,15,0.85) 100%);}
    .hero-film .hero-content{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;}
    /* Rating stars (LBD style) */
    .stars{color:#f0c060;letter-spacing:-1px;}
    .stars .empty{color:#2a2a40;}
    /* Section header */
    .section-header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;margin-bottom:8px;}
    .section-title{font-size:clamp(13px,4vw,16px);font-weight:700;letter-spacing:0.2px;}
    .section-more{font-size:clamp(9px,2.8vw,11px);color:#555570;cursor:pointer;}
    /* Activity pill */
    .activity-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:3px 8px 3px 4px;font-size:10px;color:#888898;}
    /* Fade-in animation */
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.3s ease forwards;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  /* ─ iOS bottom safe area: guaranteed fix ─ */
  @media screen and (max-width: 430px) {
    .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 0px) !important; }
  }
  </style>
  <script>
  // Prevent pinch zoom and double-tap zoom on iOS
  document.addEventListener('touchstart', function(e){
    if(e.touches.length > 1) e.preventDefault();
  }, {passive: false});
  var lastTouch = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if(now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
  }, {passive: false});
  </script>
  <script>
  // Run immediately and after every render to fix bottom nav safe area on iOS
  function fixBottomNav(){
    document.querySelectorAll('.bottom-nav').forEach(function(el){
      el.style.setProperty('padding-bottom','env(safe-area-inset-bottom,0px)','important');
    });
  }
  document.addEventListener('DOMContentLoaded', fixBottomNav);
  // Observe DOM mutations to re-apply after dynamic renders
  var _obs = new MutationObserver(fixBottomNav);
  document.addEventListener('DOMContentLoaded', function(){
    _obs.observe(document.getElementById('inner')||document.body, {childList:true,subtree:true});
  });
  </script>
<script>
function applyScale(){
  const h=window.innerHeight,w=window.innerWidth;
  const scaleH=Math.min(h/844,1.3),scaleW=Math.min(w/390,1.2),scale=Math.min(scaleH,scaleW);
  const root=document.documentElement;
  root.style.setProperty('--scale',scale);
  root.style.fontSize=Math.round(13*scale)+'px';
  root.style.setProperty('--fs-xs',Math.round(10*scale)+'px');
  root.style.setProperty('--fs-sm',Math.round(11*scale)+'px');
  root.style.setProperty('--fs-md',Math.round(13*scale)+'px');
  root.style.setProperty('--fs-lg',Math.round(15*scale)+'px');
  root.style.setProperty('--fs-xl',Math.round(18*scale)+'px');
  root.style.setProperty('--fs-2xl',Math.round(24*scale)+'px');
  root.style.setProperty('--fs-3xl',Math.round(28*scale)+'px');
  root.style.setProperty('--sp-xs',Math.round(6*scale)+'px');
  root.style.setProperty('--sp-sm',Math.round(10*scale)+'px');
  root.style.setProperty('--sp-md',Math.round(14*scale)+'px');
  root.style.setProperty('--sp-lg',Math.round(18*scale)+'px');
  root.style.setProperty('--sp-xl',Math.round(24*scale)+'px');
  root.style.setProperty('--btn-h',Math.round(48*scale)+'px');
  root.style.setProperty('--nav-h',Math.round(64*scale)+'px');
  root.style.setProperty('--poster-sm',Math.round(40*scale)+'px');
  root.style.setProperty('--poster-md',Math.round(56*scale)+'px');
  root.style.setProperty('--poster-lg',Math.round(80*scale)+'px');
}
applyScale();
window.addEventListener('resize',applyScale);
</script>

async function initDynamicData(dateStr){
  const isFirstLoad=!DATA_LOADED;

    if(isFirstLoad){

      st.date=dateStr;

}));

  t.textContent=msg;document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});

}

function getDistance(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

const TMDB_GENRE_MAP={28:'action',12:'aventure',16:'animation',35:'comedie',80:'polar',99:'documentaire',18:'drame',10751:'comedie',14:'fantastique',36:'biopic',27:'horreur',10402:'comedie',9648:'thriller',10749:'romance',878:'sci-fi',10770:'drame',53:'thriller',10752:'guerre',37:'aventure'};
const tmdbGenreCache=JSON.parse(localStorage.getItem('cm_genres')||'{}');
async function enrichGenresFromTMDB(){
  const toFetch=Object.entries(FILMS).filter(([id,f])=>!f.genre_enriched&&(!f.g||f.g==='DIVERS'||f.g===''));
  if(toFetch.length===0)return;
  for(let i=0;i<toFetch.length;i+=5){
    const batch=toFetch.slice(i,i+5);
    await Promise.all(batch.map(async([id,f])=>{
      if(tmdbGenreCache[id]){applyGenre(id,tmdbGenreCache[id]);return;}
      try{const q=encodeURIComponent(f.t);const r=await fetch(`https://api.themoviedb.org/3/search/movie?query=${q}&language=fr-FR&page=1`,{headers:{Authorization:'Bearer '+TMDB_TOKEN}});const data=await r.json();const movie=data.results?.[0];if(movie?.genre_ids?.length){const genre=TMDB_GENRE_MAP[movie.genre_ids[0]]||'divers';tmdbGenreCache[id]=genre;applyGenre(id,genre);if(!posters[id]&&movie.poster_path)posters[id]=TMDB_IMG+movie.poster_path;if(!ratings[id]&&movie.vote_average>0)ratings[id]={note:movie.vote_average.toFixed(1)};}}catch(e){}
    }));
  }
  try{localStorage.setItem('cm_genres',JSON.stringify(tmdbGenreCache));}catch(e){}
  if(['home','film'].includes(st.screen))render();
}
function applyGenre(id,genre){if(!FILMS[id])return;FILMS[id].g=genre.charAt(0).toUpperCase()+genre.slice(1);FILMS[id].e=genreEmoji(genre);FILMS[id].genre_enriched=true;}

function normTitle(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function filmInLbd(filmId,list){const f=FILMS[filmId];if(!f)return false;const titles=[f.t,...(f.alt||[])].map(normTitle);for(const t of list){for(const n of titles){if(t.includes(n)||n.includes(t))return true;}}return false;}

async function annulerConfirmation(){if(!st.groupe)return;await supa.from('groupes').update({confirmed_cinema:null,confirmed_heure:null,confirmed_date:null}).eq('id',st.groupe);groupeInfo={};render();}
async function setStatut(s){if(!st.groupe||!st.pseudo)return;await supa.from('groupe_membres').update({statut:s}).eq('groupe',st.groupe).eq('user_id',st.userId);await loadMembres();}
async function postAvis(note){if(!st.groupe||!st.pseudo)return;const input=document.getElementById('avis-input');const commentaire=input?input.value.trim():'';const avis=JSON.stringify({note,commentaire,ts:Date.now()});await supa.from('groupe_membres').update({avis}).eq('groupe',st.groupe).eq('user_id',st.userId);await loadMembres();render();if(st.tab==='vote')renderVotesDOM();}
function subscribeAll(){
  if(realtimeChannel){supa.removeChannel(realtimeChannel);realtimeChannel=null;}
  if(votesChannel){supa.removeChannel(votesChannel);votesChannel=null;}
  const g=st.groupe||'general';
  realtimeChannel=supa.channel('db-msg-'+g).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>appendMsg(p.new)).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>{if(p.new.reactions!==undefined){reactionsData[p.new.id]=p.new.reactions||[];refreshReactionsDOM();}}).subscribe();
  votesChannel=supa.channel('db-votes-'+g).on('postgres_changes',{event:'*',schema:'public',table:'votes',filter:`groupe=eq.${g}`},async()=>await loadVotes()).on('postgres_changes',{event:'UPDATE',schema:'public',table:'groupes',filter:`id=eq.${g}`},async()=>{await loadGroupeInfo();render();if(st.tab==='vote')renderVotesDOM();if(st.tab==='membres')renderMembresDOM();}).subscribe();
}
function appendMsg(m){const ca=document.getElementById('chat-area');if(!ca)return;ca.insertAdjacentHTML('beforeend',msgHTML(m));ca.scrollTop=ca.scrollHeight;}
const REACTION_EMOJIS=['❤️','😂','🔥','👏','😮','🎬'];
async function loadReactions(){const g=st.groupe||'general';const{data}=await supa.from('messages').select('id,reactions').eq('groupe',g);reactionsData={};(data||[]).forEach(m=>{if(m.reactions)reactionsData[m.id]=m.reactions;});refreshReactionsDOM();}
function refreshReactionsDOM(){document.querySelectorAll('[data-reactions]').forEach(el=>{el.innerHTML=reactionsHTML(el.dataset.reactions);});}
function reactionsHTML(msgId){const reacts=reactionsData[msgId]||[];const grouped={};reacts.forEach(r=>{if(!grouped[r.emoji])grouped[r.emoji]=[];grouped[r.emoji].push(r.pseudo);});const myReact=reacts.find(r=>r.pseudo===st.pseudo)?.emoji;let html=Object.entries(grouped).map(([e,users])=>`<span onclick="toggleReaction('${msgId}','${e}')" style="display:inline-flex;align-items:center;gap:3px;background:${myReact===e?'rgba(255,63,91,0.15)':'rgba(255,255,255,0.06)'};border:1px solid ${myReact===e?AC:BD};border-radius:20px;padding:2px 7px;font-size:clamp(9px,2.8vw,12px);cursor:pointer;">${e}<span style="font-size:9px;color:${MU};">${users.length}</span></span>`).join('');html+=`<span onclick="showReactionPicker('${msgId}')" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:rgba(255,255,255,0.04);border:1px solid ${BD};border-radius:50%;font-size:clamp(9px,2.8vw,12px);cursor:pointer;opacity:0.5;">+</span>`;return html;}
function showReactionPicker(msgId){const existing=document.getElementById('rpicker');if(existing){existing.remove();return;}const picker=document.createElement('div');picker.id='rpicker';picker.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:8px 12px;display:flex;gap:8px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.5);';picker.innerHTML=REACTION_EMOJIS.map(e=>`<span onclick="toggleReaction('${msgId}','${e}');document.getElementById('rpicker')?.remove();" style="font-size:clamp(18px,5.6vw,24px);cursor:pointer;">${e}</span>`).join('');document.body.appendChild(picker);setTimeout(()=>picker.remove(),4000);}
async function toggleReaction(msgId,emoji){const reacts=reactionsData[msgId]||[];const existing=reacts.find(r=>r.pseudo===st.pseudo&&r.emoji===emoji);let newReacts;if(existing){newReacts=reacts.filter(r=>!(r.pseudo===st.pseudo&&r.emoji===emoji));}else{const withoutMe=reacts.filter(r=>r.pseudo!==st.pseudo);newReacts=[...withoutMe,{emoji,pseudo:st.pseudo}];}reactionsData[msgId]=newReacts;refreshReactionsDOM();await supa.from('messages').update({reactions:newReacts}).eq('id',msgId);}
function pseudoColor(p){const h=[...p].reduce((a,c)=>a+c.charCodeAt(0),0);const colors=['#e54','#d4a','#59e','#4b9','#e84','#a5e','#4ce','#e75'];return colors[h%colors.length];}
function pseudoInitial(p){return(p||'?')[0].toUpperCase();}
function getAvatar(pseudo){if(pseudo===st.pseudo)return st.avatar;const m=membresData.find(m=>m.pseudo===pseudo);return m?.avatar||null;}
function avatarEl(pseudo,size=38,radius='50%'){const av=getAvatar(pseudo);if(av)return `<div style="width:${size}px;height:${size}px;border-radius:${radius};background:${pseudoColor(pseudo)};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.52)}px;flex-shrink:0;">${av}</div>`;return `<div style="width:${size}px;height:${size}px;border-radius:${radius};background:${pseudoColor(pseudo)};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.42)}px;font-weight:700;color:#fff;flex-shrink:0;">${pseudoInitial(pseudo)}</div>`;}
function chip(txt,c=TX,bg='rgba(255,255,255,0.06)',b=BD,sz=10){return `<span style="font-size:${sz}px;padding:2px 7px;border-radius:20px;border:1px solid ${b};background:${bg};color:${c};white-space:nowrap;">${txt}</span>`;}
function isPast(heure){const now=new Date();const[h,m]=heure.replace('h',':').split(':').map(Number);const t=new Date();t.setHours(h,m,0,0);if(st.date!==todayStr())return false;return t<now;}
async function changeDate(ds){st.date=ds;await initDynamicData(ds);render();}
function dayPicker(){
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  let html='<div style="display:flex;gap:6px;overflow-x:auto;padding:0 18px 12px;flex-shrink:0;">';
  const dates=AVAILABLE_DATES.length?AVAILABLE_DATES:[st.date];
  for(const ds of dates){
    const d=new Date(ds+'T12:00:00');const active=ds===st.date;
    html+=`<div onclick="changeDate('${ds}')" style="flex-shrink:0;width:44px;text-align:center;padding:7px 4px;border-radius:12px;cursor:pointer;background:${active?AC:'rgba(255,255,255,0.03)'};border:1px solid ${active?AC:BD};"><div style="font-size:9px;color:${active?'#fff':MU};">${days[d.getDay()]}</div><div style="font-size:clamp(13px,3.8vw,16px);font-weight:600;color:${active?'#fff':TX};">${d.getDate()}</div><div style="font-size:9px;color:${active?'rgba(255,255,255,0.7)':MU};">${months[d.getMonth()]}</div></div>`;
  }
  return html+'</div>';
}
</script>

<script>
// ═══════════ WANT TO SEE ═══════════
function getWantToSee(){try{return JSON.parse(localStorage.getItem('cm_want_'+(st.pseudo||''))||'[]');}catch(e){return[];}}
function toggleWantToSee(filmId){let list=getWantToSee();if(list.includes(filmId))list=list.filter(x=>x!==filmId);else list=[filmId,...list];try{localStorage.setItem('cm_want_'+(st.pseudo||''),JSON.stringify(list));}catch(e){}render();}
// ═══════════ SEARCH HISTORY ═══════════
function showSearchHistory(){const hist=getSearchHistory();if(!hist.length||st.search)return;const drop=document.getElementById('search-history-dropdown');if(!drop)return;drop.innerHTML=`<div style="position:absolute;top:4px;left:0;right:0;background:#16162a;border:1px solid ${BD};border-radius:14px;overflow:hidden;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.5);"><div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid ${BD};"><span style="font-size:9px;color:${MU};letter-spacing:1.5px;text-transform:uppercase;">Recherches récentes</span><span onclick="clearSearchHistory()" style="font-size:9px;color:${MU};cursor:pointer;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,0.06);">Effacer</span></div>${hist.map((h,i)=>`<div onmousedown="useSearch(getSearchHistory()[${i}])" style="padding:9px 12px;font-size:clamp(10px,3vw,13px);color:${TX};cursor:pointer;display:flex;align-items:center;gap:8px;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background=''"><span style="font-size:clamp(9px,2.8vw,12px);color:${MU};">🕐</span>${h}</div>`).join('')}</div>`;}
function hideSearchHistory(){const drop=document.getElementById('search-history-dropdown');if(drop)drop.innerHTML='';}
function renderSearchResults(){const inp=document.getElementById('search-input');const val=inp?inp.value:'';const pos=inp?inp.selectionStart:0;render();requestAnimationFrame(()=>{const el=document.getElementById('search-input');if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}});}
function getSearchHistory(){try{const key='cm_searches_'+(st.pseudo||'_');return JSON.parse(localStorage.getItem(key)||'[]');}catch(e){return[];}}
function saveSearch(q){if(!q||q.trim().length<2)return;q=q.trim();try{const key='cm_searches_'+(st.pseudo||'_');let hist=getSearchHistory();hist=hist.filter(h=>h!==q);hist.unshift(q);hist=hist.slice(0,8);localStorage.setItem(key,JSON.stringify(hist));}catch(e){}}
function clearSearchHistory(){try{localStorage.removeItem('cm_searches_'+(st.pseudo||'_'));}catch(e){}st.search='';render();}
function useSearch(q){st.search=q;st.showSearchHistory=false;render();}
function setGenre(g){st.genre=g;st.search='';st.showSearchHistory=false;render();}
// ═══════════ HOME — LETTERBOXD-INSPIRED ═══════════
function sHome(){
  const tab=st.homeTab||'sorties';
  const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const mySortieIds=new Set(mesGroupes.map(g=>g.id));
  const navbar=`<div style="display:flex;background:${S1};border-top:1px solid ${BD};position:fixed;bottom:0;left:0;right:0;z-index:1000;" class="bottom-nav">
    ${[['home','🍿',T('sorties').slice(3)],['cinemas','🏛',T('cinemas').slice(3)],['group','👥',T('groupes').slice(3)],['profile','👤',T('profil').slice(3)]].map(([sc,ic,lb])=>`<div onclick="${sc==='group'?`go('group')`:`go('${sc}')`}" style="flex:1;padding:8px 0 4px;text-align:center;cursor:pointer;opacity:${st.screen===sc||tab==='sorties'&&sc==='home'?1:0.45};"><div style="font-size:clamp(15px,4.6vw,20px);position:relative;display:inline-block;">${ic}${sc==='group'&&mesGroupes.length?`<div style="position:absolute;top:-3px;right:-5px;width:7px;height:7px;border-radius:50%;background:${AC};border:1.5px solid #07070f;"></div>`:''}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
  </div>`;
  const header=`
    <div style="padding:50px 18px 0;flex-shrink:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:clamp(9px,2.8vw,12px);color:${MU};letter-spacing:2px;text-transform:uppercase;">${T('bonsoir')}</div>
          <div class="serif" style="font-size:clamp(18px,5.6vw,24px);display:flex;align-items:center;gap:8px;">${st.pseudo} <span style="color:${AC}">👋</span>
            <div style="position:relative;display:inline-flex;align-items:center;">
              <select onchange="st.lang=this.value;save();render()" style="background:${S1};border:1px solid ${BD};border-radius:8px;padding:3px 20px 3px 6px;font-size:clamp(9px,2.8vw,12px);color:${TX};cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;font-family:inherit;">
                <option value="fr" ${st.lang==='fr'?'selected':''}>🇫🇷</option>
                <option value="en" ${st.lang==='en'?'selected':''}>🇬🇧</option>
              </select>
              <div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:7px;color:${MU};pointer-events:none;">▼</div>
            </div>
          </div>
        </div>
        <div onclick="go('profile')" style="display:flex;align-items:center;gap:7px;background:${S1};border:1px solid ${BD};border-radius:18px;padding:5px 10px 5px 5px;cursor:pointer;">
          ${avatarEl(st.pseudo,26)}
          <span style="font-size:clamp(9px,2.8vw,12px);">@${st.pseudo.toLowerCase().replace(/\s+/g,'')} <span style="color:${LB}">✓</span></span>
        </div>
      </div>
      <div style="display:flex;gap:0;background:${S1};border:1px solid ${BD};border-radius:14px;padding:3px;margin-bottom:2px;">
        <div onclick="st.homeTab='sorties';render()" style="flex:1;text-align:center;padding:7px;border-radius:11px;cursor:pointer;font-size:clamp(10px,3vw,13px);font-weight:600;background:${tab==='sorties'?AC:'transparent'};color:${tab==='sorties'?'#fff':MU};transition:all .2s;">${T('sorties')}</div>
        <div onclick="st.homeTab='films';st.search='';render()" style="flex:1;text-align:center;padding:7px;border-radius:11px;cursor:pointer;font-size:clamp(10px,3vw,13px);font-weight:600;background:${tab==='films'?S2:'transparent'};color:${tab==='films'?TX:MU};transition:all .2s;">${T('films')}</div>
      </div>
    </div>`;
  if(tab==='films'){
    const allFilms=Object.entries(FILMS);
    const genresList=T('genres');
    const searchQ=norm(st.search||'');
    const activeGenre=st.genre||'tous';
    const filmGenre=id=>{const f=FILMS[id];return f?norm(f.g):'';};
    const filtered=allFilms.filter(([id,f])=>{
      const gn=norm(activeGenre);
      const genreOk=activeGenre==='tous'||filmGenre(id).includes(gn)||filmGenre(id).includes(gn.replace('comedie','comedi'));
      const searchOk=!searchQ||norm(f.t).includes(searchQ)||norm(f.dir||'').includes(searchQ)||norm(f.g).includes(searchQ)||norm(f.s||'').includes(searchQ);
      return genreOk&&searchOk;
    });
    const sortedByRating=[...allFilms].sort((a,b)=>{const ra=parseFloat(ratings[a[0]]?.note||0);const rb=parseFloat(ratings[b[0]]?.note||0);return rb-ra;});
    const topFilms=sortedByRating.slice(0,10);
    const filmIdsWithSorties=new Set(sortiesPubliques.map(s=>s.film_id));
    const filmsWithSorties=allFilms.filter(([id])=>filmIdsWithSorties.has(id));
    const heroEntry=allFilms.find(([id,f])=>posters[id])||allFilms[0];
    const heroId=heroEntry?.[0],heroFilm=heroEntry?.[1];
    const isSearching=searchQ.length>0;
    const isFiltering=activeGenre!=='tous';
    return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${header}
      <div style="padding:10px 18px 0;flex-shrink:0;">
        <div style="position:relative;margin-bottom:10px;">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:clamp(11px,3.3vw,14px);pointer-events:none;">🔍</span>
          <input id="search-input" placeholder="Titre, réalisateur, genre…" value="${st.search||''}"
            oninput="st.search=this.value;renderSearchResults()"
            onfocus="showSearchHistory()"
            onblur="setTimeout(hideSearchHistory,200)"
            onkeydown="if(event.key==='Enter'){saveSearch(st.search);hideSearchHistory();}"
            style="width:100%;background:${S1};border:1px solid ${BD};border-radius:20px;padding:8px 32px 8px 34px;font-size:clamp(10px,3vw,13px);color:${TX};outline:none;box-sizing:border-box;">
          ${(st.search||'')?`<span onclick="st.search='';render();" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:clamp(10px,3vw,13px);color:${MU};cursor:pointer;">✕</span>`:''}
          <div id="search-history-dropdown" style="position:relative;"></div>
        </div>
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;">
          ${genresList.map(([id,lb])=>`<div onclick="setGenre('${id}')" style="border-radius:20px;padding:5px 12px;font-size:clamp(9px,2.8vw,12px);font-weight:500;cursor:pointer;border:1px solid ${activeGenre===id?AC:BD};background:${activeGenre===id?AC:'rgba(255,255,255,0.03)'};color:${activeGenre===id?'#fff':MU};white-space:nowrap;flex-shrink:0;">${lb}</div>`).join('')}
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding-bottom:80px;">
        ${(isSearching||isFiltering)?`
          ${filtered.length===0?`<div style="text-align:center;padding:40px 20px;color:${MU};"><div style="font-size:clamp(28px,9vw,40px);margin-bottom:10px;">🔍</div><div style="font-size:clamp(11px,3.3vw,14px);">${T('aucunFilmTrouve')}</div></div>`:''}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 20px;">
            ${filtered.map(([id,f])=>`
              <div onclick="openFilm('${id}','home')" class="tap" style="cursor:pointer;">
                <div style="height:120px;border-radius:10px;overflow:hidden;background:${f.bg};position:relative;">
                  ${posters[id]?`<img src="${posters[id]}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">`:
                  `<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);font-size:36px;">${f.e}</span>`}
                  ${isVu(id)?'<div style="position:absolute;top:4px;right:4px;background:rgba(0,192,48,0.9);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:8px;">✓</div>':''}
                </div>
                <div style="padding:4px 2px;">
                  <div style="font-size:9px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${f.t}</div>
                  ${ratings[id]?`<div style="margin-top:2px;">${starsHTML(ratings[id].note,5,8)}</div>`:''}
                </div>
              </div>`).join('')}
          </div>
        `:`
          ${heroFilm?`
          <div class="hero-film" onclick="openFilm('${heroId}','home')" style="cursor:pointer;margin-bottom:20px;position:relative;height:185px;overflow:hidden;">
            ${posters[heroId]?`<img src="${posters[heroId]}" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.45);">`:`<div style="width:100%;height:100%;background:${heroFilm.bg};"></div>`}
            <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,0.1) 0%,rgba(7,7,15,0.88) 100%);"></div>
            <div style="position:absolute;bottom:0;left:0;right:0;padding:14px 18px;">
              <div style="font-size:9px;color:${GD};letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">✦ À l'affiche</div>
              <div class="serif" style="font-size:clamp(17px,5vw,22px);margin-bottom:4px;">${heroFilm.t}</div>
              <div style="display:flex;align-items:center;gap:8px;">
                ${ratings[heroId]?`<div>${starsHTML(ratings[heroId].note,5,11)}</div>`:''}
                <span style="font-size:9px;color:${MU};">${heroFilm.g}${heroFilm.d?' · '+heroFilm.d:''}</span>
              </div>
            </div>
          </div>`:''}
          ${filmsWithSorties.length>0?`
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">🍿 Sorties en cours</div>
              <div class="section-more" onclick="st.homeTab='sorties';render();">Voir tout →</div>
            </div>
            <div class="row-scroll">
              ${filmsWithSorties.slice(0,8).map(([id,f])=>posterCardLg(id,f,`openFilm('${id}','home')`)).join('')}
            </div>
          </div>`:''}
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">🎬 En salle</div>
              <div class="section-more" onclick="setGenre('tous');">Tous →</div>
            </div>
            <div class="row-scroll">
              ${allFilms.slice(0,12).map(([id,f])=>posterCardLg(id,f)).join('')}
            </div>
          </div>
          ${topFilms.length>0&&ratings[topFilms[0]?.[0]]?`
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">⭐ Mieux notés</div>
            </div>
            <div class="row-scroll">
              ${topFilms.map(([id,f])=>posterCardLg(id,f)).join('')}
            </div>
          </div>`:''}
          ${st.lbdPseudo&&lbdWatchlist.size>0?`
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">🔖 Votre watchlist</div>
              <div class="section-more" style="color:${GD};">@${st.lbdPseudo}</div>
            </div>
            <div class="row-scroll">
              ${allFilms.filter(([id])=>isWatchlist(id)).slice(0,8).map(([id,f])=>posterCardLg(id,f)).join('')}
            </div>
          </div>`:''}
        `}
        <div style="height:10px;"></div>
      </div>
      ${navbar}
    </div>`;
  }
  // TAB SORTIES
  const sortieCard=(s)=>{
    const film=FILMS[s.film_id]||{t:s.nom,e:'🎬',g:'',d:'',bg:'#111'};
    const cinema=CINEMAS.find(c=>c.id===s.confirmed_cinema);
    const chainColor=CC[cinema?.chain]||MU;
    const dist=(userPos&&cinema?.lat&&cinema?.lng)?getDistance(userPos.lat,userPos.lng,cinema.lat,cinema.lng):null;
    const distStr=dist!==null?distLabel(dist):null;
    const nb=s._nb||0,max=s.max_membres||8,restantes=max-nb;
    const isMine=mySortieIds.has(s.id),isFull=nb>=max,isCreator=s.createur===st.pseudo;
    const isHot=!isFull&&restantes<=2&&restantes>0;
