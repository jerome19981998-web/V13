  const cinemaSelector=`<div style="padding:12px 18px 0;"><div style="font-size:9px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Choisir le cinéma</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px;">${cinemasFilm.map(c=>{const active=st.cinema===c.id;const col=CC[c.chain]||MU;const votes_c=membresData.filter(m=>m.cinema_pref===c.id).length;const pct=membresData.length>0?Math.round(votes_c/membresData.length*100):0;return `<div onclick="voterCinema('${c.id}')" style="padding:9px 12px;border-radius:12px;cursor:pointer;background:${active?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.02)'};border:1px solid ${active?col:BD};"><div style="display:flex;align-items:center;gap:10px;margin-bottom:${votes_c>0?'7px':'0'};"><div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0;"></div><div style="flex:1;font-size:clamp(10px,3vw,13px);font-weight:${active?'600':'400'};color:${active?TX:MU};">${c.name}</div>${votes_c>0?`<div style="font-size:clamp(8px,2.5vw,11px);color:${col};font-weight:600;">${votes_c} vote${votes_c>1?'s':''}</div>`:''}${active?`<div style="font-size:clamp(8px,2.5vw,11px);color:${col};">✓</div>`:''}</div>${votes_c>0?`<div style="height:3px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:2px;transition:width 0.3s;"></div></div>`:''}</div>`;}).join('')}</div></div>`;

}

  <div style="flex:1;overflow-y:auto;padding:0 18px 80px;">

  const groupesActifs=mesGroupes.length,groupesConfirmes=mesGroupes.filter(g=>g.confirmed_heure).length,wantCount=getWantToSee().filter(id=>FILMS[id]).length;
  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;"><div style="padding:52px 18px 12px;flex-shrink:0;">
    <div class="serif" style="font-size:clamp(18px,5.6vw,24px);margin-bottom:14px;">Mon profil</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div onclick="st.showAvatarPicker=!st.showAvatarPicker;render();" style="width:62px;height:62px;border-radius:17px;background:${pseudoColor(st.pseudo)};display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;cursor:pointer;position:relative;">${st.avatar}<div style="position:absolute;bottom:-4px;right:-4px;background:${S2};border:1px solid ${BD};border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:clamp(8px,2.5vw,11px);">✏️</div></div>
      <div><div style="font-size:clamp(15px,4.6vw,20px);font-weight:600;">${st.pseudo}</div><div style="font-size:clamp(9px,2.8vw,12px);color:${MU};margin-bottom:6px;">@${st.pseudo.toLowerCase().replace(/\s+/g,'')}</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:4px;">
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;"><div style="font-size:clamp(17px,5vw,22px);font-weight:700;color:${AC};">${groupesActifs}</div><div style="font-size:9px;color:${MU};">groupe${groupesActifs!==1?'s':''}</div></div>
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;"><div style="font-size:clamp(17px,5vw,22px);font-weight:700;color:${LB};">${groupesConfirmes}</div><div style="font-size:9px;color:${MU};">plans confirmés</div></div>
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;"><div style="font-size:clamp(17px,5vw,22px);font-weight:700;color:${GD};">${vuCount}</div><div style="font-size:9px;color:${MU};">films vus</div></div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 80px;">
    ${st.showAvatarPicker?buildPickerGrid():''}
    <div onclick="go('want-to-see')" style="display:flex;align-items:center;justify-content:space-between;background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;"><div style="display:flex;align-items:center;gap:10px;"><div style="font-size:clamp(17px,5vw,22px);">❤️</div><div><div style="font-size:clamp(11px,3.3vw,14px);font-weight:600;">Je veux voir</div><div style="font-size:clamp(8px,2.5vw,11px);color:${MU};">${wantCount} film${wantCount!==1?'s':''} dans ta liste</div></div></div><div style="font-size:clamp(12px,3.6vw,15px);color:${MU};">›</div></div>
    ${lbdBlock}${changePseudoBlock}
    <button onclick="logoutApp()" style="width:100%;background:rgba(255,63,91,0.06);border:1px solid rgba(255,63,91,0.25);border-radius:14px;padding:12px;font-size:clamp(10px,3vw,13px);color:${AC};cursor:pointer;text-align:left;margin-top:4px;">🚪 &nbsp;${T('deconnexion')}</button>
    <button onclick="deleteAccount()" style="width:100%;background:transparent;border:none;border-radius:14px;padding:10px;font-size:clamp(9px,2.8vw,12px);color:rgba(255,63,91,0.4);cursor:pointer;text-align:center;margin-top:2px;">Supprimer mon compte</button>
  </div>
  <div style="display:flex;background:${S1};border-top:1px solid ${BD};position:fixed;bottom:0;left:0;right:0;z-index:1000;" class="bottom-nav">${[['home','🍿',T('sorties').slice(3)],['cinemas','🏛',T('cinemas').slice(3)],['group','👥',T('groupes').slice(3)],['profile','👤',T('profil').slice(3)]].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:8px 0 4px;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:clamp(15px,4.6vw,20px);position:relative;display:inline-block;">${ic}${sc==='group'&&mesGroupes.some(g=>g.confirmed_heure)?'<div style="position:absolute;top:-3px;right:-5px;width:7px;height:7px;border-radius:50%;background:#00c030;border:1.5px solid #07070f;"></div>':''}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}</div></div>`;
}

function sMemberProfile(){
  const pseudo=st.viewedMember;const lbd=membresLbd[pseudo];
  let commonFilms=[];if(lbd&&st.lbdPseudo)commonFilms=Object.entries(FILMS).filter(([id])=>isVu(id)&&filmInLbd(id,lbd.seen)).map(([id,f])=>f.t);
  return `<div style="padding:52px 18px 12px;flex-shrink:0;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><div onclick="st.screen='group';render();" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;">←</div><div class="serif" style="font-size:clamp(17px,5vw,22px);">${pseudo}</div></div></div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 80px;">
    <div style="display:flex;justify-content:center;margin-bottom:20px;">${avatarEl(pseudo,72,'18px')}</div>
    <div style="text-align:center;margin-bottom:20px;"><div style="font-size:clamp(17px,5vw,22px);font-weight:600;">${pseudo}</div></div>
    ${(()=>{const moi=membresData.find(m=>m.pseudo===pseudo);const statut=moi?.statut||'maybe';const STATUTS={yes:{e:'✅',l:T('jeViens')},maybe:{e:'❓',l:T('peutEtre')},no:{e:'❌',l:T('jePeuxPas')}};const s=STATUTS[statut];const cinema_pref=moi?.cinema_pref?CINEMAS.find(c=>c.id===moi.cinema_pref)?.name:'';return `<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:14px;"><div style="display:flex;gap:12px;align-items:center;"><span style="font-size:clamp(11px,3.3vw,14px);padding:5px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid ${BD};">${s.e} ${s.l}</span>${cinema_pref?`<span style="font-size:clamp(9px,2.8vw,12px);color:${MU};">🏛 ${cinema_pref}</span>`:''}</div></div>`;})()}
    ${lbd?`<div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px;margin-bottom:14px;"><div style="font-size:clamp(9px,2.8vw,12px);color:${LB};font-weight:600;margin-bottom:10px;">Letterboxd</div><div style="display:flex;gap:12px;margin-bottom:${commonFilms.length?'10px':'0'};">${chip('✓ '+lbd.seen.size+' vus',LB,'rgba(0,192,48,0.12)','rgba(0,192,48,0.3)',10)}${chip('🔖 '+lbd.wl.size+' watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',10)}</div>${commonFilms.length?`<div><div style="font-size:clamp(8px,2.5vw,11px);color:${MU};margin-bottom:6px;">Films que vous avez tous les deux vus :</div>${commonFilms.slice(0,5).map(t=>`<div style="font-size:clamp(9px,2.8vw,12px);padding:4px 0;border-bottom:1px solid ${BD};">✓ ${t}</div>`).join('')}${commonFilms.length>5?`<div style="font-size:clamp(8px,2.5vw,11px);color:${MU};margin-top:4px;">+${commonFilms.length-5} autres</div>`:''}</div>`:''}</div>`:`<div style="text-align:center;padding:20px;color:${MU};font-size:clamp(10px,3vw,13px);background:${S1};border:1px solid ${BD};border-radius:14px;margin-bottom:14px;">Letterboxd non connecté</div>`}
  </div>`;
}

// ═══════════ NAVIGATION ═══════════
function go(sc){if(sc==='group')st.groupe=null;st.screen=sc;render();}
function openFilm(id,src){st.film=id;st.filmSrc=src||'home';st.screen='film';render();}
function openCinema(id){st.cinema=id;st.screen='cinema-detail';render();}
async function selectGroupe(filmId,groupeId){await openGroup(filmId,groupeId);}
async function openGroup(filmId,groupeId){
  st.film=filmId;
  if(groupeId){st.groupe=groupeId;}
  else{const{data:existing}=await supa.from('groupes').select('id').eq('film_id',filmId).limit(1);if(existing&&existing.length>0){st.groupe=existing[0].id;}else{await supa.from('groupes').insert({film_id:filmId,nom:FILMS[filmId]?.t||filmId,createur:st.pseudo,user_id:st.userId});const{data:fresh}=await supa.from('groupes').select('id').eq('film_id',filmId).limit(1);if(fresh&&fresh.length>0)st.groupe=fresh[0].id;}}
  st.screen='group';st.tab='chat';st.voted=null;st.cinema=null;render();rejoindreGroupe();loadMessages();loadVotes();loadGroupeInfo();subscribeAll();loadMesGroupes();
}
function openMemberProfile(pseudo){st.viewedMember=pseudo;st.screen='member-profile';render();loadMemberLbd(pseudo).then(()=>render());}
async function doSync(){st.syncing=true;render();await new Promise(r=>setTimeout(r,1200));st.syncing=false;st.syncLabel="à l'instant";render();}

// ═══════════ RENDER ═══════════
function render(){
  const inner=document.getElementById('inner');if(!inner)return;
  if(st.screen==='create-sortie'){const cs=document.getElementById('create-sortie-scroll');if(cs)createSortieScroll=cs.scrollTop;}
  if(st.screen==='loading')inner.innerHTML=sLoading();
  else if(st.screen==='auth')inner.innerHTML=sAuth();
  else if(!st.userId){st.screen='auth';inner.innerHTML=sAuth();}
  else if(st.screen==='pseudo')inner.innerHTML=sPseudo();
  else if(st.screen==='home')inner.innerHTML=sHome();
  else if(st.screen==='cinemas')inner.innerHTML=sCinemas();
  else if(st.screen==='cinema-detail')inner.innerHTML=sCinemaDetail();
  else if(st.screen==='film')inner.innerHTML=sFilm();
  else if(st.screen==='group'){inner.innerHTML=sGroup();if(st.groupe&&st.tab==='vote')renderVotesDOM();else if(st.groupe&&st.tab==='membres')renderMembresDOM();else if(st.groupe&&st.tab==='chat')loadMessages();}
  else if(st.screen==='profile')inner.innerHTML=sProfile();
  else if(st.screen==='want-to-see')inner.innerHTML=sWantToSee();
  else if(st.screen==='member-profile')inner.innerHTML=sMemberProfile();
  else if(st.screen==='create-sortie'){inner.innerHTML=sCreateSortie();const cs=document.getElementById('create-sortie-scroll');if(cs)requestAnimationFrame(()=>{cs.scrollTop=createSortieScroll;});}
}

// ═══════════ INIT ═══════════
(function handleInvite(){
  const params=new URLSearchParams(window.location.search);const gid=params.get('groupe'),fid=params.get('film');
  if(gid&&fid&&st.pseudo){history.replaceState({},'','/');openGroup(fid,gid);}
  else if(gid&&fid){st._inviteGroupe=gid;st._inviteFilm=fid;}
})();

(async function init(){
  document.getElementById('inner').innerHTML=`<div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0f;"><div style="font-size:clamp(28px,9vw,40px);">🎬</div><div style="font-size:clamp(11px,3.3vw,14px);color:#666;letter-spacing:2px;">Chargement des séances…</div></div>`;
  await initDynamicData(st.date);render();
  if(st.pseudo){loadMesGroupes();loadSorties();if(st.lbdPseudo)loadLbd(st.lbdPseudo);}
  loadPosters();enrichGenresFromTMDB();
})();

setInterval(()=>{
  if(st.screen==='cinemas'||st.screen==='cinema-detail'||st.screen==='group')render();
  document.querySelectorAll('[data-countdown]').forEach(el=>{const[d,h]=el.dataset.countdown.split('|');el.textContent=countdown(d,h);});
},30*1000);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      setInterval(()=>reg.update(),60000);
      reg.addEventListener('updatefound',()=>{const newSW=reg.installing;newSW.addEventListener('statechange',()=>{if(newSW.state==='installed'&&navigator.serviceWorker.controller)newSW.postMessage({type:'SKIP_WAITING'});});});
    }).catch(e=>console.log('SW erreur:',e));
    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{if(!refreshing){refreshing=true;window.location.reload();}});
    navigator.serviceWorker.addEventListener('message',e=>{if(e.data?.type==='SW_UPDATED'&&!refreshing){refreshing=true;window.location.reload();}});
  });
}
let _deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_deferredPrompt=e;const banner=document.getElementById('install-banner');if(banner)banner.style.display='block';});
window.installPWA=async()=>{if(!_deferredPrompt)return;_deferredPrompt.prompt();await _deferredPrompt.userChoice;_deferredPrompt=null;const banner=document.getElementById('install-banner');if(banner)banner.style.display='none';};
</script>
