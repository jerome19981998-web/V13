<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CinéMatch - Test sans Supabase</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body { background:#0a0a0f; color:#f0f0f5; font-family:'Inter',sans-serif; margin:0; }
    .font-serif { font-family:'Playfair Display',serif; }
    .phone { 
      width:100%; max-width:390px; margin:20px auto; height:844px; 
      background:#07070f; border-radius:48px; overflow:hidden; 
      border:12px solid #000; box-shadow:0 40px 100px rgba(0,0,0,0.8); 
      position:relative; 
    }
    .notch { 
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      width:130px; height:32px; background:#000; border-radius:32px; z-index:50; 
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="app"></div>

<script>
// Log pour savoir où ça bloque
console.log("Script démarré - ligne 1");

let state = {
  username: "TestUser",
  messages: ["Message 1", "Message 2"]
};

console.log("State OK - ligne 5");

const root = document.getElementById('app');
if (!root) {
  console.error("#app introuvable");
  document.body.innerHTML += '<div style="color:red; padding:40px;">#app introuvable</div>';
} else {
  console.log("Root trouvé - ligne 12");

  const phone = document.createElement('div');
  phone.className = 'phone relative flex flex-col text-white overflow-hidden';

  phone.innerHTML = `
    <div class="notch"></div>
    <div class="flex flex-col h-full items-center justify-center p-6 text-center">
      <h1 class="text-4xl font-serif text-pink-500 mb-6">CinéMatch</h1>
      <p class="text-2xl mb-4">Affichage de base OK !</p>
      <p class="text-lg mb-8">Le serveur et le JS tournent.</p>
      <div class="bg-[#1a1a24] p-6 rounded-xl w-full max-w-xs">
        <p class="text-xl mb-4">Messages de test :</p>
        ${state.messages.map(msg => `<p class="text-lg mb-2">${msg}</p>`).join('')}
      </div>
    </div>
  `;

  root.appendChild(phone);
  console.log("Rendu terminé - ligne 35");
}
</script>
</body>
</html>
