const posters  = {};

const ratings  = {}; // filmId -> {note, votes}
const trailers = {}; // filmId -> youtube key

async function loadPosters() {
  await Promise.all(Object.entries(FILMS).map(async ([id, f]) => {
    try {
      const q = encodeURIComponent(f.t.replace(/[^\w\s]/g,' ').trim());
      const r = await fetch(
        `https://api.themoviedb.org/3/search/movie?query=${q}&language=fr-FR&page=1`,
        { headers: { Authorization: `Bearer ${TMDB_TOKEN}` } }
      );
      const d = await r.json();
      const hit = d.results?.[0];
      if(!hit) return;
      if(hit.poster_path) posters[id] = TMDB_IMG + hit.poster_path;
      if(hit.vote_average) ratings[id] = {note: hit.vote_average.toFixed(1), votes: hit.vote_count};
      const rv = await fetch(
        `https://api.themoviedb.org/3/movie/${hit.id}/videos?language=fr-FR`,
        { headers: { Authorization: `Bearer ${TMDB_TOKEN}` } }
      );
      const dv = await rv.json();
      const trailer = dv.results?.find(v=>v.type==='Trailer'&&v.site==='YouTube')
                   || dv.results?.find(v=>v.site==='YouTube');
      if(trailer) trailers[id] = trailer.key;

      if(s==='home'||s==='cinemas'||s==='cinema-detail'||s==='film') render();
    } catch(e) { /* silencieux */ }
  }));
}

let userPos = null; // {lat, lng}

function getDistance(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function distLabel(km){
  if(km<1) return Math.round(km*1000)+'m';
  return km.toFixed(1)+'km';
}

function requestGeoLoc(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p=>{
    userPos={lat:p.coords.latitude,lng:p.coords.longitude};
    if(st.screen==='cinemas'||st.screen==='cinema-detail') render();
  }, ()=>{}, {timeout:8000});
}

function sortedCinemas(chain){
  const list = chain ? CINEMAS.filter(c=>c.chain===chain) : CINEMAS;
  if(!userPos) return list;
  return [...list].sort((a,b)=>{
    const da = (a.lat&&a.lng) ? getDistance(userPos.lat,userPos.lng,a.lat,a.lng) : 999;
    const db = (b.lat&&b.lng) ? getDistance(userPos.lat,userPos.lng,b.lat,b.lng) : 999;
    return da-db;
  });
}

function reactionsHTML(msgId){
  const reacts = reactionsData[msgId] || [];
  const grouped = {};
  reacts.forEach(r => { grouped[r.emoji] = (grouped[r.emoji]||[]); grouped[r.emoji].push(r.pseudo); });

  const el = document.getElementById('rpicker');
  if(el){ el.remove(); return; }
  const picker = document.createElement('div');
  picker.id = 'rpicker';
  picker.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:8px 12px;display:flex;gap:8px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.5);`;

  document.body.appendChild(picker);
  setTimeout(()=>picker.remove(), 4000);
}

async function toggleReaction(msgId, emoji){
  const reacts = reactionsData[msgId] || [];
  const existing = reacts.find(r=>r.pseudo===st.pseudo&&r.emoji===emoji);
  let newReacts;
  if(existing){
    newReacts = reacts.filter(r=>!(r.pseudo===st.pseudo&&r.emoji===emoji));
  } else {
    const withoutMe = reacts.filter(r=>r.pseudo!==st.pseudo);
    newReacts = [...withoutMe, {emoji, pseudo:st.pseudo}];
  }
  reactionsData[msgId] = newReacts;
  refreshReactionsDOM();
  await supa.from('messages').update({reactions: newReacts}).eq('id', msgId);
}

// ═══════════ LETTERBOXD RSS ═══════════
const lbdSeen     = new Set(); // titres vus (lowercase)
const lbdWatchlist= new Set(); // titres watchlist (lowercase)
let   lbdLoaded   = false;

function normTitle(t){
  return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
}
function filmInLbd(filmId, list){
  const f = FILMS[filmId];
  if(!f) return false;
  const titles = [f.t, ...(f.alt||[])].map(normTitle);
  for(const t of list){
    for(const n of titles){
      if(t.includes(n)||n.includes(t)) return true;
    }
  }
  return false;
}
function isVu(id)       { return lbdLoaded && filmInLbd(id, lbdSeen); }
function isWatchlist(id){ return lbdLoaded && filmInLbd(id, lbdWatchlist); }

async function loadLbd(pseudo){
  if(!pseudo) return;
  try {
    const r = await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok) { console.warn('LBD:', await r.json()); return; }
    const { items } = await r.json();
    lbdSeen.clear(); lbdWatchlist.clear();
    for(const item of items){
      const nt = normTitle(item.title);
      if(item.cats.includes('watchlist')) lbdWatchlist.add(nt);
      else lbdSeen.add(nt);
    }
    lbdLoaded = true;
    render();
  } catch(e){ console.warn('LBD RSS error', e); }
}

const membresLbd = {}; // pseudo → {seen: Set, watchlist: Set, loaded: bool}

async function loadMemberLbd(pseudo){
  if(membresLbd[pseudo]?.loaded) return;
  membresLbd[pseudo] = {seen: new Set(), watchlist: new Set(), loaded: false};
  try {
    const r = await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok) return;
    const { items } = await r.json();
    for(const item of items){
      const nt = normTitle(item.title);
      if(item.cats.includes('watchlist')) membresLbd[pseudo].watchlist.add(nt);
      else membresLbd[pseudo].seen.add(nt);
    }
    membresLbd[pseudo].loaded = true;
    if(st.screen==='member-profile' && st.viewedMember===pseudo) render();
  } catch(e) {}
}

function openMemberProfile(pseudo){
  if(pseudo===st.pseudo){ go('profile'); return; }
  st.viewedMember = pseudo;
  st.screen = 'member-profile';
  render();
  loadMemberLbd(pseudo);
}

function sMemberProfile(){
  const pseudo = st.viewedMember;
  if(!pseudo) return '';
  const lbd = membresLbd[pseudo];

  // Films vus en commun (moi ET le membre)
  const filmsEnCommun = Object.keys(FILMS).filter(id => {
    const monVu   = isVu(id);
    const sonVu   = lbd?.loaded && filmInLbd(id, lbd.seen);
    return monVu && sonVu;
  });

  // Films dans sa watchlist
  const saWatchlist = lbd?.loaded
    ? Object.keys(FILMS).filter(id => filmInLbd(id, lbd.watchlist))
    : [];

  // Films qu'il a vus (tous)
  const sesFilmsVus = lbd?.loaded
    ? Object.keys(FILMS).filter(id => filmInLbd(id, lbd.seen))
    : [];

  const filmCard = (id) => {
    const f = FILMS[id];
    return `<div onclick="openFilm('${id}','group')" class="tap" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid ${BD};cursor:pointer;">
      <div style="width:34px;height:50px;border-radius:6px;overflow:hidden;background:${f.bg};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;">
        ${posters[id]?`<img src="${posters[id]}" style="width:100%;height:100%;object-fit:cover;">`:`${f.e}`}
      </div>
      <div style="flex:1;">
        <div class="serif" style="font-size:13px;">${f.t}</div>
        <div style="font-size:9px;color:${MU};">${f.g} · ${f.d}</div>
      </div>
      <span style="color:${MU};font-size:12px;">›</span>
    </div>`;
  };

  return `
  <div style="background:linear-gradient(to bottom,${S1},${BG});padding:50px 18px 20px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:18px;">
      <button onclick="st.screen='group';render();" style="width:34px;height:34px;border-radius:50%;background:${S2};border:1px solid ${BD};color:${TX};font-size:14px;display:flex;align-items:center;justify-content:center;">←</button>
      <span style="font-size:11px;color:${MU};">Profil membre</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:64px;height:64px;border-radius:18px;background:${pseudoColor(pseudo)};display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;">${pseudoInitial(pseudo)}</div>
      <div>
        <div class="serif" style="font-size:22px;margin-bottom:2px;">${pseudo}</div>
        <div style="font-size:10px;color:${MU};">Membre du groupe · Cinéphile 🎬</div>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 24px;">

    ${!lbdLoaded && !lbd ? `
    <div style="background:${S1};border:1px solid ${BD};border-radius:13px;padding:13px 15px;margin-bottom:14px;font-size:11px;color:${MU};text-align:center;">
      Connectez votre Letterboxd pour voir les films en commun
    </div>` : ''}

    ${lbd && !lbd.loaded ? `
    <div style="background:${S1};border:1px solid ${BD};border-radius:13px;padding:14px;margin-bottom:14px;text-align:center;color:${MU};font-size:11px;">
      Chargement du profil Letterboxd… ⏳
    </div>` : ''}

    ${lbd?.loaded ? `
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <div style="flex:1;background:rgba(0,192,48,0.07);border:1px solid rgba(0,192,48,0.2);border-radius:11px;padding:10px;text-align:center;">
        <div style="font-size:22px;font-weight:700;color:${LB};">${sesFilmsVus.length}</div>
        <div style="font-size:9px;color:${MU};">films vus<br>au programme</div>
      </div>
      <div style="flex:1;background:rgba(240,192,96,0.07);border:1px solid rgba(240,192,96,0.2);border-radius:11px;padding:10px;text-align:center;">
        <div style="font-size:22px;font-weight:700;color:${GD};">${saWatchlist.length}</div>
        <div style="font-size:9px;color:${MU};">dans sa<br>watchlist</div>
      </div>
      ${lbdLoaded ? `
      <div style="flex:1;background:rgba(255,63,91,0.07);border:1px solid rgba(255,63,91,0.2);border-radius:11px;padding:10px;text-align:center;">
        <div style="font-size:22px;font-weight:700;color:${AC};">${filmsEnCommun.length}</div>
        <div style="font-size:9px;color:${MU};">films<br>en commun</div>
      </div>` : ''}
    </div>

    ${lbdLoaded && filmsEnCommun.length > 0 ? `
    <div style="margin-bottom:16px;">
      <div class="serif" style="font-size:16px;margin-bottom:8px;">🎬 Films vus en commun</div>
      ${filmsEnCommun.map(filmCard).join('')}
    </div>` : lbdLoaded ? `
    <div style="background:rgba(255,63,91,0.05);border:1px solid rgba(255,63,91,0.15);border-radius:11px;padding:12px;text-align:center;font-size:11px;color:${MU};margin-bottom:14px;">
      Aucun film en commun au programme cette semaine
    </div>` : ''}

    ${saWatchlist.length > 0 ? `
    <div style="margin-bottom:16px;">
      <div class="serif" style="font-size:16px;margin-bottom:8px;">🔖 Sa watchlist</div>
      ${saWatchlist.map(filmCard).join('')}
    </div>` : ''}

    ${sesFilmsVus.length > 0 && saWatchlist.length === 0 ? `
    <div>
      <div class="serif" style="font-size:16px;margin-bottom:8px;">✓ Films déjà vus</div>
      ${sesFilmsVus.map(filmCard).join('')}
    </div>` : ''}
    ` : ''}

  </div>`;
}

function shareGroupe(){
  const url = `${location.origin}${location.pathname}?groupe=${st.groupe}&film=${st.film}`;
  if(navigator.share){
    navigator.share({title:'Rejoins mon groupe CinéMatch !', text:'On va voir '+( FILMS[st.film]?.t||'un film')+' ensemble', url});
  } else {
    navigator.clipboard.writeText(url).then(()=>{
      const btn = document.querySelector('[onclick="shareGroupe()"]');
      if(btn){ btn.textContent='✓'; setTimeout(()=>btn.textContent='🔗',2000); }
    });
  }
}

function connectLbd(){
  const p = st.lbdInput.trim();
  if(!p) return;
  st.lbdPseudo = p;
  st.lbdInput  = '';
  save();
  lbdLoaded = false;
  lbdSeen.clear(); lbdWatchlist.clear();
  render();
  loadLbd(p);
}
function disconnectLbd(){
  st.lbdPseudo = '';
  lbdLoaded = false;
  lbdSeen.clear(); lbdWatchlist.clear();
  save();
  render();
}

function sProfile(){
  const vuCount        = Object.keys(FILMS).filter(id=>isVu(id)).length;
  const watchlistCount = Object.keys(FILMS).filter(id=>isWatchlist(id)).length;

  const lbdBlock = st.lbdPseudo ? `
    <div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px 16px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:20px;">🎬</span>
          <div>
            <div style="font-size:13px;font-weight:600;color:${LB};">Letterboxd connecté</div>
            <div style="font-size:10px;color:${MU};">@${st.lbdPseudo}</div>
          </div>
        </div>
        <span onclick="disconnectLbd()" style="font-size:9px;color:${MU};cursor:pointer;border:1px solid ${BD};border-radius:7px;padding:3px 8px;">Déconnecter</span>
      </div>
      ${lbdLoaded
        ? `<div style="display:flex;gap:8px;">
            <div style="flex:1;background:rgba(0,192,48,0.08);border-radius:10px;padding:8px;text-align:center;">
              <div style="font-size:20px;font-weight:700;color:${LB};">${vuCount}</div>
              <div style="font-size:9px;color:${MU};">film${vuCount!==1?'s':''} vu${vuCount!==1?'s':''}<br>au programme</div>
            </div>
            <div style="flex:1;background:rgba(240,192,96,0.08);border-radius:10px;padding:8px;text-align:center;">
              <div style="font-size:20px;font-weight:700;color:${GD};">${watchlistCount}</div>
              <div style="font-size:9px;color:${MU};">dans votre<br>watchlist</div>
            </div>
          </div>`
        : `<div style="font-size:11px;color:${MU};text-align:center;padding:8px 0;">Chargement de votre profil… ⏳</div>`
      }
    </div>` : `
    <div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px 16px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:20px;">🎬</span>
        <div>
          <div style="font-size:13px;font-weight:600;">Connecter Letterboxd</div>
          <div style="font-size:10px;color:${MU};">Voyez vos films vus et watchlist</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="text" placeholder="Votre pseudo Letterboxd"
          value="${st.lbdInput}"
          oninput="st.lbdInput=this.value"
          onkeydown="if(event.key==='Enter')connectLbd()"
          style="flex:1;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:12px;color:${TX};outline:none;">
        <button onclick="connectLbd()" style="background:${LB};border:none;color:#000;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;">OK</button>
      </div>
      <div style="font-size:9px;color:${MU};margin-top:7px;">Votre profil Letterboxd doit être public · Lecture seule</div>
    </div>`;

  return `
  <div style="background:linear-gradient(to bottom,${S1},${BG});padding:50px 18px 18px;flex-shrink:0;">
    <div style="display:flex;align-items:flex-start;gap:13px;margin-bottom:16px;">
      <div onclick="st.showAvatarPicker=!st.showAvatarPicker;render();" style="width:62px;height:62px;border-radius:17px;background:${pseudoColor(st.pseudo)};display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;cursor:pointer;position:relative;">
        ${st.avatar}
        <div style="position:absolute;bottom:-4px;right:-4px;background:${S2};border:1px solid ${BD};border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;">✏️</div>
      </div>
      <div>
        <div class="serif" style="font-size:19px;margin-bottom:2px;">${st.pseudo}</div>
        <div style="font-size:10px;color:${MU};">Cinéphile 🎬 · Paris</div>
        <div style="margin-top:7px;"><span onclick="st.pseudo='';st.screen='pseudo';save();render();" style="font-size:10px;color:${MU};cursor:pointer;text-decoration:underline;border:1px solid ${BD};border-radius:8px;padding:3px 8px;">✏️ Changer de pseudo</span></div>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    ${st.showAvatarPicker ? avatarPicker() : ''}
    ${lbdBlock}
    <div class="serif" style="font-size:16px;margin-bottom:10px;">Mes groupes récents</div>
    ${mesGroupes.length===0
      ? `<div style="text-align:center;padding:30px 0;color:${MU};font-size:11px;">Aucun groupe rejoint pour l'instant</div>`
      : mesGroupes.map(g=>{
          const gf=FILMS[g.film_id];
          return `<div onclick="openGroup('${g.film_id}','${g.id}')" class="tap" style="margin-bottom:8px;background:${S1};border:1px solid ${BD};border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;">
            <span style="font-size:22px;">${gf?gf.e:'🎬'}</span>
            <div style="flex:1;"><div style="font-size:12px;font-weight:500;">${g.nom}</div><div style="font-size:10px;color:${MU};">${gf?gf.t:g.film_id}</div></div>
            <span style="color:${MU};">›</span>
          </div>`;
        }).join('')
    }
  </div>
  ${nav('profile')}`;
}

// RENDER
function render(){
  const app=document.getElementById('app');
  const phone=document.createElement('div');
  phone.className='phone screen';
  phone.innerHTML='<div class="notch"><div class="notch-bar"></div></div>';
  const inner=document.createElement('div');
  inner.style.cssText='display:flex;flex-direction:column;height:100%;';
  try{
    if(st.screen==='pseudo')        inner.innerHTML=sPseudo();
    else if(st.screen==='home')     inner.innerHTML=sHome();
    else if(st.screen==='cinemas')  inner.innerHTML=sCinemas();
    else if(st.screen==='cinema-detail') inner.innerHTML=sCinemaDetail();
    else if(st.screen==='film')     inner.innerHTML=sFilm();
    else if(st.screen==='group')    inner.innerHTML=sGroup();
    else if(st.screen==='profile')  inner.innerHTML=sProfile();
    else if(st.screen==='member-profile') inner.innerHTML=sMemberProfile();
  }catch(e){inner.innerHTML=`<div style="padding:80px 20px;color:#ff3f5b;font-size:12px;">Erreur: ${e.message}</div>`;}
  phone.appendChild(inner);
  app.innerHTML='';
  app.appendChild(phone);
  if(st.tab==='chat'){setTimeout(()=>{const c=document.getElementById('ca');if(c)c.scrollTop=c.scrollHeight;},50);}
}

// TIMER — met à jour le compteur sans render() ; refresh complet toutes les heures
setInterval(()=>{
  if(st.secs>0) st.secs--;
  else { st.secs=3600; if(st.screen==='cinemas') render(); }
  const el=document.querySelector('[data-refresh]');
  if(el){
    const mm=String(Math.floor(st.secs/60)).padStart(2,'0'),ss=String(st.secs%60).padStart(2,'0');
    el.textContent=mm+':'+ss;
  }
},1000);

// INIT — gérer lien d'invitation ?groupe=ID&film=ID
(function handleInvite(){
  const params = new URLSearchParams(window.location.search);
  const gid = params.get('groupe');
  const fid = params.get('film');
  if(gid && fid && st.pseudo){
    history.replaceState({},'','/');
    openGroup(fid, gid);
  } else if(gid && fid){
    // Stocker pour après saisie pseudo
    st._inviteGroupe = gid;
    st._inviteFilm   = fid;
  }
})();

render();
if(st.pseudo) loadMesGroupes();
loadPosters();

</script>
</body>
