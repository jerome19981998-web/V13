<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CinéMatch - Chat partagé</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body { background:#0a0a0f; color:#f0f0f5; font-family:'Inter',sans-serif; margin:0; }
    .font-serif { font-family:'Playfair Display',serif; }
    .phone { 
      width:100%; max-width:390px; margin:20px auto; height:844px; 
      background:#07070f; border-radius:48px; overflow:hidden; 
      border:12px solid #000; box-shadow:0 40px 100px rgba(0,0,0,0.8); 
      position:relative; 
    }
    .notch { 
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      width:130px; height:32px; background:#000; border-radius:32px; z-index:50; 
    }
    .screen { animation:fadeIn 0.35s ease-out forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    #errorMsg { color:#ff3366; padding:20px; text-align:center; font-weight:bold; background:#1a1a24; margin:20px; border-radius:12px; }
    #chatArea::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="app"></div>
<div id="errorMsg"></div>

<script>
// CONFIG SUPABASE (tes vraies valeurs)
const SUPABASE_URL = 'https://alwfbminhdwinxcozjlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsd2ZibWluaGR3aW54Y296amxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODA1NTYsImV4cCI6MjA4ODU1NjU1Nn0.OTr8lyDpRQsmXUCPKsm1wvNPYfCA32UBQShRibI_bDg';

// Initialise Supabase
let supabase;
try {
  supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  console.log("Supabase chargé OK");
} catch (e) {
  document.getElementById('errorMsg').innerHTML = 'Erreur Supabase : ' + e.message;
}

// STATE
let state = {
  messages: [],
  username: localStorage.getItem('chatUsername') || prompt("Ton pseudo ?") || "Anonyme"
};
localStorage.setItem('chatUsername', state.username);

// Charger messages
async function loadMessages() {
  if (!supabase) return;
  const { data, error } = await supabase.from('messages').select('*').order('created_at');
  if (error) {
    document.getElementById('errorMsg').innerHTML += '<br>Erreur chargement : ' + error.message;
    return;
  }
  state.messages = data || [];
  render();
  scrollToBottom();
}

// Temps réel
if (supabase) {
  supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
    state.messages.push(payload.new);
    render();
    scrollToBottom();
  }).subscribe();
}

// RENDER
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';

  const phone = document.createElement('div');
  phone.className = 'phone relative flex flex-col text-white overflow-hidden screen';

  phone.innerHTML += `<div class="notch"></div>`;

  phone.innerHTML += `
    <div class="flex flex-col h-full">
      <div class="pt-16 px-6 pb-4 bg-gradient-to-b from-[#111119] to-transparent">
        <div class="text-xl font-serif text-center">Chat partagé</div>
        <div class="text-sm opacity-70 text-center mt-1">${state.username}</div>
      </div>

      <div id="chatArea" class="flex-1 overflow-y-auto p-6 space-y-4">
        ${state.messages.map(m => `
          <div class="flex ${m.user_name === state.username ? 'justify-end' : 'justify-start'} mb-4">
            <div class="max-w-[78%] px-4 py-3 rounded-3xl ${m.user_name === state.username ? 'bg-pink-600' : 'bg-[#1a1a24]'}">
              <div class="text-xs opacity-70 mb-1">${m.user_name}</div>
              ${m.message}
              <div class="text-xs opacity-70 mt-1 text-right">
                ${new Date(m.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}
              </div>
            </div>
          </div>
        `).join('') || '<div class="text-center opacity-70 py-10">Aucun message...</div>'}
      </div>

      <div class="p-4 border-t border-white/10 bg-black/60 flex gap-3">
        <input id="chatInput" type="text" placeholder="Message..." class="flex-1 bg-[#1a1a24] rounded-full px-5 py-3 outline:none">
        <button onclick="sendMessage()" class="w-12 h-12 bg-pink-600 rounded-full flex items-center justify-center text-xl active:scale-95">↑</button>
      </div>
    </div>
  `;

  root.appendChild(phone);
  scrollToBottom();
}

function scrollToBottom() {
  setTimeout(() => {
    const chat = document.getElementById('chatArea');
    if (chat) chat.scrollTop = chat.scrollHeight;
  }, 100);
}

// ENVOYER
async function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input || !input.value.trim()) return;

  const message = input.value.trim();

  if (!supabase) return alert("Supabase non chargé");

  const { error } = await supabase.from('messages').insert({
    message,
    user_name: state.username
  });

  if (error) {
    alert("Erreur envoi : " + error.message);
    return;
  }

  input.value = '';
}

// DÉMARRAGE
loadMessages();
</script>
</body>
</html>
