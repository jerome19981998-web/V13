<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CinéMatch - Affichage stable</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body { background:#0a0a0f; color:#f0f0f5; font-family:'Inter',sans-serif; margin:0; }
    .font-serif { font-family:'Playfair Display',serif; }
    .phone { 
      width:100%; max-width:390px; margin:20px auto; height:844px; 
      background:#07070f; border-radius:48px; overflow:hidden; 
      border:12px solid #000; box-shadow:0 40px 100px rgba(0,0,0,0.8); 
      position:relative; 
    }
    .notch { 
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      width:130px; height:32px; background:#000; border-radius:32px; z-index:50; 
    }
    #errorMsg { color:#ff3366; padding:20px; text-align:center; font-weight:bold; background:#1a1a24; margin:20px; border-radius:12px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="app"></div>
<div id="errorMsg"></div>

<script>
// Log de debug très détaillé
console.log("Script démarré - ligne 1 OK");

let state = {
  screen: "group",
  messages: [
    { user: "Test", text: "Salut la team !", time: "16:42" },
    { user: "Toi", text: "Ça marche enfin ?", time: "16:45" }
  ],
  username: "TestUser"
};

console.log("State initialisé - ligne 5 OK");

const root = document.getElementById('app');
if (!root) {
  console.error("#app introuvable");
  document.body.innerHTML += '<div style="color:red; padding:40px;">#app introuvable</div>';
} else {
  console.log("Root trouvé - ligne 12 OK");

  const phone = document.createElement('div');
  phone.className = 'phone relative flex flex-col text-white overflow-hidden';

  phone.innerHTML = `
    <div class="notch"></div>
    <div class="p-8 pt-20 text-center">
      <h1 style="font-size:3rem; color:#ff3366; margin-bottom:1rem;">CinéMatch</h1>
      <p style="font-size:1.5rem; margin-bottom:2rem;">Affichage de base OK sur téléphone !</p>
      <p style="font-size:1.2rem; margin-bottom:1rem;">Le serveur local et Vercel fonctionnent.</p>
      <div style="background:#1a1a24; padding:20px; border-radius:12px; margin-bottom:2rem;">
        <p style="font-size:1.2rem; margin-bottom:1rem;">Messages de test :</p>
        <p style="font-size:1.1rem;">${state.messages[0].text}</p>
        <p style="font-size:1.1rem;">${state.messages[1].text}</p>
      </div>
      <button onclick="alert('Bouton cliquable OK')" style="background:#ff3366; color:white; padding:16px 40px; border:none; border-radius:999px; font-size:1.2rem; cursor:pointer;">
        Cliquer ici
      </button>
    </div>
  `;

  root.appendChild(phone);
  console.log("Rendu terminé - ligne 50 OK");
}
</script>
</body>
</html>
