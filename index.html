  <style>
    *{box-sizing:border-box;}
    body{background:#04040a;font-family:'Outfit',sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 0;}
    .serif{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;}
    .phone{width:390px;height:820px;background:#07070f;border-radius:46px;overflow:hidden;border:1.5px solid #252535;box-shadow:0 30px 80px rgba(0,0,0,0.9);position:relative;display:flex;flex-direction:column;color:#e8e0d4;font-size:13px;}
    .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:100px;height:28px;background:#07070f;border-radius:28px;z-index:100;display:flex;align-items:center;justify-content:center;}
    .notch-bar{width:52px;height:5px;background:#1a1a2e;border-radius:3px;}
    #inner{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-top:40px;}
    .tap{transition:opacity .15s;}
    .tap:active{opacity:.6;}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#252535;border-radius:3px;}
    input,button{font-family:'Outfit',sans-serif;}
  </style>
</head>

// ═══════════ GÉOLOCALISATION ═══════════
let userPos = null;
function getDistance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distLabel(km){ return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km'; }
function requestGeoLoc(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{
    userPos={lat:p.coords.latitude,lng:p.coords.longitude};
    if(['cinemas','cinema-detail'].includes(st.screen))render();
  },()=>{},{timeout:8000});
}
function sortedCinemas(chain){
  const list=chain?CINEMAS.filter(c=>c.chain===chain):CINEMAS;
  if(!userPos)return list;
  return [...list].sort((a,b)=>{
    const da=(a.lat&&a.lng)?getDistance(userPos.lat,userPos.lng,a.lat,a.lng):999;
    const db=(b.lat&&b.lng)?getDistance(userPos.lat,userPos.lng,b.lat,b.lng):999;
    return da-db;
  });
}
requestGeoLoc();

const posters={}, ratings={}, trailers={};
async function loadPosters(){
  await Promise.all(Object.entries(FILMS).map(async([id,f])=>{
    try{
      const q=encodeURIComponent(f.t.replace(/[^\w\s]/g,' ').trim());
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?query=${q}&language=fr-FR&page=1`,{headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
      const d=await r.json();
      const hit=d.results?.[0];
      if(!hit)return;
      if(hit.poster_path)posters[id]=TMDB_IMG+hit.poster_path;
      if(hit.vote_average)ratings[id]={note:hit.vote_average.toFixed(1),votes:hit.vote_count};

      const dv=await rv.json();

      if(tr)trailers[id]=tr.key;
      if(['home','cinemas','cinema-detail','film'].includes(st.screen))render();

let lbdSeen=new Set(),lbdWatchlist=new Set();
function normTitle(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function filmInLbd(filmId,list){
  const f=FILMS[filmId];if(!f)return false;
  const titles=[f.t,...(f.alt||[])].map(normTitle);
  for(const t of list){for(const n of titles){if(t.includes(n)||n.includes(t))return true;}}
  return false;
}
function isVu(id){return filmInLbd(id,lbdSeen);}
function isWatchlist(id){return filmInLbd(id,lbdWatchlist);}

async function loadLbd(pseudo){
  try{
    const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok)return false;
    const d=await r.json();
    lbdSeen=new Set();lbdWatchlist=new Set();
    (d.items||[]).forEach(item=>{
      const n=normTitle(item.title);
      // Dans le RSS Letterboxd, les items du diary = films vus
      // Les items avec cat 'wishlist' = watchlist, sinon = vu
      if(item.cats&&item.cats.includes('wishlist'))lbdWatchlist.add(n);
      else lbdSeen.add(n);
    });
    return true;
  }catch(e){return false;}
}

// LBD membres
const membresLbd={};
async function loadMemberLbd(pseudo){
  if(membresLbd[pseudo])return membresLbd[pseudo];
  try{
    const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok)return null;
    const d=await r.json();
    const seen=new Set(),wl=new Set();
    (d.items||[]).forEach(item=>{
      const n=normTitle(item.title);
      if(item.cats&&item.cats.includes('wishlist'))wl.add(n);
      else seen.add(n);
    });
    membresLbd[pseudo]={seen,wl};
    return membresLbd[pseudo];
  }catch(e){return null;}
}

  if(navigator.share){navigator.share({title:'Rejoins mon groupe CinéMatch !',text:'On va voir '+(FILMS[st.film]?.t||'un film')+' ensemble',url});}
  else{navigator.clipboard.writeText(url).then(()=>{const btn=document.querySelector('[onclick="shareGroupe()"]');if(btn){btn.textContent='✓';setTimeout(()=>btn.textContent='🔗',2000);}});}
}

// ═══════════ LBD UI ═══════════
function connectLbd(){
  const v=document.getElementById('lbd-input-field')?.value?.trim();
  if(!v)return;
  st.lbdInput=v;
  const btn=document.querySelector('[onclick="connectLbd()"]');
  if(btn){btn.textContent='Connexion…';btn.disabled=true;}
  loadLbd(v).then(ok=>{
    if(ok){st.lbdPseudo=v;save();render();}
    else{if(btn){btn.textContent='Profil introuvable';setTimeout(()=>{btn.textContent='Connecter';btn.disabled=false;},2000);}}
  });
}
function disconnectLbd(){st.lbdPseudo='';lbdSeen=new Set();lbdWatchlist=new Set();save();render();}

function confirmChangePseudo(){
  const v=document.getElementById('new-pseudo-field')?.value?.trim();
  if(!v||v.length<2)return;
  st.pseudo=v;
  st._changingPseudo=false;
  save();
  render();
}

async function quitterGroupe(){
  if(!st.groupe||!st.pseudo)return;
  if(!confirm('Quitter ce groupe ?\nVos votes et messages resteront visibles.'))return;
  const {error}=await supa.from('groupe_membres')
    .delete()
    .eq('groupe',st.groupe)
    .eq('pseudo',st.pseudo);
  if(error){alert('Erreur : '+error.message);return;}
  if(realtimeChannel){supa.removeChannel(realtimeChannel);realtimeChannel=null;}
  if(votesChannel){supa.removeChannel(votesChannel);votesChannel=null;}
  st.groupe=null;st.film=null;st.tab='vote';
  membresData=[];votesData={};
  await loadMesGroupes();
  render();
}

function logoutApp(){
  if(!confirm('Se déconnecter de CinéMatch ?\nVous devrez entrer un pseudo pour revenir.'))return;
  try{localStorage.removeItem('cm2');}catch(e){}
  st.pseudo='';st.pseudoInput='';st.lbdPseudo='';st.avatar='🎬';
  lbdSeen=new Set();lbdWatchlist=new Set();
  go('pseudo');
}

// ═══════════ NAVIGATION ═══════════
function go(sc){
  if(sc==='group'){st.groupe=null;}
  st.screen=sc;render();
}
function openFilm(id,src){st.film=id;st.filmSrc=src||'home';st.screen='film';render();}
function openCinema(id){st.cinema=id;st.screen='cinema-detail';render();}
async function openGroup(filmId,groupeId){
  st.film=filmId;
  if(groupeId){
    st.groupe=groupeId;
  }else{
    // Chercher un groupe existant pour ce film
    const{data:existing}=await supa.from('groupes').select('id').eq('film_id',filmId).limit(1);
    if(existing&&existing.length>0){
      st.groupe=existing[0].id;
    }else{
      // Créer le groupe puis le récupérer
      await supa.from('groupes').insert({film_id:filmId,nom:FILMS[filmId]?.t||filmId,createur:st.pseudo});
      const{data:fresh}=await supa.from('groupes').select('id').eq('film_id',filmId).limit(1);
      if(fresh&&fresh.length>0)st.groupe=fresh[0].id;
    }
  }
  st.screen='group';st.tab='vote';st.voted=null;st.cinema=null;
  render();
  rejoindreGroupe();
  loadMessages();
  loadVotes();
  subscribeAll();
  loadMesGroupes();
}

function openMemberProfile(pseudo){
  st.viewedMember=pseudo;
  st.screen='member-profile';
  render();
  loadMemberLbd(pseudo).then(()=>render());
}

async function doSync(){
  st.syncing=true;render();
  await new Promise(r=>setTimeout(r,1200));
  st.syncing=false;st.syncLabel='à l\'instant';render();
}

      </div>
      ${m.pseudo!==st.pseudo?`<span style="color:${MU};font-size:14px;">›</span>`:''}
    </div>`).join('');

function renderVotesDOM(){
  const el=document.getElementById('votes-container');
  if(!el||!st.film)return;
  // Récupérer toutes les séances de tous les cinémas pour ce film
  const tousCinemas=CINEMAS.filter(c=>c.films.some(f=>f.id===st.film));
  // Si un cinéma est sélectionné, filtrer sur lui uniquement
  const cinemasActifs=st.cinema?tousCinemas.filter(c=>c.id===st.cinema):tousCinemas;
  // Collecter toutes les séances (dédupliquées par heure)
  const heuresVues=new Set();
  const allSeances=[];
  cinemasActifs.forEach(c=>{
    ((SEANCES[c.id]||{})[st.film]||[]).forEach(h=>{
      if(!heuresVues.has(h)){heuresVues.add(h);allSeances.push(h);}
    });
  });
  allSeances.sort();
  if(!allSeances.length){el.innerHTML=`<div style="text-align:center;padding:30px;color:${MU};font-size:12px;">Aucune séance ce jour</div>`;return;}
  el.innerHTML=allSeances.map(h=>{
    const past=isPast(h);
    const k=st.date+' '+h;
    const voters=votesData[k]||[];
    const voted=voters.some(v=>v.pseudo===st.pseudo);
    return `<div onclick="${past?'':"voter('"+ h +"')"}" class="${past?'':'tap'}" style="opacity:${past?'0.4':'1'};background:${voted?'rgba(255,63,91,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${voted?AC:BD};border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:${past?'default':'pointer'};display:flex;align-items:center;gap:10px;">
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:600;color:${voted?AC:past?MU:TX};">${h}${past?' <span style="font-size:9px;">passée</span>':''}</div>
        <div style="font-size:10px;color:${MU};margin-top:2px;">${voters.length} vote${voters.length!==1?'s':''}</div>
      </div>
      <div style="display:flex;">${voters.slice(0,5).map(v=>`<div style="width:22px;height:22px;border-radius:50%;background:${pseudoColor(v.pseudo)};border:2px solid ${BG};display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:-4px;">${v.pseudo===st.pseudo?st.avatar:pseudoInitial(v.pseudo)}</div>`).join('')}</div>
      <div style="width:28px;height:28px;border-radius:50%;background:${voted?AC:'rgba(255,255,255,0.06)'};border:1px solid ${voted?AC:BD};display:flex;align-items:center;justify-content:center;font-size:14px;">${voted?'✓':'+'}</div>
    </div>`;
  }).join('');
}

function confirmPseudo(){
  const inp=document.getElementById('pseudoInput');
  const val=(inp?inp.value:st.pseudoInput).trim();
  if(!val)return;
  st.pseudo=val;save();
  if(st._inviteGroupe&&st._inviteFilm){
    const gid=st._inviteGroupe,fid=st._inviteFilm;
    st._inviteGroupe=null;st._inviteFilm=null;
    history.replaceState({},'','/');
    loadMesGroupes().then(()=>openGroup(fid,gid));
  }else{
    st.screen='home';render();loadMesGroupes();
  }
}

}

function sFilm(){
  const f=FILMS[st.film];if(!f)return'<div>Film introuvable</div>';
  const back=st.filmSrc==='cinema-detail'?()=>go('cinema-detail'):()=>go('home');
  const cinemaFilm=CINEMAS.filter(c=>c.films.some(fi=>fi.id===st.film));
  return `<div style="flex:1;overflow-y:auto;">
    <div style="height:220px;position:relative;overflow:hidden;background:${f.bg};">
      ${posters[st.film]?'<img src="'+posters[st.film]+'" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.6);">':''}
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,0.3),rgba(7,7,15,0.95));"></div>
      <div onclick="${st.filmSrc==='cinema-detail'?`go('cinema-detail')`:`go('home')`}" style="position:absolute;top:52px;left:18px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);">←</div>
      <div style="position:absolute;bottom:18px;left:18px;right:18px;">
        <div style="font-size:9px;color:${CC[cinemaFilm[0]?.chain]||MU};letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">${f.g}</div>
        <div class="serif" style="font-size:26px;line-height:1.2;margin-bottom:8px;">${f.t}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${chip('⏱ '+f.d,TX,'rgba(255,255,255,0.06)',BD,9)}
          ${chip('🎭 '+f.dir,TX,'rgba(255,255,255,0.06)',BD,9)}
          ${ratings[st.film]?chip('★ '+ratings[st.film].note,GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',9):''}
          ${isVu(st.film)?chip('✓ Vu sur LBD',LB,'rgba(0,192,48,0.15)','rgba(0,192,48,0.3)',9):isWatchlist(st.film)?chip('🔖 Watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',9):''}
        </div>
        ${trailers[st.film]?`<div style="margin-top:8px;"><a href="https://www.youtube.com/watch?v=${trailers[st.film]}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);border-radius:9px;padding:5px 12px;font-size:10px;font-weight:600;color:#ff4444;text-decoration:none;">▶ Voir la bande-annonce</a></div>`:''}
      </div>
    </div>
    <div style="padding:16px 18px 0;">
      <p style="font-size:12px;line-height:1.7;color:${MU};margin-bottom:16px;">${f.s}</p>
    </div>
    ${dayPicker()}
    <div style="padding:0 18px 20px;">
      ${(()=>{
        const seancesJour=cinemaFilm.map(c=>{
          const s=(SEANCES[c.id]||{})[st.film]||[];
          return{cinema:c,seances:s.filter(h=>!isPast(h))};
        }).filter(x=>x.seances.length);
        if(!seancesJour.length) return `<div style="text-align:center;padding:20px 0;color:${MU};font-size:12px;">Aucune séance disponible ce jour</div>`;
        return `<div style="margin-bottom:18px;">
          <div style="font-size:10px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Séances</div>
          ${seancesJour.map(({cinema:c,seances})=>`
          <div style="margin-bottom:10px;">
            <div style="font-size:11px;font-weight:500;margin-bottom:6px;">${c.name}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${seances.map(h=>`<div onclick="st.cinema='${c.id}';openGroup('${st.film}')" class="tap" style="background:${S2};border:1px solid ${BD};border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;">${h}</div>`).join('')}
            </div>
          </div>`).join('')}
        </div>`;
      })()}
      <button onclick="openGroup('${st.film}')" style="width:100%;background:${AC};border:none;color:#fff;border-radius:14px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;">Rejoindre le groupe →</button>
    </div>
  </div>`;
}

function sGroup(){
  if(!st.groupe){
    // Écran sélection groupe
    return `<div style="padding:52px 18px 12px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div onclick="go('home')" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;">←</div>
        <div class="serif" style="font-size:20px;">Mes groupes</div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
      ${mesGroupes.length===0?`<div style="text-align:center;padding:50px 20px;color:${MU};"><div style="font-size:40px;margin-bottom:12px;">🎬</div><div style="font-size:14px;margin-bottom:16px;">Aucun groupe pour l'instant</div><button onclick="go('home')" style="background:${AC};border:none;color:#fff;border-radius:14px;padding:12px 24px;font-size:13px;cursor:pointer;">Voir les films →</button></div>`:
      mesGroupes.map(g=>{
        const gf=FILMS[g.film_id];
        return `<div onclick="openGroup('${g.film_id}','${g.id}')" class="tap" style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;">
          <div style="width:46px;height:68px;border-radius:9px;overflow:hidden;background:${gf?gf.bg:'#222'};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">
            ${posters[g.film_id]?'<img src="'+posters[g.film_id]+'" style="width:100%;height:100%;object-fit:cover;">':(gf?gf.e:'🎬')}
          </div>
          <div style="flex:1;min-width:0;">
            <div class="serif" style="font-size:14px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${gf?gf.t:g.film_id}</div>
            <div style="font-size:10px;color:${MU};">Groupe actif</div>
          </div>
          <span style="color:${MU};">›</span>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;background:${S1};border-top:1px solid ${BD};flex-shrink:0;">
      ${[['home','🎬','Films'],['cinemas','🏛','Cinémas'],['group','👥','Groupes'],['profile','👤','Profil']].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:10px 0;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:18px;">${ic}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
    </div>`;
  }

  // Écran chat/vote
  const f=FILMS[st.film]||{};
  const tabs=[['vote','🗳 Vote'],['chat','💬 Chat'],['membres','👥 Membres']];
  return `<div style="padding:52px 18px 10px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <div onclick="st.groupe=null;render();" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">←</div>
      <div style="flex:1;min-width:0;">
        <div class="serif" style="font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.t||'Groupe'}</div>
      </div>
      <span id="membres-badge" style="font-size:9px;background:${AC}18;border:1px solid ${AC}35;color:${AC};border-radius:8px;padding:2px 7px;flex-shrink:0;">${membresData.length} membre${membresData.length!==1?'s':''}</span>
      <button onclick="shareGroupe()" style="width:30px;height:30px;border-radius:50%;background:${S2};border:1px solid ${BD};color:${TX};font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;">🔗</button>
      <button onclick="quitterGroupe()" style="width:30px;height:30px;border-radius:50%;background:rgba(255,63,91,0.08);border:1px solid rgba(255,63,91,0.3);color:${AC};font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;" title="Quitter le groupe">🚪</button>
    </div>
    <div style="display:flex;gap:6px;">
      ${tabs.map(([id,lb])=>`<div onclick="st.tab='${id}';render();" style="flex:1;text-align:center;padding:6px;border-radius:10px;font-size:11px;cursor:pointer;background:${st.tab===id?AC:'rgba(255,255,255,0.03)'};border:1px solid ${st.tab===id?AC:BD};color:${st.tab===id?'#fff':MU};">${lb}</div>`).join('')}
    </div>
  </div>
  ${st.tab==='vote'?`<div style="flex:1;overflow-y:auto;">
    ${(()=>{
      // Cinémas qui passent ce film
      const cinemasFilm=CINEMAS.filter(c=>c.films.some(f=>f.id===st.film));
      const CC_=CC; // closure
      // Sélecteur cinéma
      const cinemaSelector=`<div style="padding:12px 18px 0;">
        <div style="font-size:9px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Choisir le cinéma</div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px;">
          ${cinemasFilm.map(c=>{
            const active=st.cinema===c.id;
            const col=CC_[c.chain];
            const votes_c=membresData.filter(m=>m.cinema_pref===c.id).length;
            const pct=membresData.length>0?Math.round(votes_c/membresData.length*100):0;
            return `<div onclick="voterCinema('${c.id}')" style="padding:9px 12px;border-radius:12px;cursor:pointer;background:${active?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.02)'};border:1px solid ${active?col:BD};">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:${votes_c>0?'7px':'0'};">
                <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0;"></div>
                <div style="flex:1;font-size:12px;font-weight:${active?'600':'400'};color:${active?TX:MU};">${c.name}</div>
                ${votes_c>0?`<div style="font-size:10px;color:${col};font-weight:600;">${votes_c} vote${votes_c>1?'s':''}</div>`:''}
                ${active?`<div style="font-size:10px;color:${col};">✓</div>`:''}
              </div>
              ${votes_c>0?`<div style="height:3px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;">
                <div style="height:100%;width:${pct}%;background:${col};border-radius:2px;transition:width 0.3s;"></div>
              </div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
      if(!st.cinema) return cinemaSelector+`<div style="text-align:center;padding:24px;color:${MU};font-size:11px;">← Choisissez un cinéma pour voir les séances</div>`;
      return cinemaSelector+dayPicker()+`<div style="padding:0 18px 20px;"><div id="votes-container"></div></div>`;
    })()}
  </div>`:''}
  ${st.tab==='chat'?`<div id="chat-area" style="flex:1;overflow-y:auto;padding:14px 18px;"></div>
  <div style="padding:10px 18px 14px;background:${BG};border-top:1px solid ${BD};display:flex;gap:8px;flex-shrink:0;">
    <input id="msg-input" placeholder="Message…" style="flex:1;background:${S1};border:1px solid ${BD};border-radius:20px;padding:9px 14px;font-size:13px;color:${TX};outline:none;" onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()" style="width:36px;height:36px;border-radius:50%;background:${AC};border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;">↑</button>
  </div>`:''}
  ${st.tab==='membres'?`<div style="flex:1;overflow-y:auto;padding:0 18px 20px;"><div id="membres-list"></div></div>`:''}`;
}

function sProfile(){
  const vuCount=Object.keys(FILMS).filter(id=>isVu(id)).length;
  const wlCount=Object.keys(FILMS).filter(id=>isWatchlist(id)).length;
  const lbdBlock=st.lbdPseudo?`<div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div><div style="font-size:11px;color:${LB};font-weight:600;margin-bottom:2px;">Letterboxd connecté</div><div style="font-size:12px;">@${st.lbdPseudo}</div></div>
      <button onclick="disconnectLbd()" style="font-size:10px;color:${MU};background:${S2};border:1px solid ${BD};border-radius:8px;padding:4px 8px;cursor:pointer;">Déconnecter</button>
    </div>
    <div style="display:flex;gap:12px;">
      ${chip('✓ '+vuCount+' vus',LB,'rgba(0,192,48,0.12)','rgba(0,192,48,0.3)',10)}
      ${chip('🔖 '+wlCount+' watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',10)}
    </div>
  </div>`:`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:14px;">
    <div style="font-size:12px;font-weight:500;margin-bottom:4px;">Connecter Letterboxd</div>
    <div style="font-size:10px;color:${MU};margin-bottom:10px;">Synchronise vos films vus et watchlist</div>
    <div style="display:flex;gap:8px;">
      <input id="lbd-input-field" placeholder="Pseudo Letterboxd" value="${st.lbdInput}" oninput="st.lbdInput=this.value" style="flex:1;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:12px;color:${TX};outline:none;" onkeydown="if(event.key==='Enter')connectLbd()">
      <button onclick="connectLbd()" style="background:${LB};border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;">Connecter</button>
    </div>
  </div>`;

  // Bloc changer de pseudo
  const changePseudoBlock=st._changingPseudo?`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:10px;">
    <div style="font-size:12px;font-weight:500;margin-bottom:10px;">Changer de pseudo</div>
    <div style="display:flex;gap:8px;">
      <input id="new-pseudo-field" placeholder="Nouveau pseudo" maxlength="20"
        style="flex:1;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:12px;color:${TX};outline:none;"
        onkeydown="if(event.key==='Enter')confirmChangePseudo()">
      <button onclick="confirmChangePseudo()" style="background:${AC};border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;">OK</button>
      <button onclick="st._changingPseudo=false;render();" style="background:${S2};border:1px solid ${BD};color:${MU};border-radius:10px;padding:8px 12px;font-size:12px;cursor:pointer;">✕</button>
    </div>
  </div>`:
  `<button onclick="st._changingPseudo=true;render();" style="width:100%;background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;font-size:12px;color:${TX};cursor:pointer;text-align:left;margin-bottom:10px;">
    ✏️ &nbsp;Changer de pseudo
  </button>`;

  // Bouton déconnexion app
  const logoutBlock=`<button onclick="logoutApp()" style="width:100%;background:rgba(255,63,91,0.06);border:1px solid rgba(255,63,91,0.25);border-radius:14px;padding:12px;font-size:12px;color:${AC};cursor:pointer;text-align:left;margin-top:4px;">
    🚪 &nbsp;Se déconnecter de CinéMatch
  </button>`;

  return `<div style="padding:52px 18px 12px;flex-shrink:0;">
    <div class="serif" style="font-size:22px;margin-bottom:16px;">Mon profil</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
      <div onclick="st.showAvatarPicker=!st.showAvatarPicker;render();" style="width:62px;height:62px;border-radius:17px;background:${pseudoColor(st.pseudo)};display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;cursor:pointer;position:relative;">
        ${st.avatar}
        <div style="position:absolute;bottom:-4px;right:-4px;background:${S2};border:1px solid ${BD};border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;">✏️</div>
      </div>
      <div>
        <div style="font-size:18px;font-weight:600;">${st.pseudo}</div>
        <div style="font-size:11px;color:${MU};">@${st.pseudo.toLowerCase().replace(/\s+/g,'')}</div>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    ${st.showAvatarPicker?buildPickerGrid():''}
    ${lbdBlock}
    ${changePseudoBlock}
    ${logoutBlock}
  </div>
  <div style="display:flex;background:${S1};border-top:1px solid ${BD};flex-shrink:0;">
    ${[['home','🎬','Films'],['cinemas','🏛','Cinémas'],['group','👥','Groupes'],['profile','👤','Profil']].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:10px 0;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:18px;">${ic}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
  </div>`;
}

function sMemberProfile(){
  const pseudo=st.viewedMember;
  const lbd=membresLbd[pseudo];
  const myLbd=st.lbdPseudo;
  let commonFilms=[];
  if(lbd&&myLbd){
    commonFilms=Object.entries(FILMS).filter(([id])=>isVu(id)&&filmInLbd(id,lbd.seen)).map(([id,f])=>f.t);
  }
  return `<div style="padding:52px 18px 12px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div onclick="st.screen='group';render();" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;">←</div>
      <div class="serif" style="font-size:20px;">${pseudo}</div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    <div style="display:flex;justify-content:center;margin-bottom:20px;">
      ${avatarEl(pseudo,72,'18px')}
    </div>
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:20px;font-weight:600;">${pseudo}</div>
    </div>
    ${lbd?`<div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="font-size:11px;color:${LB};font-weight:600;margin-bottom:10px;">Letterboxd</div>
      <div style="display:flex;gap:12px;">
        ${chip('✓ '+lbd.seen.size+' vus',LB,'rgba(0,192,48,0.12)','rgba(0,192,48,0.3)',10)}
        ${chip('🔖 '+lbd.wl.size+' watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',10)}
      </div>
      ${commonFilms.length?`<div style="margin-top:10px;"><div style="font-size:10px;color:${MU};margin-bottom:6px;">Films en commun avec vous :</div><div style="font-size:11px;color:${TX};">${commonFilms.slice(0,5).join(', ')}${commonFilms.length>5?'…':''}</div></div>`:''}
    </div>`:`<div style="text-align:center;padding:20px;color:${MU};font-size:12px;">Letterboxd non connecté</div>`}
  </div>`;
}

// ═══════════ RENDER ═══════════
function render(){
  const inner=document.getElementById('inner');
  if(!inner)return;
  if(st.screen==='pseudo')         inner.innerHTML=sPseudo();
  else if(st.screen==='home')      inner.innerHTML=sHome();
  else if(st.screen==='cinemas')   inner.innerHTML=sCinemas();
  else if(st.screen==='cinema-detail') inner.innerHTML=sCinemaDetail();
  else if(st.screen==='film')      inner.innerHTML=sFilm();
  else if(st.screen==='group')     {inner.innerHTML=sGroup(); if(st.groupe&&st.tab==='vote')renderVotesDOM(); if(st.groupe&&st.tab==='membres')renderMembresDOM(); if(st.groupe&&st.tab==='chat')loadMessages();}
  else if(st.screen==='profile')   inner.innerHTML=sProfile();
  else if(st.screen==='member-profile') inner.innerHTML=sMemberProfile();
}

// ═══════════ INIT ═══════════
(function handleInvite(){
  const params=new URLSearchParams(window.location.search);
  const gid=params.get('groupe'),fid=params.get('film');
  if(gid&&fid&&st.pseudo){history.replaceState({},'','/');openGroup(fid,gid);}
  else if(gid&&fid){st._inviteGroupe=gid;st._inviteFilm=fid;}
})();

render();
if(st.pseudo){loadMesGroupes();if(st.lbdPseudo)loadLbd(st.lbdPseudo);}
loadPosters();

setInterval(()=>{
  if(st.screen==='cinemas'||st.screen==='cinema-detail'||st.screen==='group')render();
},60*1000);
</script>
</body>
</html>
