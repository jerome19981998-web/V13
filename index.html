async function initDynamicData(dateStr){
  const isFirstLoad=!DATA_LOADED;
  try{
    if(isFirstLoad){
      const[filmsRes,cinemasRes,datesRes]=await Promise.all([
        supa.from('films_dyn').select('*').limit(200),
        supa.from('cinemas_dyn').select('*'),
        supa.from('seances_dyn').select('date').limit(1000),
      ]);
      // Dates disponibles uniques triées
      const dateSet=new Set((datesRes.data||[]).map(r=>r.date));
      AVAILABLE_DATES=[...dateSet].sort();
      // Choisir la date : demandée si dispo, sinon première dispo
      if(!dateStr||!AVAILABLE_DATES.includes(dateStr)){
        dateStr=AVAILABLE_DATES[0]||todayStr();
      }
      st.date=dateStr;
      // Films
      FILMS={};
      for(const f of(filmsRes.data||[])){
        const[c,bg]=filmPalette(f.id);
        FILMS[f.id]={
          e:genreEmoji(f.genre),c,bg,
          g:(f.genre||'DIVERS').toUpperCase(),
          t:f.title,d:f.duration||'',dir:f.director||'',
          s:f.synopsis||'',poster:f.poster_url||null,
          tmdbNote:f.tmdb_note||null,trailerKey:f.trailer_key||null,
          lbd:false,
        };
      }
      // Cinémas (sans séances pour l'instant)
      CINEMAS=(cinemasRes.data||[]).map(c=>({
        id:c.id,lat:c.lat,lng:c.lng,chain:c.chain,
        icon:CHAIN_ICONS[c.chain]||'🎬',name:c.name,
        addr:c.addr||'',metro:c.metro||'',salles:null,tech:[],
        films:[],
      }));
    }
    // Charger les séances pour la date
    const targetDate=dateStr||st.date;
    const seancesRes=await supa.from('seances_dyn').select('*').eq('date',targetDate);
    const sm={};
    for(const s of(seancesRes.data||[])){
      if(!sm[s.cinema_id])sm[s.cinema_id]={};
      sm[s.cinema_id][s.film_id]=s.heures||[];
    }
    SEANCES=sm;
    CINEMAS=CINEMAS.map(c=>({...c,films:Object.keys(sm[c.id]||{}).map(id=>({id}))}));
    DATA_LOADED=true;
  }catch(e){console.error('initDynamicData:',e);}
}


// ═══════════ TOAST ═══════════
function toast(msg, type='info', dur=2800){
  const colors={info:MU, success:LB, error:AC, warning:GD};
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:${S2};border:1px solid ${colors[type]||BD};border-radius:12px;padding:10px 16px;font-size:12px;color:${TX};z-index:9999;opacity:0;transition:all 0.25s;white-space:nowrap;max-width:300px;text-align:center;`;
  t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';setTimeout(()=>t.remove(),300);},dur);
}

// ═══════════ GÉOLOCALISATION ═══════════
let userPos = null;
function getDistance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distLabel(km){ return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km'; }
function requestGeoLoc(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>{
    userPos={lat:p.coords.latitude,lng:p.coords.longitude};
    if(['cinemas','cinema-detail','home'].includes(st.screen))render();
  },()=>{},{timeout:8000});
}
function sortedCinemas(chain){
  const list=chain?CINEMAS.filter(c=>c.chain===chain):CINEMAS;
  if(!userPos)return list;
  return [...list].sort((a,b)=>{
    const da=(a.lat&&a.lng)?getDistance(userPos.lat,userPos.lng,a.lat,a.lng):999;
    const db=(b.lat&&b.lng)?getDistance(userPos.lat,userPos.lng,b.lat,b.lng):999;
    return da-db;
  });
}
requestGeoLoc();

const tmdbGenreCache = JSON.parse(localStorage.getItem('cm_genres')||'{}');

async function enrichGenresFromTMDB(){
  // Ne traiter que les films sans genre ou avec "DIVERS"
  const toFetch = Object.entries(FILMS).filter(([id,f])=>
    !f.genre_enriched && (!f.g || f.g==='DIVERS' || f.g==='')
  );
  if(toFetch.length===0) return;

  // Traiter par batch de 5 en parallèle
  for(let i=0;i<toFetch.length;i+=5){
    const batch = toFetch.slice(i,i+5);
    await Promise.all(batch.map(async([id,f])=>{
      // Vérifier le cache d'abord
      if(tmdbGenreCache[id]){
        applyGenre(id, tmdbGenreCache[id]);
        return;
      }
      try{
        const q = encodeURIComponent(f.t);
        const r = await fetch(`https://api.themoviedb.org/3/search/movie?query=${q}&language=fr-FR&page=1`,{
          headers:{Authorization:'Bearer '+TMDB_TOKEN}
        });
        const data = await r.json();
        const movie = data.results?.[0];
        if(movie?.genre_ids?.length){
          const genre = TMDB_GENRE_MAP[movie.genre_ids[0]] || 'divers';
          tmdbGenreCache[id] = genre;
          applyGenre(id, genre);
          // Sauvegarder poster si manquant
          if(!posters[id] && movie.poster_path){
            posters[id] = TMDB_IMG + movie.poster_path;
          }
          if(!ratings[id] && movie.vote_average>0){
            ratings[id] = {note: movie.vote_average.toFixed(1)};
          }
        }
      }catch(e){}
    }));
  }
  // Sauvegarder le cache
  try{ localStorage.setItem('cm_genres', JSON.stringify(tmdbGenreCache)); }catch(e){}
  // Re-render si on est sur home/films
  if(['home','film'].includes(st.screen)) render();
}

function applyGenre(id, genre){
  if(!FILMS[id]) return;
  FILMS[id].g = genre.charAt(0).toUpperCase() + genre.slice(1);
  FILMS[id].e = genreEmoji(genre);
  FILMS[id].genre_enriched = true;
}

let lbdSeen=new Set(),lbdWatchlist=new Set();
function normTitle(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function filmInLbd(filmId,list){
  const f=FILMS[filmId];if(!f)return false;
  const titles=[f.t,...(f.alt||[])].map(normTitle);
  for(const t of list){for(const n of titles){if(t.includes(n)||n.includes(t))return true;}}
  return false;
}
function isVu(id){return filmInLbd(id,lbdSeen);}
function isWatchlist(id){return filmInLbd(id,lbdWatchlist);}

async function loadLbd(pseudo){
  try{
    const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);
    if(!r.ok)return false;
    const d=await r.json();
    lbdSeen=new Set();lbdWatchlist=new Set();
    (d.items||[]).forEach(item=>{
      const n=normTitle(item.title);
      // Dans le RSS Letterboxd, les items du diary = films vus
      // Les items avec cat 'wishlist' = watchlist, sinon = vu
      if(item.cats&&item.cats.includes('wishlist'))lbdWatchlist.add(n);
      else lbdSeen.add(n);
    });
    return true;
  }catch(e){return false;}
}

function formatDate(ds){
  const d=new Date(ds+'T12:00:00');
  const jours=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const mois=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  return jours[d.getDay()]+' '+d.getDate()+' '+mois[d.getMonth()];
}

function countdown(date,heure){
  if(!date||!heure)return'';
  const h=heure.replace('h',':');
  const target=new Date(date+'T'+h+':00');
  const now=new Date();
  const diff=target-now;
  if(diff<=0)return T('seancePassee');
  const days=Math.floor(diff/86400000);
  const hrs=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  if(days>0)return`dans ${days}j ${hrs}h`;
  if(hrs>0)return`dans ${hrs}h ${mins}min`;
  return`dans ${mins}min`;
}

// Écouteur principal — appelé dès le démarrage et à chaque changement de session
// Mutex pour eviter la double execution de handleSession
let _sessionHandled=false;
let _handlingSession=false;

async function handleSession(session, force=false){
  // Eviter les appels paralleles (cause les "Lock stolen" errors)
  if(_handlingSession)return;
  if(_sessionHandled&&!force)return;
  _handlingSession=true;

  try{
    if(session?.user){
      st.userId=session.user.id;
      st.userEmail=session.user.email||'';

      // Nettoyer le hash de l'URL (access_token visible dans la barre d'adresse)
      if(window.location.hash&&window.location.hash.includes('access_token')){
        history.replaceState({},'',window.location.pathname);
      }

      let hasProfile=await loadProfile(st.userId);

      // Si pas de profil en base mais pseudo en localStorage → auto-creer le profil
      if(!hasProfile&&st.pseudo){
        const{error}=await supa.from('profiles').upsert({
          id:st.userId,pseudo:st.pseudo,avatar:st.avatar||'🎬',lang:st.lang||'fr'
        },{onConflict:'id'});
        if(!error)hasProfile=true;
      }

      if(hasProfile){
        if(st.screen==='loading'||st.screen==='auth'||st.screen==='pseudo'){
          st.screen='home';
          render();
          loadMesGroupes();loadSorties();
          if(st.lbdPseudo)loadLbd(st.lbdPseudo);
          if(st._inviteGroupe&&st._inviteFilm){
            const gid=st._inviteGroupe,fid=st._inviteFilm;
            st._inviteGroupe=null;st._inviteFilm=null;
            openGroup(fid,gid);
          }
        }
      }else{
        // Nouveau user sans pseudo — ecran de choix du pseudo
        st.screen='pseudo';st.pseudoInput='';render();
      }
    }else{
      st.userId=null;st.userEmail='';
      if(st.screen!=='auth'){st.screen='auth';st.authStep='email';render();}
    }
  }finally{
    _sessionHandled=true;
    _handlingSession=false;
  }
}

// onAuthStateChange est la seule source de verite — il couvre magic link, Google, refresh
supa.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'||event==='INITIAL_SESSION'){
    _sessionHandled=false; // reset pour que handleSession s'execute
    await handleSession(session);
  } else if(event==='TOKEN_REFRESHED'||event==='USER_UPDATED'){
    await handleSession(session,true);
  } else if(event==='SIGNED_OUT'){
    _sessionHandled=false;
    _handlingSession=false;
    st.userId=null;st.userEmail='';
    st.screen='auth';st.authStep='email';render();
  }
});

function renderVotesDOM(){
  const el=document.getElementById('votes-container');
  if(!el||!st.film)return;
  // Récupérer toutes les séances de tous les cinémas pour ce film
  const tousCinemas=CINEMAS.filter(c=>c.films.some(f=>f.id===st.film));
  // Si un cinéma est sélectionné, filtrer sur lui uniquement
  const cinemasActifs=st.cinema?tousCinemas.filter(c=>c.id===st.cinema):tousCinemas;
  // Collecter toutes les séances (dédupliquées par heure)
  const heuresVues=new Set();
  const allSeances=[];
  cinemasActifs.forEach(c=>{
    ((SEANCES[c.id]||{})[st.film]||[]).forEach(h=>{
      if(!heuresVues.has(h)){heuresVues.add(h);allSeances.push(h);}
    });
  });
  allSeances.sort();
  if(!allSeances.length){el.innerHTML=`<div style="text-align:center;padding:30px;color:${MU};font-size:12px;">${T('aucuneSeanceJour')}</div>`;return;}

  // Trouver l'horaire avec le plus de votes (pour "C'est décidé !")
  let maxVotes=0,bestHeure=null;
  allSeances.forEach(h=>{const k=st.date+' '+h;const n=(votesData[k]||[]).length;if(n>maxVotes){maxVotes=n;bestHeure=h;}});
  const majority=membresData.length>0&&maxVotes>=Math.ceil(membresData.length/2);
  const confirmBtn=(majority&&bestHeure&&!groupeInfo.confirmed_heure)?`<div onclick="confirmerPlan('${st.cinema}','${bestHeure}','${st.date}')" style="margin-bottom:12px;padding:12px 14px;border-radius:14px;background:rgba(0,192,48,0.12);border:1px solid rgba(0,192,48,0.4);cursor:pointer;text-align:center;">
    <div style="font-size:13px;font-weight:700;color:${LB};">${T('cestDecide')}</div>
    <div style="font-size:10px;color:${MU};margin-top:2px;">Confirmer ${bestHeure} · ${maxVotes} vote${maxVotes>1?'s':''}</div>
  </div>`:'';

  el.innerHTML=confirmBtn+allSeances.map(h=>{
    const past=isPast(h);
    const k=st.date+' '+h;
    const voters=votesData[k]||[];
    const voted=voters.some(v=>v.pseudo===st.pseudo);
    return `<div onclick="${past?'':"voter('"+ h +"')"}" class="${past?'':'tap'}" style="opacity:${past?'0.4':'1'};background:${voted?'rgba(255,63,91,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${voted?AC:BD};border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:${past?'default':'pointer'};display:flex;align-items:center;gap:10px;">
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:600;color:${voted?AC:past?MU:TX};">${h}${past?`<span style="font-size:9px;">${T('seancesPassee')}</span>`:''}</div>
        <div style="font-size:10px;color:${MU};margin-top:2px;">${voters.length} vote${voters.length!==1?'s':''}</div>
      </div>
      <div style="display:flex;">${voters.slice(0,5).map(v=>`<div style="width:22px;height:22px;border-radius:50%;background:${pseudoColor(v.pseudo)};border:2px solid ${BG};display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:-4px;">${v.pseudo===st.pseudo?st.avatar:pseudoInitial(v.pseudo)}</div>`).join('')}</div>
      <div style="width:28px;height:28px;border-radius:50%;background:${voted?AC:'rgba(255,255,255,0.06)'};border:1px solid ${voted?AC:BD};display:flex;align-items:center;justify-content:center;font-size:14px;">${voted?'✓':'+'}</div>
    </div>`;
  }).join('');
}

async function sendMagicLink(){
  const inp=document.getElementById('authEmail');
  const email=(inp?inp.value:'').trim();
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    const err=document.getElementById('auth-err');
    if(err){err.style.opacity='1';setTimeout(()=>{if(err)err.style.opacity='0';},2500);}
    return;
  }
  st.userEmail=email;
  const {error}=await supa.auth.signInWithOtp({
    email,
    options:{emailRedirectTo:window.location.origin}
  });
  if(!error){st.authStep='sent';render();}
  else{alert('Erreur : '+error.message);}
}

async function signInWithGoogle(){
  const {error}=await supa.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.origin}
  });
  if(error)alert('Erreur Google : '+error.message);
}

async function confirmPseudo(){
  const inp=document.getElementById('pseudoInput');
  const val=(inp?inp.value:st.pseudoInput).trim();
  if(!val||!st.userId)return;
  // Vérifier que le pseudo n'est pas déjà pris
  const{data:existing}=await supa.from('profiles').select('id').eq('pseudo',val).neq('id',st.userId).limit(1);
  if(existing&&existing.length>0){
    const err=document.getElementById('pseudo-err');
    if(err){err.textContent='Ce pseudo est déjà pris ❌';err.style.opacity='1';}
    return;
  }
  // Sauvegarder le profil dans Supabase
  const{error}=await supa.from('profiles').upsert({id:st.userId,pseudo:val,avatar:st.avatar,lang:st.lang},{onConflict:'id'});
  if(error){alert('Erreur : '+error.message);return;}
  st.pseudo=val;save();
  if(st._inviteGroupe&&st._inviteFilm){
    const gid=st._inviteGroupe,fid=st._inviteFilm;
    st._inviteGroupe=null;st._inviteFilm=null;
    history.replaceState({},'','/');
    loadMesGroupes().then(()=>openGroup(fid,gid));
  }else{
    st.screen='home';render();loadMesGroupes();loadSorties();
  }
}

function getSearchHistory(){
  try{
    const key='cm_searches_'+(st.pseudo||'_');
    return JSON.parse(localStorage.getItem(key)||'[]');
  }catch(e){return[];}
}
function saveSearch(q){
  if(!q||q.trim().length<2)return;
  q=q.trim();
  try{
    const key='cm_searches_'+(st.pseudo||'_');
    let hist=getSearchHistory();
    hist=hist.filter(h=>h!==q); // dédoublonner
    hist.unshift(q);
    hist=hist.slice(0,8); // max 8
    localStorage.setItem(key,JSON.stringify(hist));
  }catch(e){}
}
function clearSearchHistory(){
  try{localStorage.removeItem('cm_searches_'+(st.pseudo||'_'));}catch(e){}
  st.search='';render();
}
function useSearch(q){
  st.search=q;
  st.showSearchHistory=false;
  render();
}

              ${posters[fid]?`<img src="${posters[fid]}" style="width:32px;height:44px;object-fit:cover;border-radius:6px;">`:

              <div style="flex:1;min-width:0;">
                <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.t}</div>
                <div style="font-size:10px;color:${MU};">${f.g?f.g.charAt(0)+f.g.slice(1).toLowerCase():''} ${f.tmdbNote?`· ★ ${f.tmdbNote}`:''}</div>
              </div>

      ${filmId?`<div style="margin-bottom:16px;">
        <div style="font-size:10px;color:${MU};letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">${T('choisisCinema')}</div>
        ${cinForFilm.length===0?`<div style="font-size:12px;color:${MU};padding:10px;">${T('aucunFilmDispo')}</div>`:''}
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${cinForFilm.map(c=>{
            const sel=cinemaId===c.id;
            return `<div onclick="st.newSortie={...(st.newSortie||{}),cinema:'${c.id}',heure:null};render()" style="padding:10px 12px;border-radius:12px;cursor:pointer;background:${sel?'rgba(255,63,91,0.12)':S1};border:1px solid ${sel?AC:BD};display:flex;align-items:center;justify-content:space-between;">
              <div>
                <div style="font-size:12px;font-weight:600;">${c.name}</div>
                <div style="font-size:10px;color:${CC[c.chain]||MU};">${c.chain?.toUpperCase()||''} · ${c.metro||c.addr||''}</div>
              </div>
              ${sel?`<span style="color:${AC};">✓</span>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`:''}

      ${filmId&&cinemaId?`<div style="margin-bottom:16px;">
        <div style="font-size:10px;color:${MU};letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">${T('choisisSeance')}</div>
        ${AVAILABLE_DATES.length>1?`<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:8px;">
          ${AVAILABLE_DATES.map(d=>{
            const dd=new Date(d+'T12:00:00');
            const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
            const months=['jan','fév','mar','avr','mai','jun','jul','aoû'];
            const sel=(ns.date||AVAILABLE_DATES[0])===d;
            return `<div onclick="(async()=>{st.newSortie={...(st.newSortie||{}),date:'${d}',heure:null};await initDynamicData('${d}');render();})()" style="flex-shrink:0;width:44px;text-align:center;padding:6px 4px;border-radius:10px;cursor:pointer;background:${sel?AC:'rgba(255,255,255,0.03)'};border:1px solid ${sel?AC:BD};">
              <div style="font-size:9px;color:${sel?'#fff':MU};">${days[dd.getDay()]}</div>
              <div style="font-size:14px;font-weight:600;color:${sel?'#fff':TX};">${dd.getDate()}</div>
              <div style="font-size:9px;color:${sel?'rgba(255,255,255,0.7)':MU};">${months[dd.getMonth()]}</div>
            </div>`;
          }).join('')}
        </div>`:''}
        ${heuresForDate.length===0?`<div style="font-size:12px;color:${MU};padding:10px;">${T('aucuneSeance')}</div>`:''}
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${heuresForDate.map(h=>`<div onclick="st.newSortie={...(st.newSortie||{}),heure:'${h}'};render()" style="padding:8px 14px;border-radius:12px;cursor:pointer;background:${heure===h?AC:'rgba(255,255,255,0.05)'};border:1px solid ${heure===h?AC:BD};font-size:13px;font-weight:600;color:${heure===h?'#fff':TX};">${h}</div>`).join('')}
        </div>
      </div>`:''}

      ${filmId&&cinemaId&&heure?`<div style="margin-bottom:20px;">
        <div style="font-size:10px;color:${MU};letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">${T('combienPersonnes')}</div>
        <div style="display:flex;align-items:center;gap:16px;">
          <div onclick="st.newSortie={...(st.newSortie||{}),max:Math.max(2,(st.newSortie?.max||6)-1)};render()" style="width:36px;height:36px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;">−</div>
          <div style="font-size:22px;font-weight:700;min-width:32px;text-align:center;">${maxM}</div>
          <div onclick="st.newSortie={...(st.newSortie||{}),max:Math.min(12,(st.newSortie?.max||6)+1)};render()" style="width:36px;height:36px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;">+</div>
          <div style="font-size:11px;color:${MU};">${T('personnesInclus')}</div>
        </div>
      </div>`:''}

      ${canCreate?`<div onclick="creerSortie('${filmId}','${cinemaId}','${heure}','${selectedDate}',${maxM})" style="padding:14px;background:${AC};border-radius:16px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;color:#fff;">${T('creerSortieBtn')}</div>`:''}
    </div>
  </div>`;
}


function sGroup(){
  const navbar=`<div style="display:flex;background:${S1};border-top:1px solid ${BD};flex-shrink:0;">
    ${[['home','🍿',T('sorties').slice(3)],['cinemas','🏛',T('cinemas').slice(3)],['group','👥',T('groupes').slice(3)],['profile','👤',T('profil').slice(3)]].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:10px 0;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:18px;position:relative;display:inline-block;">${ic}${sc==='group'&&mesGroupes.some(g=>g.confirmed_heure)?'<div style="position:absolute;top:-3px;right:-5px;width:7px;height:7px;border-radius:50%;background:#00c030;border:1.5px solid #07070f;"></div>':''}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
  </div>`;

  // ─── LISTE DES GROUPES (pas de groupe sélectionné) ───
  if(!st.groupe){
    if(mesGroupes.length===0) return `
      <div style="flex:1;display:flex;flex-direction:column;">
        <div style="padding:52px 18px 16px;flex-shrink:0;">
          <div class="serif" style="font-size:22px;">Mes groupes</div>
          <div style="font-size:12px;color:${MU};margin-top:4px;">Tes conversations ciné</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;gap:12px;">
          <div style="font-size:52px;">🎬</div>
          <div class="serif" style="font-size:18px;">Aucun groupe</div>
          <div style="font-size:12px;color:${MU};line-height:1.6;">Rejoins une sortie ou crée un groupe<br>depuis un film pour commencer</div>
          <div onclick="go('home')" style="margin-top:8px;padding:12px 24px;background:${AC};border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;">Voir les sorties 🍿</div>
        </div>
        ${navbar}
      </div>`;

    return `
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div style="padding:52px 18px 12px;flex-shrink:0;">
          <div class="serif" style="font-size:22px;">Mes groupes</div>
          <div style="font-size:12px;color:${MU};margin-top:2px;">${mesGroupes.length} conversation${mesGroupes.length>1?'s':''}</div>
        </div>
        <div style="flex:1;overflow-y:auto;">
          ${mesGroupes.map(g=>{
            const gf=FILMS[g.film_id]||{t:g.nom||'Film',e:'🎬',bg:'#222'};
            const hasConfirmed=g.confirmed_cinema&&g.confirmed_heure&&g.confirmed_date;
            const isActive=st.groupe===g.id;
            return `<div onclick="selectGroupe('${g.film_id}','${g.id}')" class="tap" style="display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;background:${isActive?'rgba(255,255,255,0.04)':'transparent'};border-bottom:1px solid ${BD};">
              <div style="width:48px;height:48px;border-radius:12px;overflow:hidden;background:${gf.bg};flex-shrink:0;position:relative;">
                ${posters[g.film_id]?`<img src="${posters[g.film_id]}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;">${gf.e}</span>`}
                ${hasConfirmed?`<div style="position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:#00c030;border:2px solid ${BG};"></div>`:''}
              </div>
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3px;">
                  <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;">${gf.t}</div>
                  ${hasConfirmed?`<div style="font-size:9px;color:#00c030;font-weight:600;flex-shrink:0;margin-left:6px;">${formatDate(g.confirmed_date)}</div>`:''}
                </div>
                <div style="font-size:11px;color:${MU};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                  ${hasConfirmed?`✅ ${g.confirmed_heure} · ${g.confirmed_cinema?CINEMAS.find(c=>c.id===g.confirmed_cinema)?.name||g.confirmed_cinema:''}`:'💬 Tapez pour rejoindre le chat'}
                </div>
              </div>
              <div style="color:${MU};font-size:16px;flex-shrink:0;">›</div>
            </div>`;
          }).join('')}
        </div>
        ${navbar}
      </div>`;
  }

  // ─── VUE GROUPE SÉLECTIONNÉ ───
  const f=FILMS[st.film]||{t:'Groupe',e:'🎬'};
  const gc=groupeInfo||{};
  const isConfirmed=gc.confirmed_cinema&&gc.confirmed_heure&&gc.confirmed_date;
  const confirmedCinema=CINEMAS.find(c=>c.id===gc.confirmed_cinema);
  const links=isConfirmed?CINEMA_LINKS[gc.confirmed_cinema]||{}:{};
  const cd=isConfirmed?countdown(gc.confirmed_date,gc.confirmed_heure):'';
  const seancePassed=isConfirmed&&cd===T('seancePassee');

  const tabs=[['chat','💬 Chat'],['membres','👥 Membres'],['vote','🗳 Vote']];

  const header=`
    <div style="padding:52px 18px 0;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div onclick="st.groupe=null;st.tab='chat';render();" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;">←</div>
        <div style="width:36px;height:36px;border-radius:10px;overflow:hidden;background:${f.bg||'#222'};flex-shrink:0;">
          ${posters[st.film]?`<img src="${posters[st.film]}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:18px;">${f.e||'🎬'}</span>`}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.t||'Groupe'}</div>
          <div style="font-size:10px;color:${isConfirmed?'#00c030':MU};">
            ${isConfirmed?`✅ ${gc.confirmed_heure} · ${formatDate(gc.confirmed_date)}`:`${membresData.length} membre${membresData.length!==1?'s':''} · Vote en cours`}
          </div>
        </div>
        <button onclick="shareGroupe()" style="width:30px;height:30px;border-radius:50%;background:${S2};border:1px solid ${BD};color:${TX};font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;">🔗</button>
        <button onclick="quitterGroupe()" style="width:30px;height:30px;border-radius:50%;background:rgba(255,63,91,0.08);border:1px solid rgba(255,63,91,0.3);color:${AC};font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;">🚪</button>
      </div>
      ${isConfirmed&&!seancePassed?`<div style="margin-bottom:10px;background:rgba(0,192,48,0.07);border:1px solid rgba(0,192,48,0.25);border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:10px;color:#00c030;font-weight:700;text-transform:uppercase;letter-spacing:1px;">✅ Plan confirmé</div>
          <div style="font-size:12px;font-weight:600;margin-top:1px;">${confirmedCinema?.name||gc.confirmed_cinema} · ${gc.confirmed_heure}</div>
        </div>
        <div style="display:flex;gap:6px;">
          ${links.maps?`<a href="${links.maps}" target="_blank" style="padding:5px 10px;background:rgba(74,158,255,0.15);border:1px solid rgba(74,158,255,0.3);border-radius:8px;font-size:10px;font-weight:600;color:#4a9eff;text-decoration:none;">🗺 Y aller</a>`:''}
          ${links.tickets?`<a href="${links.tickets}" target="_blank" style="padding:5px 10px;background:rgba(240,192,96,0.12);border:1px solid rgba(240,192,96,0.3);border-radius:8px;font-size:10px;font-weight:600;color:${GD};text-decoration:none;">🎟 Billets</a>`:''}
        </div>
      </div>`:''}
      <div style="display:flex;gap:6px;margin-bottom:0;">
        ${tabs.map(([id,lb])=>`<div onclick="st.tab='${id}';render();${id==='membres'?'renderMembresDOM();':id==='vote'?'renderVotesDOM();':id==='chat'?'loadMessages();':''}" style="flex:1;text-align:center;padding:7px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer;background:${st.tab===id?AC:'rgba(255,255,255,0.03)'};border:1px solid ${st.tab===id?AC:BD};color:${st.tab===id?'#fff':MU};">${lb}</div>`).join('')}
      </div>
    </div>`;

  if(st.tab==='chat') return `
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${header}
      <div id="chat-area" style="flex:1;overflow-y:auto;padding:14px 18px;"></div>
      <div style="padding:10px 18px 14px;background:${BG};border-top:1px solid ${BD};display:flex;gap:8px;flex-shrink:0;">
        <input id="msg-input" placeholder="Message…" style="flex:1;background:${S1};border:1px solid ${BD};border-radius:20px;padding:9px 14px;font-size:13px;color:${TX};outline:none;" onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()" style="width:36px;height:36px;border-radius:50%;background:${AC};border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;">↑</button>
      </div>
    </div>`;

  if(st.tab==='membres') return `
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${header}
      <div style="flex:1;overflow-y:auto;padding:12px 18px 20px;">
        <div id="membres-list"></div>
      </div>
    </div>`;

  // tab === 'vote'
  const cinemasFilm=CINEMAS.filter(c=>c.films.some(fi=>fi.id===st.film));
  const cinemaSelector=`<div style="padding:12px 18px 0;">
    <div style="font-size:9px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Choisir le cinéma</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px;">
      ${cinemasFilm.map(c=>{
        const active=st.cinema===c.id;
        const col=CC[c.chain]||MU;
        const votes_c=membresData.filter(m=>m.cinema_pref===c.id).length;
        const pct=membresData.length>0?Math.round(votes_c/membresData.length*100):0;
        return `<div onclick="voterCinema('${c.id}')" style="padding:9px 12px;border-radius:12px;cursor:pointer;background:${active?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.02)'};border:1px solid ${active?col:BD};">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:${votes_c>0?'7px':'0'};">
            <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0;"></div>
            <div style="flex:1;font-size:12px;font-weight:${active?'600':'400'};color:${active?TX:MU};">${c.name}</div>
            ${votes_c>0?`<div style="font-size:10px;color:${col};font-weight:600;">${votes_c} vote${votes_c>1?'s':''}</div>`:''}
            ${active?`<div style="font-size:10px;color:${col};">✓</div>`:''}
          </div>
          ${votes_c>0?`<div style="height:3px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:2px;transition:width 0.3s;"></div></div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  const avisSection=seancePassed?`<div style="padding:0 18px 20px;">
    <div style="font-size:10px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Vos avis sur le film</div>
    ${(()=>{
      const monAvis=membresData.find(m=>m.pseudo===st.pseudo&&m.avis);
      const monAvisData=monAvis?JSON.parse(monAvis.avis||'{}'):null;
      const avgNote=membresData.filter(m=>m.avis).map(m=>{try{return JSON.parse(m.avis).note||0;}catch{return 0;}}).filter(n=>n>0);
      const avg=avgNote.length?Math.round(avgNote.reduce((a,b)=>a+b,0)/avgNote.length*10)/10:0;
      const notePicker=monAvisData?`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;margin-bottom:10px;text-align:center;">
        <div style="font-size:10px;color:${LB};margin-bottom:4px;">Votre note : ${monAvisData.note}★</div>
        ${monAvisData.commentaire?`<div style="font-size:11px;color:${MU};font-style:italic;">"${monAvisData.commentaire}"</div>`:''}
      </div>`:`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;margin-bottom:10px;">
        <div style="font-size:11px;color:${MU};margin-bottom:8px;">Votre note :</div>
        <div style="display:flex;gap:6px;justify-content:center;margin-bottom:10px;">
          ${[1,2,3,4,5].map(n=>`<div onclick="document.getElementById('avis-stars').dataset.note='${n}';[...document.querySelectorAll('.star-btn')].forEach((s,i)=>s.style.opacity=i<${n}?'1':'0.3')" class="star-btn" style="font-size:28px;cursor:pointer;opacity:${n<=3?'1':'0.3'};transition:opacity 0.15s;">★</div>`).join('')}
        </div>
        <div id="avis-stars" data-note="3"></div>
        <input id="avis-input" placeholder="Un mot sur le film… (optionnel)" style="width:100%;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:12px;color:${TX};outline:none;margin-bottom:8px;box-sizing:border-box;">
        <button onclick="postAvis(parseInt(document.getElementById('avis-stars').dataset.note||3))" style="width:100%;background:${AC};border:none;color:#fff;border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;">Publier mon avis ✓</button>
      </div>`;
      const avisListe=membresData.filter(m=>m.avis).map(m=>{
        try{const a=JSON.parse(m.avis);return`<div style="display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid ${BD};">
          ${avatarEl(m.pseudo,32)}
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
              <span style="font-size:11px;font-weight:600;">${m.pseudo}</span>
              <span style="font-size:12px;color:${GD};">${'★'.repeat(a.note||0)}<span style="color:${S2};">${'★'.repeat(5-(a.note||0))}</span></span>
            </div>
            ${a.commentaire?`<div style="font-size:11px;color:${MU};font-style:italic;">"${a.commentaire}"</div>`:''}
          </div>
        </div>`;}catch{return'';}
      }).join('');
      return (avg?`<div style="text-align:center;padding:12px;margin-bottom:10px;background:${S1};border:1px solid ${BD};border-radius:14px;">
        <div style="font-size:32px;font-weight:700;color:${GD};">${avg}★</div>
        <div style="font-size:10px;color:${MU};">Note moyenne du groupe</div>
      </div>`:'')
      +notePicker
      +(avisListe?`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;">${avisListe}</div>`:'');
    })()}
  </div>`:'';

  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    ${header}
    <div style="flex:1;overflow-y:auto;">
      ${seancePassed?avisSection:cinemaSelector+(st.cinema?dayPicker()+'<div style="padding:0 18px 20px;"><div id="votes-container"></div></div>':`<div style="text-align:center;padding:24px;color:${MU};font-size:11px;">← Choisissez un cinéma pour voir les séances</div>`)}
    </div>
  </div>`;
}



function sWantToSee(){
  const list=getWantToSee();
  const films=list.map(id=>({id,f:FILMS[id]})).filter(x=>x.f);
  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div style="padding:52px 18px 12px;flex-shrink:0;display:flex;align-items:center;gap:12px;">
      <div onclick="go('profile')" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;">←</div>
      <div>
        <div class="serif" style="font-size:22px;">❤️ Je veux voir</div>
        <div style="font-size:11px;color:${MU};">${films.length} film${films.length!==1?'s':''}</div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
      ${films.length===0?`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px;">
          <div style="font-size:52px;">🎬</div>
          <div class="serif" style="font-size:18px;">Aucun film pour l'instant</div>
          <div style="font-size:12px;color:${MU};line-height:1.6;">Explore les films et appuie sur<br>❤️ Je veux voir pour les retrouver ici</div>
          <div onclick="st.homeTab='films';go('home')" style="margin-top:8px;padding:10px 24px;background:${AC};border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;">Parcourir les films</div>
        </div>`:
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        ${films.map(({id,f})=>{
          const hasSortie=sortiesPubliques.some(s=>s.film_id===id);
          return `<div style="background:${S1};border:1px solid ${BD};border-radius:14px;overflow:hidden;position:relative;">
            <div onclick="openFilm('${id}','home')" class="tap" style="cursor:pointer;">
              <div style="height:130px;position:relative;background:${f.bg};overflow:hidden;">
                ${posters[id]?`<img src="${posters[id]}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);font-size:58px;">${f.e}</span>`}
                ${hasSortie?`<div style="position:absolute;bottom:6px;left:6px;background:${AC};border-radius:8px;padding:2px 7px;font-size:9px;font-weight:700;color:#fff;">🍿 Sortie dispo</div>`:''}
              </div>
              <div style="padding:8px;">
                <div style="font-size:8px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;">${f.g}</div>
                <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.t}</div>
              </div>
            </div>
            <div style="padding:0 8px 8px;display:flex;gap:6px;">
              ${hasSortie?
                `<div onclick="st.homeTab='sorties';go('home')" style="flex:1;text-align:center;padding:6px;border-radius:10px;background:${AC};font-size:10px;font-weight:700;color:#fff;cursor:pointer;">Voir la sortie</div>`:
                `<div onclick="createSortieScroll=0;st.newSortie={film:'${id}'};st.screen='create-sortie';render()" style="flex:1;text-align:center;padding:6px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid ${BD};font-size:10px;font-weight:600;color:${MU};cursor:pointer;">+ Créer sortie</div>`
              }
              <div onclick="event.stopPropagation();toggleWantToSee('${id}')" style="width:28px;height:28px;border-radius:8px;background:rgba(255,63,91,0.1);border:1px solid rgba(255,63,91,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;">❤️</div>
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>
  </div>`;
}

function sProfile(){
  const vuCount=Object.keys(FILMS).filter(id=>isVu(id)).length;
  const wlCount=Object.keys(FILMS).filter(id=>isWatchlist(id)).length;
  const lbdBlock=st.lbdPseudo?`<div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div><div style="font-size:11px;color:${LB};font-weight:600;margin-bottom:2px;">Letterboxd connecté</div><div style="font-size:12px;">@${st.lbdPseudo}</div></div>
      <button onclick="disconnectLbd()" style="font-size:10px;color:${MU};background:${S2};border:1px solid ${BD};border-radius:8px;padding:4px 8px;cursor:pointer;">Déconnecter</button>
    </div>
    <div style="display:flex;gap:12px;">
      ${chip('✓ '+vuCount+' vus',LB,'rgba(0,192,48,0.12)','rgba(0,192,48,0.3)',10)}
      ${chip('🔖 '+wlCount+' watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',10)}
    </div>
  </div>`:`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:14px;">
    <div style="font-size:12px;font-weight:500;margin-bottom:4px;">Connecter Letterboxd</div>
    <div style="font-size:10px;color:${MU};margin-bottom:10px;">Synchronise vos films vus et watchlist</div>
    <div style="display:flex;gap:8px;">
      <input id="lbd-input-field" placeholder="Pseudo Letterboxd" value="${st.lbdInput}" oninput="st.lbdInput=this.value" style="flex:1;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:12px;color:${TX};outline:none;" onkeydown="if(event.key==='Enter')connectLbd()">
      <button onclick="connectLbd()" style="background:${LB};border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;">Connecter</button>
    </div>
  </div>`;

  // Bloc changer de pseudo
  const changePseudoBlock=st._changingPseudo?`<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:10px;">
    <div style="font-size:12px;font-weight:500;margin-bottom:10px;">Changer de pseudo</div>
    <div style="display:flex;gap:8px;">
      <input id="new-pseudo-field" placeholder="Nouveau pseudo" maxlength="20"
        style="flex:1;background:${S2};border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:12px;color:${TX};outline:none;"
        onkeydown="if(event.key==='Enter')confirmChangePseudo()">
      <button onclick="confirmChangePseudo()" style="background:${AC};border:none;color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;">OK</button>
      <button onclick="st._changingPseudo=false;render();" style="background:${S2};border:1px solid ${BD};color:${MU};border-radius:10px;padding:8px 12px;font-size:12px;cursor:pointer;">✕</button>
    </div>
  </div>`:
  `<button onclick="st._changingPseudo=true;render();" style="width:100%;background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;font-size:12px;color:${TX};cursor:pointer;text-align:left;margin-bottom:10px;">
    ✏️ &nbsp;Changer de pseudo
  </button>`;

  // Bouton déconnexion app
  const logoutBlock=`<button onclick="logoutApp()" style="width:100%;background:rgba(255,63,91,0.06);border:1px solid rgba(255,63,91,0.25);border-radius:14px;padding:12px;font-size:12px;color:${AC};cursor:pointer;text-align:left;margin-top:4px;">
    🚪 &nbsp;${T('deconnexion')}
  </button>
  <button onclick="deleteAccount()" style="width:100%;background:transparent;border:none;border-radius:14px;padding:10px;font-size:11px;color:rgba(255,63,91,0.4);cursor:pointer;text-align:center;margin-top:2px;">
    Supprimer mon compte
  </button>`;

  const groupesActifs=mesGroupes.length;
  const groupesConfirmes=mesGroupes.filter(g=>g.confirmed_heure).length;
  const wantCount=getWantToSee().filter(id=>FILMS[id]).length;
  return `<div style="padding:52px 18px 12px;flex-shrink:0;">
    <div class="serif" style="font-size:22px;margin-bottom:14px;">Mon profil</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div onclick="st.showAvatarPicker=!st.showAvatarPicker;render();" style="width:62px;height:62px;border-radius:17px;background:${pseudoColor(st.pseudo)};display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;cursor:pointer;position:relative;">
        ${st.avatar}
        <div style="position:absolute;bottom:-4px;right:-4px;background:${S2};border:1px solid ${BD};border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;">✏️</div>
      </div>
      <div>
        <div style="font-size:18px;font-weight:600;">${st.pseudo}</div>
        <div style="font-size:11px;color:${MU};margin-bottom:6px;">@${st.pseudo.toLowerCase().replace(/\s+/g,'')}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:4px;">
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;">
        <div style="font-size:20px;font-weight:700;color:${AC};">${groupesActifs}</div>
        <div style="font-size:9px;color:${MU};">groupe${groupesActifs!==1?'s':''}</div>
      </div>
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;">
        <div style="font-size:20px;font-weight:700;color:${LB};">${groupesConfirmes}</div>
        <div style="font-size:9px;color:${MU};">plan${groupesConfirmes!==1?'s':''} confirmé${groupesConfirmes!==1?'s':''}</div>
      </div>
      <div style="flex:1;background:${S1};border:1px solid ${BD};border-radius:12px;padding:10px;text-align:center;">
        <div style="font-size:20px;font-weight:700;color:${GD};">${vuCount}</div>
        <div style="font-size:9px;color:${MU};">film${vuCount!==1?'s':''} vus</div>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    ${st.showAvatarPicker?buildPickerGrid():''}
    <div onclick="go('want-to-see')" style="display:flex;align-items:center;justify-content:space-between;background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:20px;">❤️</div>
        <div>
          <div style="font-size:13px;font-weight:600;">Je veux voir</div>
          <div style="font-size:10px;color:${MU};">${wantCount} film${wantCount!==1?'s':''} dans ta liste</div>
        </div>
      </div>
      <div style="font-size:14px;color:${MU};">›</div>
    </div>
    ${lbdBlock}
    ${changePseudoBlock}
    ${logoutBlock}
  </div>
  <div style="display:flex;background:${S1};border-top:1px solid ${BD};flex-shrink:0;">
    ${[['home','🍿',T('sorties').slice(3)],['cinemas','🏛',T('cinemas').slice(3)],['group','👥',T('groupes').slice(3)],['profile','👤',T('profil').slice(3)]].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:10px 0;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:18px;position:relative;display:inline-block;">${ic}${sc==='group'&&mesGroupes.some(g=>g.confirmed_heure)?'<div style="position:absolute;top:-3px;right:-5px;width:7px;height:7px;border-radius:50%;background:#00c030;border:1.5px solid #07070f;"></div>':''}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
  </div>`;
}

function sMemberProfile(){
  const pseudo=st.viewedMember;
  const lbd=membresLbd[pseudo];
  const myLbd=st.lbdPseudo;
  let commonFilms=[];
  if(lbd&&myLbd){
    commonFilms=Object.entries(FILMS).filter(([id])=>isVu(id)&&filmInLbd(id,lbd.seen)).map(([id,f])=>f.t);
  }
  return `<div style="padding:52px 18px 12px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div onclick="st.screen='group';render();" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;">←</div>
      <div class="serif" style="font-size:20px;">${pseudo}</div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 18px 20px;">
    <div style="display:flex;justify-content:center;margin-bottom:20px;">
      ${avatarEl(pseudo,72,'18px')}
    </div>
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:20px;font-weight:600;">${pseudo}</div>
    </div>
    ${(()=>{
      const moi=membresData.find(m=>m.pseudo===pseudo);
      const statut=moi?.statut||'maybe';
      const STATUTS={yes:{e:'✅',l:T('jeViens')},maybe:{e:'❓',l:T('peutEtre')},no:{e:'❌',l:T('jePeuxPas')}};
      const s=STATUTS[statut];
      const cinema_pref=moi?.cinema_pref?CINEMAS.find(c=>c.id===moi.cinema_pref)?.name:'';
      return `<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:14px;margin-bottom:14px;">
        <div style="display:flex;gap:12px;align-items:center;">
          <span style="font-size:13px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid ${BD};">${s.e} ${s.l}</span>
          ${cinema_pref?`<span style="font-size:11px;color:${MU};">🏛 ${cinema_pref}</span>`:''}
        </div>
      </div>`;
    })()}
    ${lbd?`<div style="background:rgba(0,192,48,0.06);border:1px solid rgba(0,192,48,0.22);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="font-size:11px;color:${LB};font-weight:600;margin-bottom:10px;">Letterboxd</div>
      <div style="display:flex;gap:12px;margin-bottom:${commonFilms.length?'10px':'0'};">
        ${chip('✓ '+lbd.seen.size+' vus',LB,'rgba(0,192,48,0.12)','rgba(0,192,48,0.3)',10)}
        ${chip('🔖 '+lbd.wl.size+' watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',10)}
      </div>
      ${commonFilms.length?`<div><div style="font-size:10px;color:${MU};margin-bottom:6px;">Films que vous avez tous les deux vus :</div>${commonFilms.slice(0,5).map(t=>`<div style="font-size:11px;padding:4px 0;border-bottom:1px solid ${BD};">✓ ${t}</div>`).join('')}${commonFilms.length>5?`<div style="font-size:10px;color:${MU};margin-top:4px;">+${commonFilms.length-5} autres</div>`:''}</div>`:''}
    </div>`:`<div style="text-align:center;padding:20px;color:${MU};font-size:12px;background:${S1};border:1px solid ${BD};border-radius:14px;margin-bottom:14px;">Letterboxd non connecté</div>`}
  </div>`;
}

// ═══════════ RENDER ═══════════
function render(){
  const inner=document.getElementById('inner');
  if(!inner)return;
  // Sauvegarder scroll de create-sortie
  if(st.screen==='create-sortie'){
    const cs=document.getElementById('create-sortie-scroll');
    if(cs)createSortieScroll=cs.scrollTop;
  }
  if(st.screen==='loading')         inner.innerHTML=sLoading();
  else if(st.screen==='auth')      inner.innerHTML=sAuth();
  else if(!st.userId){st.screen='auth';inner.innerHTML=sAuth();}  // guard sécurité
  else if(st.screen==='pseudo')    inner.innerHTML=sPseudo();
  else if(st.screen==='home')      inner.innerHTML=sHome();
  else if(st.screen==='cinemas')   inner.innerHTML=sCinemas();
  else if(st.screen==='cinema-detail') inner.innerHTML=sCinemaDetail();
  else if(st.screen==='film')      inner.innerHTML=sFilm();
  else if(st.screen==='group')     {inner.innerHTML=sGroup(); if(st.groupe&&st.tab==='vote'){renderVotesDOM();} else if(st.groupe&&st.tab==='membres')renderMembresDOM(); else if(st.groupe&&st.tab==='chat')loadMessages();}
  else if(st.screen==='profile')   inner.innerHTML=sProfile();
  else if(st.screen==='want-to-see') inner.innerHTML=sWantToSee();
  else if(st.screen==='member-profile') inner.innerHTML=sMemberProfile();
  else if(st.screen==='create-sortie'){inner.innerHTML=sCreateSortie();const cs=document.getElementById('create-sortie-scroll');if(cs)requestAnimationFrame(()=>{cs.scrollTop=createSortieScroll;});}
}

// ═══════════ INIT ═══════════
(function handleInvite(){
  const params=new URLSearchParams(window.location.search);
  const gid=params.get('groupe'),fid=params.get('film');
  if(gid&&fid&&st.pseudo){history.replaceState({},'','/');openGroup(fid,gid);}
  else if(gid&&fid){st._inviteGroupe=gid;st._inviteFilm=fid;}
})();

(async function init(){
  document.getElementById('inner').innerHTML=`
    <div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0f;">
      <div style="font-size:36px;">🎬</div>
      <div style="font-size:13px;color:#666;letter-spacing:2px;">Chargement des séances…</div>
    </div>`;
  await initDynamicData(st.date);
  render();
  if(st.pseudo){loadMesGroupes();loadSorties();if(st.lbdPseudo)loadLbd(st.lbdPseudo);}
  loadPosters();
  enrichGenresFromTMDB();
})();

setInterval(()=>{
  if(st.screen==='cinemas'||st.screen==='cinema-detail'||st.screen==='group')render();
  // Mettre à jour les countdowns sans re-render complet
  document.querySelectorAll('[data-countdown]').forEach(el=>{
    const [d,h]=el.dataset.countdown.split('|');
    el.textContent=countdown(d,h);
  });
},30*1000);
</script>
