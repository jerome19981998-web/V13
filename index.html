  <style>

    .serif{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;}

    }

    ::-webkit-scrollbar-thumb{background:#252535;border-radius:3px;}
    :root{

    }

    @media(min-height:900px){:root{--fs-xs:11px;--fs-sm:12px;--fs-md:14px;--fs-lg:16px;--fs-xl:20px;--fs-2xl:26px;--fs-3xl:32px;--sp-xs:8px;--sp-sm:12px;--sp-md:16px;--sp-lg:22px;--sp-xl:28px;--btn-h:54px;--nav-h:72px;--radius:16px;--poster-sm:44px;--poster-md:64px;--poster-lg:90px;}}
    .fs-sm{font-size:var(--fs-sm);}.fs-md{font-size:var(--fs-md);}.fs-lg{font-size:var(--fs-lg);}.fs-xl{font-size:var(--fs-xl);}.fs-2xl{font-size:var(--fs-2xl);}.sp-sm{padding:var(--sp-sm);}.sp-md{padding:var(--sp-md);}

    /* ── LBD-inspired: horizontal scroll rows ── */
    .row-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 18px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    .row-scroll::-webkit-scrollbar{display:none;}

    .poster-card-lg{flex-shrink:0;width:110px;cursor:pointer;position:relative;}

    .poster-card-lg .poster-meta{font-size:9px;color:#555570;margin-top:2px;}

    /* Hero featured film banner */
    .hero-film{position:relative;height:200px;overflow:hidden;border-radius:0;margin-bottom:0;}
    .hero-film img{width:100%;height:100%;object-fit:cover;filter:brightness(0.5);}
    .hero-film .hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,0.2) 0%,rgba(7,7,15,0.85) 100%);}
    .hero-film .hero-content{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;}

    /* Rating stars (LBD style) */
    .stars{color:#f0c060;letter-spacing:-1px;}
    .stars .empty{color:#2a2a40;}

    /* Section header */
    .section-header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;margin-bottom:8px;}
    .section-title{font-size:clamp(13px,4vw,16px);font-weight:700;letter-spacing:0.2px;}
    .section-more{font-size:clamp(9px,2.8vw,11px);color:#555570;cursor:pointer;}

    /* Activity pill */
    .activity-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:3px 8px 3px 4px;font-size:10px;color:#888898;}

    /* Fade-in animation */
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.3s ease forwards;}

    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  /* ─ iOS bottom safe area: guaranteed fix ─ */

    .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 0px) !important; }

  <script>
  // Prevent pinch zoom and double-tap zoom on iOS
  document.addEventListener('touchstart', function(e){
    if(e.touches.length > 1) e.preventDefault();
  }, {passive: false});
  var lastTouch = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if(now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
  }, {passive: false});
  </script>
  <script>
  // Run immediately and after every render to fix bottom nav safe area on iOS
  function fixBottomNav(){
    document.querySelectorAll('.bottom-nav').forEach(function(el){
      el.style.setProperty('padding-bottom','env(safe-area-inset-bottom,0px)','important');
    });
  }
  document.addEventListener('DOMContentLoaded', fixBottomNav);
  // Observe DOM mutations to re-apply after dynamic renders
  var _obs = new MutationObserver(fixBottomNav);
  document.addEventListener('DOMContentLoaded', function(){
    _obs.observe(document.getElementById('inner')||document.body, {childList:true,subtree:true});
  });
  </script>
<script>
function applyScale(){
  const h=window.innerHeight,w=window.innerWidth;
  const scaleH=Math.min(h/844,1.3),scaleW=Math.min(w/390,1.2),scale=Math.min(scaleH,scaleW);
  const root=document.documentElement;
  root.style.setProperty('--scale',scale);
  root.style.fontSize=Math.round(13*scale)+'px';
  root.style.setProperty('--fs-xs',Math.round(10*scale)+'px');
  root.style.setProperty('--fs-sm',Math.round(11*scale)+'px');
  root.style.setProperty('--fs-md',Math.round(13*scale)+'px');
  root.style.setProperty('--fs-lg',Math.round(15*scale)+'px');
  root.style.setProperty('--fs-xl',Math.round(18*scale)+'px');
  root.style.setProperty('--fs-2xl',Math.round(24*scale)+'px');
  root.style.setProperty('--fs-3xl',Math.round(28*scale)+'px');
  root.style.setProperty('--sp-xs',Math.round(6*scale)+'px');
  root.style.setProperty('--sp-sm',Math.round(10*scale)+'px');
  root.style.setProperty('--sp-md',Math.round(14*scale)+'px');
  root.style.setProperty('--sp-lg',Math.round(18*scale)+'px');
  root.style.setProperty('--sp-xl',Math.round(24*scale)+'px');
  root.style.setProperty('--btn-h',Math.round(48*scale)+'px');
  root.style.setProperty('--nav-h',Math.round(64*scale)+'px');
  root.style.setProperty('--poster-sm',Math.round(40*scale)+'px');
  root.style.setProperty('--poster-md',Math.round(56*scale)+'px');
  root.style.setProperty('--poster-lg',Math.round(80*scale)+'px');
}
applyScale();
window.addEventListener('resize',applyScale);
</script>

// ── STAR RATING HELPER (LBD style) ──
function starsHTML(note,max=5,size=11){
  if(!note)return'';
  const n=Math.round((parseFloat(note)/10)*max*2)/2; // TMDB note /10 → /5
  let html='<span style="letter-spacing:-1px;font-size:'+size+'px;">';
  for(let i=1;i<=max;i++){
    if(i<=n)html+='<span style="color:#f0c060;">★</span>';
    else if(i-0.5<=n)html+='<span style="color:#f0c060;">½</span>';  // could use ☆
    else html+='<span style="color:#2a2a40;">★</span>';
  }
  return html+'</span>';
}

async function initDynamicData(dateStr){
  const isFirstLoad=!DATA_LOADED;
  try{
    if(isFirstLoad){
      const[filmsRes,cinemasRes,datesRes]=await Promise.all([supa.from('films_dyn').select('*').limit(200),supa.from('cinemas_dyn').select('*'),supa.from('seances_dyn').select('date').limit(1000)]);
      const dateSet=new Set((datesRes.data||[]).map(r=>r.date));
      AVAILABLE_DATES=[...dateSet].sort();
      if(!dateStr||!AVAILABLE_DATES.includes(dateStr))dateStr=AVAILABLE_DATES[0]||todayStr();
      st.date=dateStr;
      FILMS={};
      for(const f of(filmsRes.data||[])){const[c,bg]=filmPalette(f.id);FILMS[f.id]={e:genreEmoji(f.genre),c,bg,g:(f.genre||'DIVERS').toUpperCase(),t:f.title,d:f.duration||'',dir:f.director||'',s:f.synopsis||'',poster:f.poster_url||null,tmdbNote:f.tmdb_note||null,trailerKey:f.trailer_key||null,lbd:false};}
      CINEMAS=(cinemasRes.data||[]).map(c=>({id:c.id,lat:c.lat,lng:c.lng,chain:c.chain,icon:CHAIN_ICONS[c.chain]||'🎬',name:c.name,addr:c.addr||'',metro:c.metro||'',salles:c.salles||null,tech:[],films:[]}));
    }
    const targetDate=dateStr||st.date;
    const seancesRes=await supa.from('seances_dyn').select('*').eq('date',targetDate);
    const sm={};
    for(const s of(seancesRes.data||[])){if(!sm[s.cinema_id])sm[s.cinema_id]={};sm[s.cinema_id][s.film_id]=s.heures||[];}
    SEANCES=sm;
    CINEMAS=CINEMAS.map(c=>({...c,films:Object.keys(sm[c.id]||{}).map(id=>({id}))}));
    DATA_LOADED=true;
  }catch(e){console.error('initDynamicData:',e);}
}

function toast(msg,type='info',dur=2800){
  const colors={info:MU,success:LB,error:AC,warning:GD};
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:${S2};border:1px solid ${colors[type]||BD};border-radius:12px;padding:10px 16px;font-size:clamp(10px,3vw,13px);color:${TX};z-index:9999;opacity:0;transition:all 0.25s;white-space:nowrap;max-width:300px;text-align:center;`;
  t.textContent=msg;document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';setTimeout(()=>t.remove(),300);},dur);
}

let userPos=null;
function getDistance(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function distLabel(km){return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km';}
function requestGeoLoc(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>{userPos={lat:p.coords.latitude,lng:p.coords.longitude};if(['cinemas','cinema-detail','home'].includes(st.screen))render();},()=>{},{timeout:8000});}
function sortedCinemas(chain){const list=chain?CINEMAS.filter(c=>c.chain===chain):CINEMAS;if(!userPos)return list;return[...list].sort((a,b)=>{const da=(a.lat&&a.lng)?getDistance(userPos.lat,userPos.lng,a.lat,a.lng):999;const db=(b.lat&&b.lng)?getDistance(userPos.lat,userPos.lng,b.lat,b.lng):999;return da-db;});}
requestGeoLoc();

const posters={},ratings={},trailers={};
function loadPosters(){
  for(const[id,f]of Object.entries(FILMS)){if(f.poster)posters[id]=f.poster;if(f.tmdbNote)ratings[id]={note:f.tmdbNote,votes:null};if(f.trailerKey)trailers[id]=f.trailerKey;}
  if(['home','cinemas','cinema-detail','film'].includes(st.screen))render();
}

const TMDB_GENRE_MAP={28:'action',12:'aventure',16:'animation',35:'comedie',80:'polar',99:'documentaire',18:'drame',10751:'comedie',14:'fantastique',36:'biopic',27:'horreur',10402:'comedie',9648:'thriller',10749:'romance',878:'sci-fi',10770:'drame',53:'thriller',10752:'guerre',37:'aventure'};
const tmdbGenreCache=JSON.parse(localStorage.getItem('cm_genres')||'{}');

async function enrichGenresFromTMDB(){
  const toFetch=Object.entries(FILMS).filter(([id,f])=>!f.genre_enriched&&(!f.g||f.g==='DIVERS'||f.g===''));
  if(toFetch.length===0)return;
  for(let i=0;i<toFetch.length;i+=5){
    const batch=toFetch.slice(i,i+5);
    await Promise.all(batch.map(async([id,f])=>{
      if(tmdbGenreCache[id]){applyGenre(id,tmdbGenreCache[id]);return;}
      try{const q=encodeURIComponent(f.t);const r=await fetch(`https://api.themoviedb.org/3/search/movie?query=${q}&language=fr-FR&page=1`,{headers:{Authorization:'Bearer '+TMDB_TOKEN}});const data=await r.json();const movie=data.results?.[0];if(movie?.genre_ids?.length){const genre=TMDB_GENRE_MAP[movie.genre_ids[0]]||'divers';tmdbGenreCache[id]=genre;applyGenre(id,genre);if(!posters[id]&&movie.poster_path)posters[id]=TMDB_IMG+movie.poster_path;if(!ratings[id]&&movie.vote_average>0)ratings[id]={note:movie.vote_average.toFixed(1)};}}catch(e){}
    }));
  }
  try{localStorage.setItem('cm_genres',JSON.stringify(tmdbGenreCache));}catch(e){}
  if(['home','film'].includes(st.screen))render();
}
function applyGenre(id,genre){if(!FILMS[id])return;FILMS[id].g=genre.charAt(0).toUpperCase()+genre.slice(1);FILMS[id].e=genreEmoji(genre);FILMS[id].genre_enriched=true;}

let lbdSeen=new Set(),lbdWatchlist=new Set();
function normTitle(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
function filmInLbd(filmId,list){const f=FILMS[filmId];if(!f)return false;const titles=[f.t,...(f.alt||[])].map(normTitle);for(const t of list){for(const n of titles){if(t.includes(n)||n.includes(t))return true;}}return false;}
function isVu(id){return filmInLbd(id,lbdSeen);}
function isWatchlist(id){return filmInLbd(id,lbdWatchlist);}
async function loadLbd(pseudo){try{const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);if(!r.ok)return false;const d=await r.json();lbdSeen=new Set();lbdWatchlist=new Set();(d.items||[]).forEach(item=>{const n=normTitle(item.title);if(item.cats&&item.cats.includes('wishlist'))lbdWatchlist.add(n);else lbdSeen.add(n);});return true;}catch(e){return false;}}
const membresLbd={};
async function loadMemberLbd(pseudo){if(membresLbd[pseudo])return membresLbd[pseudo];try{const r=await fetch(`/api/letterboxd?pseudo=${encodeURIComponent(pseudo)}`);if(!r.ok)return null;const d=await r.json();const seen=new Set(),wl=new Set();(d.items||[]).forEach(item=>{const n=normTitle(item.title);if(item.cats&&item.cats.includes('wishlist'))wl.add(n);else seen.add(n);});membresLbd[pseudo]={seen,wl};return membresLbd[pseudo];}catch(e){return null;}}

function formatDate(ds){const d=new Date(ds+'T12:00:00');const jours=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];const mois=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];return jours[d.getDay()]+' '+d.getDate()+' '+mois[d.getMonth()];}
function countdown(date,heure){if(!date||!heure)return'';const h=heure.replace('h',':');const target=new Date(date+'T'+h+':00');const now=new Date();const diff=target-now;if(diff<=0)return T('seancePassee');const days=Math.floor(diff/86400000);const hrs=Math.floor((diff%86400000)/3600000);const mins=Math.floor((diff%3600000)/60000);if(days>0)return`dans ${days}j ${hrs}h`;if(hrs>0)return`dans ${hrs}h ${mins}min`;return`dans ${mins}min`;}

async function loadMesGroupes(){if(!st.pseudo)return;const{data:membres}=await supa.from('groupe_membres').select('groupe').eq('pseudo',st.pseudo);if(!membres||membres.length===0){mesGroupes=[];if(st.screen==='group'&&!st.groupe)render();return;}const ids=membres.map(m=>m.groupe);const{data}=await supa.from('groupes').select('id,film_id,nom,confirmed_cinema,confirmed_heure,confirmed_date').in('id',ids);mesGroupes=data||[];if(st.screen==='group'&&!st.groupe)render();}

async function loadSorties(){
  if(!userPos)requestGeoLoc();
  try{
    const today=todayStr();
    const{data}=await supa.from('groupes').select('id,film_id,nom,confirmed_cinema,confirmed_heure,confirmed_date,max_membres,createur').eq('is_public',true).not('confirmed_heure','is',null).gte('confirmed_date',today).order('confirmed_date',{ascending:true}).limit(30);
    if(!data||data.length===0){sortiesPubliques=[];if(st.screen==='home')render();return;}
    const ids=data.map(g=>g.id);
    const[membresRes,msgsRes]=await Promise.all([supa.from('groupe_membres').select('groupe,pseudo,avatar').in('groupe',ids),supa.from('messages').select('groupe').in('groupe',ids).neq('pseudo','📢 CinéMatch')]);
    const counts={},avatarsMap={},msgCounts={};
    (membresRes.data||[]).forEach(m=>{counts[m.groupe]=(counts[m.groupe]||0)+1;if(!avatarsMap[m.groupe])avatarsMap[m.groupe]=[];if(avatarsMap[m.groupe].length<3)avatarsMap[m.groupe].push({pseudo:m.pseudo,avatar:m.avatar||'🎬'});});
    (msgsRes.data||[]).forEach(m=>{msgCounts[m.groupe]=(msgCounts[m.groupe]||0)+1;});
    sortiesPubliques=data.map(g=>({...g,_nb:counts[g.id]||0,_avatars:avatarsMap[g.id]||[],_msgs:msgCounts[g.id]||0}));
  }catch(e){console.error('loadSorties:',e);}
  if(st.screen==='home')render();
}

async function creerSortie(filmId,cinemaId,heure,date,maxM,isPublic){
  if(!rateLimit('creer_'+st.userId,3,60000))return;
  if(!filmId||!cinemaId||!heure||!date){toast('Remplis tous les champs','error');return;}
  const film=FILMS[filmId];
  const{data,error}=await supa.from('groupes').insert({film_id:filmId,nom:film?.t||filmId,createur:st.pseudo,user_id:st.userId,is_public:isPublic===true,max_membres:maxM||8,confirmed_cinema:cinemaId,confirmed_heure:heure,confirmed_date:date}).select('id').single();
  if(error){toast('Erreur création','error');console.error(error);return;}
  await supa.from('groupe_membres').upsert({groupe:data.id,pseudo:st.pseudo,avatar:st.avatar,user_id:st.userId},{onConflict:'groupe,pseudo'});
  toast('Sortie créée ! 🎉','success');st.newSortie=null;await loadSorties();await loadMesGroupes();openGroup(filmId,data.id);
}

  await supa.from('groupe_membres').upsert({groupe:groupId,pseudo:st.pseudo,avatar:st.avatar,user_id:st.userId},{onConflict:'groupe,pseudo'});
  toast('Tu rejoins la sortie ! 🍿','success');await loadSorties();openGroup(filmId,groupId);
}

async function setStatut(s){if(!st.groupe||!st.pseudo)return;await supa.from('groupe_membres').update({statut:s}).eq('groupe',st.groupe).eq('user_id',st.userId);await loadMembres();}
async function postAvis(note){if(!st.groupe||!st.pseudo)return;const input=document.getElementById('avis-input');const commentaire=input?input.value.trim():'';const avis=JSON.stringify({note,commentaire,ts:Date.now()});await supa.from('groupe_membres').update({avis}).eq('groupe',st.groupe).eq('user_id',st.userId);await loadMembres();render();if(st.tab==='vote')renderVotesDOM();}

function subscribeAll(){
  if(realtimeChannel){supa.removeChannel(realtimeChannel);realtimeChannel=null;}
  if(votesChannel){supa.removeChannel(votesChannel);votesChannel=null;}
  const g=st.groupe||'general';
  realtimeChannel=supa.channel('db-msg-'+g).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>appendMsg(p.new)).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',filter:`groupe=eq.${g}`},p=>{if(p.new.reactions!==undefined){reactionsData[p.new.id]=p.new.reactions||[];refreshReactionsDOM();}}).subscribe();
  votesChannel=supa.channel('db-votes-'+g).on('postgres_changes',{event:'*',schema:'public',table:'votes',filter:`groupe=eq.${g}`},async()=>await loadVotes()).on('postgres_changes',{event:'UPDATE',schema:'public',table:'groupes',filter:`id=eq.${g}`},async()=>{await loadGroupeInfo();render();if(st.tab==='vote')renderVotesDOM();if(st.tab==='membres')renderMembresDOM();}).subscribe();
}
function appendMsg(m){const ca=document.getElementById('chat-area');if(!ca)return;ca.insertAdjacentHTML('beforeend',msgHTML(m));ca.scrollTop=ca.scrollHeight;}

const REACTION_EMOJIS=['❤️','😂','🔥','👏','😮','🎬'];
async function loadReactions(){const g=st.groupe||'general';const{data}=await supa.from('messages').select('id,reactions').eq('groupe',g);reactionsData={};(data||[]).forEach(m=>{if(m.reactions)reactionsData[m.id]=m.reactions;});refreshReactionsDOM();}
function refreshReactionsDOM(){document.querySelectorAll('[data-reactions]').forEach(el=>{el.innerHTML=reactionsHTML(el.dataset.reactions);});}
function reactionsHTML(msgId){const reacts=reactionsData[msgId]||[];const grouped={};reacts.forEach(r=>{if(!grouped[r.emoji])grouped[r.emoji]=[];grouped[r.emoji].push(r.pseudo);});const myReact=reacts.find(r=>r.pseudo===st.pseudo)?.emoji;let html=Object.entries(grouped).map(([e,users])=>`<span onclick="toggleReaction('${msgId}','${e}')" style="display:inline-flex;align-items:center;gap:3px;background:${myReact===e?'rgba(255,63,91,0.15)':'rgba(255,255,255,0.06)'};border:1px solid ${myReact===e?AC:BD};border-radius:20px;padding:2px 7px;font-size:clamp(9px,2.8vw,12px);cursor:pointer;">${e}<span style="font-size:9px;color:${MU};">${users.length}</span></span>`).join('');html+=`<span onclick="showReactionPicker('${msgId}')" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:rgba(255,255,255,0.04);border:1px solid ${BD};border-radius:50%;font-size:clamp(9px,2.8vw,12px);cursor:pointer;opacity:0.5;">+</span>`;return html;}
function showReactionPicker(msgId){const existing=document.getElementById('rpicker');if(existing){existing.remove();return;}const picker=document.createElement('div');picker.id='rpicker';picker.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:8px 12px;display:flex;gap:8px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.5);';picker.innerHTML=REACTION_EMOJIS.map(e=>`<span onclick="toggleReaction('${msgId}','${e}');document.getElementById('rpicker')?.remove();" style="font-size:clamp(18px,5.6vw,24px);cursor:pointer;">${e}</span>`).join('');document.body.appendChild(picker);setTimeout(()=>picker.remove(),4000);}
async function toggleReaction(msgId,emoji){const reacts=reactionsData[msgId]||[];const existing=reacts.find(r=>r.pseudo===st.pseudo&&r.emoji===emoji);let newReacts;if(existing){newReacts=reacts.filter(r=>!(r.pseudo===st.pseudo&&r.emoji===emoji));}else{const withoutMe=reacts.filter(r=>r.pseudo!==st.pseudo);newReacts=[...withoutMe,{emoji,pseudo:st.pseudo}];}reactionsData[msgId]=newReacts;refreshReactionsDOM();await supa.from('messages').update({reactions:newReacts}).eq('id',msgId);}

function pseudoColor(p){const h=[...p].reduce((a,c)=>a+c.charCodeAt(0),0);const colors=['#e54','#d4a','#59e','#4b9','#e84','#a5e','#4ce','#e75'];return colors[h%colors.length];}
function pseudoInitial(p){return(p||'?')[0].toUpperCase();}
function getAvatar(pseudo){if(pseudo===st.pseudo)return st.avatar;const m=membresData.find(m=>m.pseudo===pseudo);return m?.avatar||null;}
function avatarEl(pseudo,size=38,radius='50%'){const av=getAvatar(pseudo);if(av)return `<div style="width:${size}px;height:${size}px;border-radius:${radius};background:${pseudoColor(pseudo)};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.52)}px;flex-shrink:0;">${av}</div>`;return `<div style="width:${size}px;height:${size}px;border-radius:${radius};background:${pseudoColor(pseudo)};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.42)}px;font-weight:700;color:#fff;flex-shrink:0;">${pseudoInitial(pseudo)}</div>`;}
function chip(txt,c=TX,bg='rgba(255,255,255,0.06)',b=BD,sz=10){return `<span style="font-size:${sz}px;padding:2px 7px;border-radius:20px;border:1px solid ${b};background:${bg};color:${c};white-space:nowrap;">${txt}</span>`;}
function isPast(heure){const now=new Date();const[h,m]=heure.replace('h',':').split(':').map(Number);const t=new Date();t.setHours(h,m,0,0);if(st.date!==todayStr())return false;return t<now;}
async function changeDate(ds){st.date=ds;await initDynamicData(ds);render();}
function dayPicker(){
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  let html='<div style="display:flex;gap:6px;overflow-x:auto;padding:0 18px 12px;flex-shrink:0;">';
  const dates=AVAILABLE_DATES.length?AVAILABLE_DATES:[st.date];
  for(const ds of dates){
    const d=new Date(ds+'T12:00:00');const active=ds===st.date;
    html+=`<div onclick="changeDate('${ds}')" style="flex-shrink:0;width:44px;text-align:center;padding:7px 4px;border-radius:12px;cursor:pointer;background:${active?AC:'rgba(255,255,255,0.03)'};border:1px solid ${active?AC:BD};"><div style="font-size:9px;color:${active?'#fff':MU};">${days[d.getDay()]}</div><div style="font-size:clamp(13px,3.8vw,16px);font-weight:600;color:${active?'#fff':TX};">${d.getDate()}</div><div style="font-size:9px;color:${active?'rgba(255,255,255,0.7)':MU};">${months[d.getMonth()]}</div></div>`;
  }
  return html+'</div>';
}
</script>
<script>
function openAvatarPicker(){st.showAvatarPicker=true;const wrap=document.getElementById('avatar-picker-wrap');if(wrap)wrap.innerHTML=buildPickerGrid();}
function buildPickerGrid(){let html='<div style="background:'+S1+';border:1px solid '+BD+';border-radius:16px;padding:14px;">';html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><span style="font-size:clamp(9px,2.8vw,12px);color:'+MU+';font-weight:600;letter-spacing:1px;text-transform:uppercase;">Choisir votre animal</span><span onclick="closeAvatarPicker()" style="font-size:clamp(9px,2.8vw,12px);color:'+AC+';cursor:pointer;padding:2px 8px;border:1px solid rgba(255,63,91,0.3);border-radius:8px;">✕</span></div>';html+='<div style="display:flex;flex-wrap:wrap;gap:5px;max-height:180px;overflow-y:auto;">';ANIMAL_EMOJIS.forEach(e=>{const active=st.avatar===e;html+=`<div data-emoji="${e}" onclick="pickAvatar(this)" style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:clamp(17px,5vw,22px);cursor:pointer;background:${active?'rgba(255,63,91,0.15)':'rgba(255,255,255,0.03)'};border:1px solid ${active?'#ff3f5b':'rgba(255,255,255,0.07)'};">${e}</div>`;});html+='</div></div>';return html;}
function closeAvatarPicker(){st.showAvatarPicker=false;const wrap=document.getElementById('avatar-picker-wrap');if(wrap)wrap.innerHTML=buildAvatarBtn();}
function buildAvatarBtn(){return `<div onclick="openAvatarPicker()" style="display:flex;align-items:center;gap:10px;background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px 16px;cursor:pointer;"><div id="avatar-preview" style="width:44px;height:44px;border-radius:50%;background:${pseudoColor(st.pseudoInput||'A')};display:flex;align-items:center;justify-content:center;font-size:26px;">${st.avatar}</div><div style="flex:1;text-align:left;"><div style="font-size:clamp(10px,3vw,13px);font-weight:500;">Votre avatar</div><div style="font-size:clamp(8px,2.5vw,11px);color:${MU};">Appuyez pour choisir un animal</div></div><span style="color:${MU};">›</span></div>`;}
function pickAvatar(el){const e=el.dataset.emoji;if(!e)return;st.avatar=e;st.showAvatarPicker=false;save();if(st.userId&&st.pseudo)supa.from('profiles').update({avatar:e}).eq('id',st.userId);if(st.screen==='pseudo'){const wrap=document.getElementById('avatar-picker-wrap');if(wrap)wrap.innerHTML=buildAvatarBtn();return;}render();}

function shareGroupe(){const url=`${location.origin}${location.pathname}?groupe=${st.groupe}&film=${st.film}`;if(navigator.share){navigator.share({title:'Rejoins mon groupe CinéMatch !',text:'On va voir '+(FILMS[st.film]?.t||'un film')+' ensemble',url});}else{navigator.clipboard.writeText(url).then(()=>toast('Lien copié ! 🔗','success')).catch(()=>toast(url,'info',5000));}}

function connectLbd(){const v=document.getElementById('lbd-input-field')?.value?.trim();if(!v)return;st.lbdInput=v;const btn=document.querySelector('[onclick="connectLbd()"]');if(btn){btn.textContent='Connexion…';btn.disabled=true;}loadLbd(v).then(ok=>{if(ok){st.lbdPseudo=v;save();render();}else{if(btn){btn.textContent='Profil introuvable';setTimeout(()=>{btn.textContent='Connecter';btn.disabled=false;},2000);}}});}
function disconnectLbd(){st.lbdPseudo='';lbdSeen=new Set();lbdWatchlist=new Set();save();render();}
function confirmChangePseudo(){const v=document.getElementById('new-pseudo-field')?.value?.trim();if(!v||v.length<2)return;st.pseudo=v;st._changingPseudo=false;save();render();}

async function quitterGroupe(){
  if(!st.groupe||!st.pseudo)return;
  const confirmEl=document.createElement('div');
  confirmEl.style.cssText=`position:fixed;inset:0;background:rgba(7,7,15,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;`;
  confirmEl.innerHTML=`<div style="background:#1a1a2e;border:1px solid rgba(255,63,91,0.3);border-radius:18px;padding:var(--sp-lg);max-width:280px;text-align:center;"><div style="font-size:clamp(22px,7vw,32px);margin-bottom:10px;">🚪</div><div style="font-size:clamp(12px,3.6vw,15px);font-weight:600;margin-bottom:8px;">Quitter ce groupe ?</div><div style="font-size:clamp(9px,2.8vw,12px);color:#555570;margin-bottom:16px;">Vos votes et messages resteront visibles.</div><div style="display:flex;gap:10px;"><button id="quit-cancel" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px;font-size:clamp(11px,3.3vw,14px);color:#e8e0d4;cursor:pointer;font-family:inherit;">Annuler</button><button id="quit-ok" style="flex:1;background:rgba(255,63,91,0.15);border:1px solid rgba(255,63,91,0.4);border-radius:12px;padding:11px;font-size:clamp(11px,3.3vw,14px);color:#ff3f5b;cursor:pointer;font-weight:600;font-family:inherit;">Quitter</button></div></div>`;
  document.body.appendChild(confirmEl);
  const ok=await new Promise(res=>{confirmEl.querySelector('#quit-ok').onclick=()=>{confirmEl.remove();res(true);};confirmEl.querySelector('#quit-cancel').onclick=()=>{confirmEl.remove();res(false);};});
  if(!ok)return;
  const{error}=await supa.from('groupe_membres').delete().eq('groupe',st.groupe).eq('user_id',st.userId);
  if(error){toast('Erreur : '+error.message,'error');return;}
  if(realtimeChannel){supa.removeChannel(realtimeChannel);realtimeChannel=null;}
  if(votesChannel){supa.removeChannel(votesChannel);votesChannel=null;}
  st.groupe=null;st.film=null;st.tab='chat';membresData=[];votesData={};
  await loadMesGroupes();render();
}

async function logoutApp(){
  if(!confirm(T('deconnexion')+' ?'))return;
  _explicitLogout=true;await supa.auth.signOut();
  try{localStorage.removeItem('cm2');}catch(e){}
  st.pseudo='';st.userId=null;st.userEmail='';st.lbdPseudo='';st.avatar='🎬';
  lbdSeen=new Set();lbdWatchlist=new Set();st.screen='auth';st.authStep='email';render();
}

async function deleteAccount(){
  const confirmEl=document.createElement('div');
  confirmEl.style.cssText='position:fixed;inset:0;background:rgba(7,7,15,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  confirmEl.innerHTML=`<div style="background:#1a1a2e;border:1px solid rgba(255,63,91,0.4);border-radius:18px;padding:24px;max-width:290px;text-align:center;"><div style="font-size:clamp(28px,9vw,40px);margin-bottom:12px;">⚠️</div><div style="font-size:clamp(13px,3.8vw,16px);font-weight:700;margin-bottom:8px;">Supprimer mon compte ?</div><div style="font-size:clamp(9px,2.8vw,12px);color:#555570;margin-bottom:6px;line-height:1.6;">Toutes tes données seront effacées :<br>groupes, messages, votes, profil.</div><div style="font-size:clamp(9px,2.8vw,12px);color:rgba(255,63,91,0.8);margin-bottom:18px;font-weight:600;">Cette action est irréversible.</div><div style="display:flex;gap:10px;"><button id="del-cancel" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:11px;font-size:clamp(11px,3.3vw,14px);color:#e8e0d4;cursor:pointer;font-family:inherit;">Annuler</button><button id="del-ok" style="flex:1;background:rgba(255,63,91,0.2);border:1px solid rgba(255,63,91,0.5);border-radius:12px;padding:11px;font-size:clamp(11px,3.3vw,14px);color:#ff3f5b;cursor:pointer;font-weight:700;font-family:inherit;">Supprimer</button></div></div>`;
  document.body.appendChild(confirmEl);
  const ok=await new Promise(res=>{confirmEl.querySelector('#del-ok').onclick=()=>{confirmEl.remove();res(true);};confirmEl.querySelector('#del-cancel').onclick=()=>{confirmEl.remove();res(false);};});
  if(!ok)return;
  if(!st.userId){alert('Erreur : pas de session active.');return;}
  try{
    await Promise.all([supa.from('groupe_membres').delete().eq('user_id',st.userId),supa.from('votes').delete().eq('user_id',st.userId),supa.from('messages').delete().eq('user_id',st.userId),supa.from('groupes').delete().eq('user_id',st.userId),supa.from('profiles').delete().eq('id',st.userId)]);
    await supa.rpc('delete_user');_explicitLogout=true;await supa.auth.signOut();
    try{localStorage.removeItem('cm2');}catch(e){}
    st.pseudo='';st.userId=null;st.userEmail='';st.lbdPseudo='';st.avatar='🎬';lbdSeen=new Set();lbdWatchlist=new Set();st.screen='auth';st.authStep='login';render();
    setTimeout(()=>{const t=document.createElement('div');t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 20px;font-size:clamp(10px,3vw,13px);z-index:9999;color:#e8e0d4;';t.textContent='Compte supprimé. Au revoir 👋';document.body.appendChild(t);setTimeout(()=>t.remove(),3000);},300);
  }catch(e){alert('Erreur lors de la suppression : '+e.message);}
}

async function loadProfile(userId){const{data}=await supa.from('profiles').select('*').eq('id',userId).single();if(data){st.pseudo=data.pseudo||'';st.avatar=data.avatar||'🎬';st.lang=data.lang||st.lang;save();return true;}return false;}

let _explicitLogout=false,_authDone=false;
async function handleSession(session){
  if(_authDone)return;_authDone=true;
  if(session?.user){
    st.userId=session.user.id;st.userEmail=session.user.email||'';
    if(window.location.hash&&window.location.hash.includes('access_token'))history.replaceState({},'',window.location.pathname);
    const hasProfile=await loadProfile(st.userId);
    if(hasProfile){st.screen='home';render();loadMesGroupes();loadSorties();if(st.lbdPseudo)loadLbd(st.lbdPseudo);if(st._inviteGroupe&&st._inviteFilm){const gid=st._inviteGroupe,fid=st._inviteFilm;st._inviteGroupe=null;st._inviteFilm=null;openGroup(fid,gid);}}
    else{st.screen='pseudo';st.pseudoInput='';render();}
  }else{st.screen='auth';st.authStep='login';render();}
}

supa.auth.onAuthStateChange((event,session)=>{
  if(event==='INITIAL_SESSION')handleSession(session);
  else if(event==='SIGNED_IN'){_authDone=false;handleSession(session);}
  else if(event==='SIGNED_OUT'&&_explicitLogout){_explicitLogout=false;_authDone=false;st.userId=null;st.userEmail='';st.screen='auth';st.authStep='login';render();}
});
setTimeout(()=>{if(st.screen==='loading'){st.screen='auth';st.authStep='login';render();}},4000);
</script>
<script>
function sLoading(){return `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;"><div style="font-size:clamp(36px,12vw,56px);">🎬</div><div class="serif" style="font-size:clamp(20px,6.2vw,28px);">CinéMatch</div><div style="width:32px;height:3px;background:${AC};border-radius:2px;animation:pulse 1.2s ease-in-out infinite;"></div></div>`;}

function sAuth(){
  const lang=st.lang||'fr';const mode=st.authStep||'login';
  const inp=(id,type,ph,kb)=>`<input id="${id}" type="${type}" placeholder="${ph}" style="width:100%;background:${S2};border:1px solid ${BD};border-radius:var(--radius);padding:var(--sp-md) var(--sp-lg);font-size:var(--fs-md);color:${TX};outline:none;box-sizing:border-box;margin-bottom:10px;" onkeydown="if(event.key==='Enter')${kb}">`;
  let body='';

"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>${lang==='fr'?'Continuer avec Google':'Continue with Google'}</button><div style="display:flex;justify-content:space-between;margin-top:18px;"><span onclick="st.authStep='register';render()" style="font-size:clamp(10px,3vw,13px);color:${AC};cursor:pointer;">${lang==='fr'?'Créer un compte':'Create account'}</span><span onclick="st.authStep='forgot';render()" style="font-size:clamp(10px,3vw,13px);color:${MU};cursor:pointer;">${lang==='fr'?'Mot de passe oublié ?':'Forgot password?'}</span></div>`;}

function togglePwd(id){const el=document.getElementById(id);if(el)el.type=el.type==='password'?'text':'password';}
function showAuthErr(msg){const el=document.getElementById('auth-err');if(el)el.textContent=msg;}

async function loginWithPassword(){
  const pseudo=(document.getElementById('authPseudo')?.value||'').trim();const pass=(document.getElementById('authPass')?.value||'').trim();
  if(!pseudo||!pass){showAuthErr('Remplis tous les champs');return;}
  const btn=document.querySelector('[onclick="loginWithPassword()"]');if(btn){btn.disabled=true;btn.textContent='Connexion...';}showAuthErr('');
  try{
    const{data:profile,error:pErr}=await supa.from('profiles').select('id,email').ilike('pseudo',pseudo).limit(1).single();
    if(pErr||!profile){showAuthErr('Pseudo introuvable ❌');return;}
    if(!profile.email){showAuthErr('Compte incomplet — recrée ton compte');return;}
    const{error}=await supa.auth.signInWithPassword({email:profile.email,password:pass});
    if(error){if(error.message.includes('Invalid')||error.message.includes('invalid'))showAuthErr('Mot de passe incorrect ❌');else showAuthErr(error.message);}
  }catch(e){showAuthErr('Erreur : '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent=st.lang==='fr'?'Se connecter →':'Sign in →';}}
}

async function registerWithPassword(){
  const pseudo=(document.getElementById('regPseudo')?.value||'').trim();const email=(document.getElementById('regEmail')?.value||'').trim();const pass=(document.getElementById('regPass')?.value||'').trim();
  if(!pseudo||!email||!pass){showAuthErr('Remplis tous les champs');return;}
  if(pass.length<6){showAuthErr('Mot de passe trop court (min 6 caractères)');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showAuthErr('Email invalide');return;}
  const btn=document.querySelector('[onclick="registerWithPassword()"]');if(btn){btn.disabled=true;btn.textContent='Création...';}showAuthErr('');
  try{
    const{data:existing}=await supa.from('profiles').select('id').eq('pseudo',pseudo).limit(1);
    if(existing&&existing.length>0){showAuthErr('Ce pseudo est déjà pris ❌');return;}
    const{data,error}=await supa.auth.signUp({email,password:pass,options:{emailRedirectTo:window.location.origin}});
    if(error){if(error.message.includes('already registered')||error.message.includes('User already'))showAuthErr('Email déjà utilisé — essaie de te connecter ❌');else showAuthErr(error.message);return;}
    if(data?.user){const{error:profErr}=await supa.from('profiles').upsert({id:data.user.id,pseudo,avatar:st.avatar||'🎬',lang:st.lang||'fr',email},{onConflict:'id'});if(profErr)console.warn('Profile upsert:',profErr.message);st.pseudo=pseudo;save();}
    const{error:loginErr}=await supa.auth.signInWithPassword({email,password:pass});
    if(loginErr){showAuthErr('');st.authStep='confirm';st._confirmEmail=email;render();}
  }catch(e){showAuthErr('Erreur : '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent=st.lang==='fr'?'Créer mon compte →':'Create my account →';}}
}
async function sendResetEmail(){const email=(document.getElementById('forgotEmail')?.value||'').trim();if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showAuthErr('Email invalide');return;}const{error}=await supa.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'?reset=1'});if(!error){st.authStep='sent';render();}else showAuthErr(error.message);}
async function signInWithGoogle(){const{error}=await supa.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});if(error)alert('Erreur Google : '+error.message);}

async function confirmPseudo(){
  const inp=document.getElementById('pseudoInput');const val=(inp?inp.value:st.pseudoInput).trim();
  if(!val||!st.userId)return;
  const{data:existing}=await supa.from('profiles').select('id').eq('pseudo',val).neq('id',st.userId).limit(1);
  if(existing&&existing.length>0){const err=document.getElementById('pseudo-err');if(err){err.textContent='Ce pseudo est déjà pris ❌';err.style.opacity='1';}return;}
  const{error}=await supa.from('profiles').upsert({id:st.userId,pseudo:val,avatar:st.avatar,lang:st.lang},{onConflict:'id'});

  else{st.screen='home';render();loadMesGroupes();loadSorties();}
}

    const isFiltering=activeGenre!=='tous';

    return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      ${header}
      <!-- Search + Genre bar -->
      <div style="padding:10px 18px 0;flex-shrink:0;">
        <div style="position:relative;margin-bottom:10px;">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:clamp(11px,3.3vw,14px);pointer-events:none;">🔍</span>
          <input id="search-input" placeholder="Titre, réalisateur, genre…" value="${st.search||''}"
            oninput="st.search=this.value;renderSearchResults()"
            onfocus="showSearchHistory()"
            onblur="setTimeout(hideSearchHistory,200)"
            onkeydown="if(event.key==='Enter'){saveSearch(st.search);hideSearchHistory();}"
            style="width:100%;background:${S1};border:1px solid ${BD};border-radius:20px;padding:8px 32px 8px 34px;font-size:clamp(10px,3vw,13px);color:${TX};outline:none;box-sizing:border-box;">
          ${(st.search||'')?`<span onclick="st.search='';render();" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:clamp(10px,3vw,13px);color:${MU};cursor:pointer;">✕</span>`:''}
          <div id="search-history-dropdown" style="position:relative;"></div>
        </div>
        <!-- Genre chips scrollable -->
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;">
          ${genresList.map(([id,lb])=>`<div onclick="setGenre('${id}')" style="border-radius:20px;padding:5px 12px;font-size:clamp(9px,2.8vw,12px);font-weight:500;cursor:pointer;border:1px solid ${activeGenre===id?AC:BD};background:${activeGenre===id?AC:'rgba(255,255,255,0.03)'};color:${activeGenre===id?'#fff':MU};white-space:nowrap;flex-shrink:0;">${lb}</div>`).join('')}
        </div>
      </div>

      <div style="flex:1;overflow-y:auto;padding-bottom:80px;">
        ${(isSearching||isFiltering)?`
          <!-- SEARCH / FILTERED RESULTS: grid view -->
          ${filtered.length===0?`<div style="text-align:center;padding:40px 20px;color:${MU};"><div style="font-size:clamp(28px,9vw,40px);margin-bottom:10px;">🔍</div><div style="font-size:clamp(11px,3.3vw,14px);">${T('aucunFilmTrouve')}</div></div>`:''}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 20px;">
            ${filtered.map(([id,f])=>`
              <div onclick="openFilm('${id}','home')" class="tap" style="cursor:pointer;">
                <div style="height:120px;border-radius:10px;overflow:hidden;background:${f.bg};position:relative;">
                  ${posters[id]?`<img src="${posters[id]}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">`:
                  `<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);font-size:36px;">${f.e}</span>`}
                  ${isVu(id)?'<div style="position:absolute;top:4px;right:4px;background:rgba(0,192,48,0.9);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:8px;">✓</div>':''}
                </div>
                <div style="padding:4px 2px;">
                  <div style="font-size:9px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${f.t}</div>
                  ${ratings[id]?`<div style="margin-top:2px;">${starsHTML(ratings[id].note,5,8)}</div>`:''}
                </div>
              </div>`).join('')}
          </div>
        `:`
          <!-- DEFAULT: Letterboxd-style sections -->

          ${heroFilm?`
          <!-- HERO BANNER -->
          <div class="hero-film" onclick="openFilm('${heroId}','home')" style="cursor:pointer;margin-bottom:20px;position:relative;height:185px;overflow:hidden;">
            ${posters[heroId]?`<img src="${posters[heroId]}" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.45);">`:`<div style="width:100%;height:100%;background:${heroFilm.bg};"></div>`}
            <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,0.1) 0%,rgba(7,7,15,0.88) 100%);"></div>
            <div style="position:absolute;bottom:0;left:0;right:0;padding:14px 18px;">
              <div style="font-size:9px;color:${GD};letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">✦ À l'affiche</div>
              <div class="serif" style="font-size:clamp(17px,5vw,22px);margin-bottom:4px;">${heroFilm.t}</div>
              <div style="display:flex;align-items:center;gap:8px;">
                ${ratings[heroId]?`<div>${starsHTML(ratings[heroId].note,5,11)}</div>`:''}
                <span style="font-size:9px;color:${MU};">${heroFilm.g}${heroFilm.d?' · '+heroFilm.d:''}</span>
              </div>
            </div>
          </div>`:''}

          ${filmsWithSorties.length>0?`
          <!-- SORTIES ACTIVES : films avec groupes disponibles -->
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">🍿 Sorties en cours</div>
              <div class="section-more" onclick="st.homeTab='sorties';render();">Voir tout →</div>
            </div>
            <div class="row-scroll">
              ${filmsWithSorties.slice(0,8).map(([id,f])=>posterCardLg(id,f,`openFilm('${id}','home')`)).join('')}
            </div>
          </div>`:''}

          <!-- EN SALLE CETTE SEMAINE -->
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">🎬 En salle</div>
              <div class="section-more" onclick="setGenre('tous');">Tous →</div>
            </div>
            <div class="row-scroll">
              ${allFilms.slice(0,12).map(([id,f])=>posterCardLg(id,f)).join('')}
            </div>
          </div>

          ${topFilms.length>0&&ratings[topFilms[0]?.[0]]?`
          <!-- MIEUX NOTÉS (LBD-style) -->
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">⭐ Mieux notés</div>
            </div>
            <div class="row-scroll">
              ${topFilms.map(([id,f])=>posterCardLg(id,f)).join('')}
            </div>
          </div>`:''}

          <!-- VOS WATCHLIST (si LBD connecté) -->
          ${st.lbdPseudo&&lbdWatchlist.size>0?`
          <div style="margin-bottom:20px;">
            <div class="section-header">
              <div class="section-title">🔖 Votre watchlist</div>
              <div class="section-more" style="color:${GD};">@${st.lbdPseudo}</div>
            </div>
            <div class="row-scroll">
              ${allFilms.filter(([id])=>isWatchlist(id)).slice(0,8).map(([id,f])=>posterCardLg(id,f)).join('')}
            </div>
          </div>`:''}

        `}
        <!-- bottom padding -->
        <div style="height:10px;"></div>
      </div>
      ${navbar}
    </div>`;
  }

  // ═══════════════════════════════════════════
  // TAB SORTIES — improved with activity feed feel
  // ═══════════════════════════════════════════
  const sortieCard=(s)=>{
    const film=FILMS[s.film_id]||{t:s.nom,e:'🎬',g:'',d:'',bg:'#111'};
    const cinema=CINEMAS.find(c=>c.id===s.confirmed_cinema);
    const chainColor=CC[cinema?.chain]||MU;
    const dist=(userPos&&cinema?.lat&&cinema?.lng)?getDistance(userPos.lat,userPos.lng,cinema.lat,cinema.lng):null;
    const distStr=dist!==null?distLabel(dist):null;
    const nb=s._nb||0,max=s.max_membres||8,restantes=max-nb;
    const isMine=mySortieIds.has(s.id),isFull=nb>=max,isCreator=s.createur===st.pseudo;
    const isHot=!isFull&&restantes<=2&&restantes>0;
    const msgs=s._msgs||0;
    const avatars=s._avatars||[];
    const avatarRow=avatars.map(a=>`<div style="width:22px;height:22px;border-radius:50%;background:${pseudoColor(a.pseudo)};border:2px solid ${S1};display:flex;align-items:center;justify-content:center;font-size:clamp(10px,3vw,13px);margin-left:-6px;">${a.avatar||pseudoInitial(a.pseudo)}</div>`).join('');
    const extraCount=nb>avatars.length?nb-avatars.length:0;
    const pct=Math.round((nb/max)*100);
    return `<div onclick="openGroup('${s.film_id}','${s.id}')" class="tap" style="background:${S1};border:1px solid ${isHot?'rgba(255,100,0,0.4)':BD};border-radius:18px;overflow:hidden;cursor:pointer;margin:0 18px 12px;">
      <div style="display:flex;gap:12px;padding:12px;">
        <!-- Poster -->
        <div style="width:64px;height:86px;border-radius:10px;overflow:hidden;background:${film.bg};flex-shrink:0;position:relative;">
          ${posters[s.film_id]?`<img src="${posters[s.film_id]}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">`:
          `<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(22px,7vw,32px);">${film.e}</span>`}
          ${ratings[s.film_id]?`<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(7,7,15,0.75);padding:2px 4px;font-size:8px;color:${GD};text-align:center;">★ ${ratings[s.film_id].note}</div>`:''}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:3px;">
            <div class="serif" style="font-size:clamp(13px,3.8vw,16px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${film.t}</div>
            ${isHot?`<div style="background:rgba(255,100,0,0.15);border:1px solid rgba(255,100,0,0.4);border-radius:8px;padding:2px 6px;font-size:9px;font-weight:700;color:#ff6400;white-space:nowrap;flex-shrink:0;">🔥</div>`:''}
          </div>
          <div style="font-size:clamp(8px,2.5vw,11px);font-weight:600;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;">
            <span style="color:${chainColor};">${cinema?.name||s.confirmed_cinema||'Cinéma'}</span>
            ${distStr?`<span style="color:${MU};font-weight:400;font-size:9px;">📍 ${distStr}</span>`:''}
          </div>
          <div style="font-size:clamp(11px,3.3vw,14px);font-weight:700;margin-bottom:6px;">${s.confirmed_heure} <span style="font-size:9px;color:${MU};font-weight:400;">${formatDate(s.confirmed_date)}</span></div>
          <!-- Avatars + places -->
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:4px;">
              <div style="display:flex;margin-left:6px;">${avatarRow}</div>
              ${extraCount?`<span style="font-size:clamp(8px,2.5vw,11px);color:${MU};margin-left:4px;">+${extraCount}</span>`:''}
              <span style="font-size:clamp(8px,2.5vw,11px);color:${isFull?AC:MU};margin-left:${avatars.length?'6':'0'}px;">${isFull?T('complet'):`${restantes} place${restantes>1?'s':''}`}</span>
            </div>
            ${msgs?`<span style="font-size:clamp(8px,2.5vw,11px);color:${MU};">💬 ${msgs}</span>`:''}
          </div>
          <!-- Progress bar -->
          <div style="margin-top:6px;height:2px;border-radius:1px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:${pct}%;background:${isFull?AC:chainColor};border-radius:1px;transition:width 0.3s;"></div></div>
        </div>
      </div>
      <!-- CTA row -->
      <div style="padding:0 12px 12px;display:flex;gap:8px;align-items:center;">
        ${isCreator?`<div style="flex:1;text-align:center;padding:8px;border-radius:12px;background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.3);font-size:clamp(9px,2.8vw,12px);color:${GD};font-weight:600;">${T('taSortie')}</div>`:''}
        ${isMine&&!isCreator?`<div style="flex:1;text-align:center;padding:8px;border-radius:12px;background:rgba(0,192,48,0.1);border:1px solid rgba(0,192,48,0.3);font-size:clamp(9px,2.8vw,12px);color:${LB};font-weight:600;">${T('jeParticipe')}</div>`:''}
        ${!isMine&&!isFull?`<div onclick="event.stopPropagation();rejoindreSortie('${s.id}','${s.film_id}')" style="flex:1;text-align:center;padding:8px;border-radius:12px;background:${AC};font-size:clamp(10px,3vw,13px);font-weight:700;color:#fff;">${T('rejoindre')}</div>`:''}
        ${!isMine&&isFull?`<div style="flex:1;text-align:center;padding:8px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid ${BD};font-size:clamp(9px,2.8vw,12px);color:${MU};">${T('complet')}</div>`:''}
      </div>
    </div>`;
  };

  // ── Compact card for horizontal scroll ──
  const sortieCardH=(s)=>{
    const film=FILMS[s.film_id]||{t:s.nom,e:'🎬',g:'',d:'',bg:'#111'};
    const cinema=CINEMAS.find(c=>c.id===s.confirmed_cinema);
    const chainColor=CC[cinema?.chain]||MU;
    const nb=s._nb||0,max=s.max_membres||8,restantes=max-nb;
    const isMine=mySortieIds.has(s.id),isFull=nb>=max,isCreator=s.createur===st.pseudo;
    const isHot=!isFull&&restantes<=2&&restantes>0;
    const pct=Math.round((nb/max)*100);
    const dist=(userPos&&cinema?.lat&&cinema?.lng)?getDistance(userPos.lat,userPos.lng,cinema.lat,cinema.lng):null;
    const distStr=dist!==null?distLabel(dist):null;
    return `<div onclick="openGroup('${s.film_id}','${s.id}')" class="tap" style="flex-shrink:0;width:160px;background:${S1};border:1px solid ${isHot?'rgba(255,100,0,0.4)':BD};border-radius:16px;overflow:hidden;cursor:pointer;">
      <div style="position:relative;height:100px;background:${film.bg};">
        ${posters[s.film_id]?`<img src="${posters[s.film_id]}" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.6);" loading="lazy">`:`<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;">${film.e}</span>`}
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(7,7,15,0.95));"></div>
        <div style="position:absolute;bottom:6px;left:8px;right:8px;">
          <div class="serif" style="font-size:12px;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${film.t}</div>
        </div>
        ${isCreator?`<div style="position:absolute;top:6px;right:6px;font-size:10px;">👑</div>`:''}
        ${isMine&&!isCreator?`<div style="position:absolute;top:6px;right:6px;font-size:10px;">✓</div>`:''}
      </div>
      <div style="padding:8px;">
        <div style="font-size:9px;font-weight:600;color:${chainColor};margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${cinema?.name||'Cinéma'}</div>
        <div style="font-size:10px;font-weight:700;margin-bottom:4px;">${s.confirmed_heure} <span style="font-size:8px;color:${MU};font-weight:400;">${formatDate(s.confirmed_date)}</span></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:9px;color:${isFull?AC:MU};">${isFull?T('complet'):`${restantes} place${restantes>1?'s':''}`}</span>
          ${distStr?`<span style="font-size:8px;color:${MU};">📍${distStr}</span>`:''}
        </div>
        <div style="height:2px;border-radius:1px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:${pct}%;background:${isFull?AC:chainColor};border-radius:1px;"></div></div>
      </div>
    </div>`;
  };

  const emptySorties=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:12px;">
    <div style="font-size:clamp(36px,12vw,56px);">🍿</div>
    <div class="serif" style="font-size:clamp(15px,4.6vw,20px);">${T('aucuneSortie')}</div>
    <div style="font-size:clamp(10px,3vw,13px);color:${MU};line-height:1.5;">${T('aucuneSortieDesc').replace('\n','<br>')}</div>
    <div onclick="createSortieScroll=0;st.screen='create-sortie';render()" style="margin-top:8px;padding:12px 24px;background:${AC};border-radius:14px;font-size:clamp(11px,3.3vw,14px);font-weight:700;cursor:pointer;color:#fff;">+ Créer</div>
  </div>`;

  const today=todayStr();
  const todayDate=new Date();
  const todayH=todayDate.getHours()*100+todayDate.getMinutes();
  const filtered_sorties=sortiesPubliques.filter(s=>{
    if(st.sortieFilter==='all')return true;
    const nb=s._nb||0,max=s.max_membres||8;
    if(st.sortieFilter==='hot')return!(nb>=max)&&(max-nb)<=2&&(max-nb)>0;
    if(st.sortieFilter==='tonight'){if(s.confirmed_date!==today)return false;const h=parseInt((s.confirmed_heure||'00h00').replace('h',':').split(':')[0]);return h>=todayH/100-1;}
    if(st.sortieFilter==='week')return s.confirmed_date>=today;
    if(st.sortieFilter==='near')return userPos&&(()=>{const c=CINEMAS.find(x=>x.id===s.confirmed_cinema);return c?.lat&&getDistance(userPos.lat,userPos.lng,c.lat,c.lng)<5;})();
    return true;
  });

  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    ${header}
    <div style="flex:1;overflow-y:auto;padding-top:12px;">
      <!-- Top row: label + create button -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 18px;margin-bottom:10px;">
        <div style="font-size:clamp(9px,2.8vw,12px);color:${MU};letter-spacing:1.5px;text-transform:uppercase;">${T('sorties_publiques')}</div>
        <div onclick="createSortieScroll=0;st.screen='create-sortie';render()" style="display:flex;align-items:center;gap:5px;background:${AC};border-radius:20px;padding:6px 12px;cursor:pointer;font-size:clamp(9px,2.8vw,12px);font-weight:700;color:#fff;">${T('creer')}</div>
      </div>
      <!-- 🔥 TOP 10 POPULAIRES — horizontal scroll -->
      ${(()=>{
        const top10=[...sortiesPubliques].sort((a,b)=>(b._nb||0)-(a._nb||0)).slice(0,10);
        if(!top10.length) return '';
        return `<div style="margin-bottom:20px;">
          <div style="padding:0 18px 10px;font-size:clamp(9px,2.8vw,12px);color:${MU};letter-spacing:1.5px;text-transform:uppercase;">🔥 Les plus populaires</div>
          <div class="row-scroll" style="padding:0 18px 8px;">${top10.map(sortieCardH).join('')}</div>
        </div>`;
      })()}

      <!-- ⚡ PRESQUE COMPLET — horizontal scroll -->
      ${(()=>{
        const hot=[...sortiesPubliques].filter(s=>{const r=(s.max_membres||8)-(s._nb||0);return r>0&&r<=2;});
        if(!hot.length) return '';
        return `<div style="margin-bottom:20px;">
          <div style="padding:0 18px 10px;font-size:clamp(9px,2.8vw,12px);color:rgba(255,100,0,0.8);letter-spacing:1.5px;text-transform:uppercase;">🔥 Presque complet</div>
          <div class="row-scroll" style="padding:0 18px 8px;">${hot.map(sortieCardH).join('')}</div>
        </div>`;
      })()}

      <!-- 📍 TOUTES PAR DISTANCE — horizontal scroll -->
      ${(()=>{
        const byDist=[...sortiesPubliques].sort((a,b)=>{
          const ca=CINEMAS.find(c=>c.id===a.confirmed_cinema);
          const cb=CINEMAS.find(c=>c.id===b.confirmed_cinema);
          const da=(userPos&&ca?.lat)?getDistance(userPos.lat,userPos.lng,ca.lat,ca.lng):99999;
          const db=(userPos&&cb?.lat)?getDistance(userPos.lat,userPos.lng,cb.lat,cb.lng):99999;
          return da-db;
        });
        if(!byDist.length) return emptySorties;
        return `<div style="margin-bottom:20px;">
          <div style="padding:0 18px 10px;font-size:clamp(9px,2.8vw,12px);color:${MU};letter-spacing:1.5px;text-transform:uppercase;">📍 Toutes les sorties</div>
          <div class="row-scroll" style="padding:0 18px 8px;">${byDist.map(sortieCardH).join('')}</div>
        </div>`;
      })()}



    </div>
    ${navbar}
  </div></div>`;
}
</script>
<script>
function sCinemas(){
  const chain=st.cinFilter==='tous'?null:st.cinFilter;
  const list=sortedCinemas(chain);
  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;"><div style="padding:52px 18px 12px;flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="serif" style="font-size:clamp(18px,5.6vw,24px);">Cinémas Paris</div>
      <div style="display:flex;gap:8px;align-items:center;">
        ${userPos?`<span style="font-size:9px;color:${LB};">📍 Activée</span>`:`<button onclick="requestGeoLoc()" style="font-size:9px;color:${MU};background:${S2};border:1px solid ${BD};border-radius:8px;padding:3px 8px;cursor:pointer;">📍 Proximité</button>`}
        <div onclick="doSync()" style="display:flex;align-items:center;gap:5px;font-size:clamp(8px,2.5vw,11px);color:${st.syncing?'#ff8c42':LB};cursor:pointer;"><span>${st.syncing?'⟳':'✓'}</span><span>${st.syncing?T('synchro'):(st.syncLabel?T('misAJour')+' '+st.syncLabel:T('misAJour'))}</span></div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      ${[['tous','Tous'],['ugc','UGC'],['pathe','Pathé'],['gaumont','Gaumont']].map(([id,lb])=>`<div onclick="st.cinFilter='${id}';render();" style="padding:5px 12px;border-radius:20px;font-size:clamp(9px,2.8vw,12px);cursor:pointer;border:1px solid ${st.cinFilter===id?CC[id]||AC:BD};background:${st.cinFilter===id?(CC[id]||AC)+'18':'rgba(255,255,255,0.03)'};color:${st.cinFilter===id?CC[id]||AC:MU};">${lb}</div>`).join('')}
    </div>
  </div>
  ${dayPicker()}
  <div style="flex:1;overflow-y:auto;padding:0 18px 80px;">
    ${list.map(c=>{
      const col=CC[c.chain];
      const dist=(userPos&&c.lat)?getDistance(userPos.lat,userPos.lng,c.lat,c.lng):null;
      const gc=mesGroupes.filter(g=>CINEMAS.find(ci=>ci.id===c.id&&ci.films.some(f=>f.id===g.film_id))).length;
      return `<div onclick="openCinema('${c.id}')" class="tap" style="background:${S1};border:1px solid ${BD};border-radius:13px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;">
        <div style="width:38px;height:38px;border-radius:9px;background:${col}18;border:1px solid ${col}30;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">${c.icon}</div>
        <div style="flex:1;min-width:0;">
          <div class="serif" style="font-size:clamp(11px,3.3vw,14px);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.name}</div>
          <div style="font-size:9px;color:${MU};margin-bottom:5px;">${c.addr}${dist!==null?' · <span style="color:'+LB+';">📍 '+distLabel(dist)+'</span>':' · '+c.metro}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            ${c.salles!=null?chip(c.salles+' salle'+(c.salles>1?'s':''),TX,'rgba(255,255,255,0.06)',BD,9):''}
            ${c.tech.slice(0,2).map(t=>chip(t,col,col+'18',col+'35',9)).join('')}
            ${gc>0?chip(gc+' groupe'+(gc>1?'s':''),AC,'rgba(255,63,91,0.1)','rgba(255,63,91,0.25)',9):''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;"><div class="serif" style="font-size:clamp(15px,4.6vw,20px);color:${AC};">${c.films.length}</div><div style="font-size:8px;color:${MU};">films</div></div>
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;background:${S1};border-top:1px solid ${BD};position:fixed;bottom:0;left:0;right:0;z-index:1000;" class="bottom-nav">
    ${[['home','🍿',T('sorties').slice(3)],['cinemas','🏛',T('cinemas').slice(3)],['group','👥',T('groupes').slice(3)],['profile','👤',T('profil').slice(3)]].map(([sc,ic,lb])=>`<div onclick="go('${sc}')" style="flex:1;padding:8px 0 4px;text-align:center;cursor:pointer;opacity:${st.screen===sc?1:0.5};"><div style="font-size:clamp(15px,4.6vw,20px);position:relative;display:inline-block;">${ic}${sc==='group'&&mesGroupes.some(g=>g.confirmed_heure)?'<div style="position:absolute;top:-3px;right:-5px;width:7px;height:7px;border-radius:50%;background:#00c030;border:1.5px solid #07070f;"></div>':''}</div><div style="font-size:9px;color:${MU};">${lb}</div></div>`).join('')}
  </div></div>`;
}

function sCinemaDetail(){
  const cinema=CINEMAS.find(c=>c.id===st.cinema);
  if(!cinema)return '<div>Cinéma introuvable</div>';
  const col=CC[cinema.chain];
  const seancesAuj=(SEANCES[cinema.id]||{});
  const links_=CINEMA_LINKS[cinema.id]||{};
  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;"><div style="padding:52px 18px 10px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div onclick="go('cinemas')" style="width:32px;height:32px;border-radius:50%;background:${S1};border:1px solid ${BD};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">←</div>
      <div style="flex:1;"><div class="serif" style="font-size:17px;">${cinema.name}</div><div style="font-size:clamp(8px,2.5vw,11px);color:${MU};">${cinema.addr} · ${cinema.metro}</div></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:2px;">
      ${links_.maps?`<a href="${links_.maps}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.25);border-radius:10px;padding:8px;font-size:clamp(9px,2.8vw,12px);font-weight:600;color:#4a9eff;text-decoration:none;">${T('yAller')}</a>`:''}
      ${links_.tickets?`<a href="${links_.tickets}" target="_blank" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.25);border-radius:10px;padding:8px;font-size:clamp(9px,2.8vw,12px);font-weight:600;color:${GD};text-decoration:none;">${T('reserver')}</a>`:''}
      <div style="display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.04);border:1px solid ${BD};border-radius:10px;padding:8px 12px;font-size:clamp(9px,2.8vw,12px);color:${MU};">${cinema.salles} 🎬</div>
      ${cinema.tech.slice(0,2).map(t=>`<div style="background:${col}10;border:1px solid ${col}25;border-radius:10px;padding:8px 10px;font-size:clamp(8px,2.5vw,11px);font-weight:600;color:${col};">${t}</div>`).join('')}
    </div>
  </div>
  ${dayPicker()}
  <div style="flex:1;overflow-y:auto;padding:0 18px 80px;">
    ${cinema.films.map(fi=>{
      const f=FILMS[fi.id];if(!f)return'';
      const seances=(seancesAuj[fi.id]||[]).filter(h=>!isPast(h));
      return `<div style="background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;margin-bottom:10px;">
        <div onclick="openFilm('${fi.id}','cinema-detail')" class="tap" style="display:flex;gap:10px;cursor:pointer;margin-bottom:${seances.length?'10px':'0'};">
          <div style="width:46px;height:62px;border-radius:8px;overflow:hidden;background:${f.bg};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,6.2vw,28px);">
            ${posters[fi.id]?'<img src="'+posters[fi.id]+'" style="width:100%;height:100%;object-fit:cover;">':f.e}
          </div>
          <div style="flex:1;">
            <div class="serif" style="font-size:clamp(12px,3.6vw,15px);margin-bottom:3px;">${f.t}</div>
            <div style="font-size:9px;color:${MU};margin-bottom:5px;">${f.g} · ${f.d}${ratings[fi.id]?' · <span style="color:'+GD+';">★ '+ratings[fi.id].note+'</span>':''}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
              ${isVu(fi.id)?chip('✓ Vu',LB,'rgba(0,192,48,0.15)','rgba(0,192,48,0.3)',9):''}
              ${isWatchlist(fi.id)&&!isVu(fi.id)?chip('🔖 Watchlist',GD,'rgba(240,192,96,0.12)','rgba(240,192,96,0.3)',9):''}
            </div>
          </div>
        </div>
        ${seances.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;">${seances.map(h=>`<div onclick="openFilm('${fi.id}','cinema-detail');st.cinema='${cinema.id}';" class="tap" style="background:${S2};border:1px solid ${BD};border-radius:8px;padding:4px 10px;font-size:clamp(9px,2.8vw,12px);font-weight:500;cursor:pointer;">${h}</div>`).join('')}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function sFilm(){
  const f=FILMS[st.film];if(!f)return'<div>Film introuvable</div>';
  const cinemaFilm=CINEMAS.filter(c=>c.films.some(fi=>fi.id===st.film));
  const wantList=getWantToSee();
  const isWanted=wantList.includes(st.film);
  const hasSortie=sortiesPubliques.some(s=>s.film_id===st.film);
  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <!-- Hero poster (LBD-style full bleed) -->
    <div style="height:240px;position:relative;overflow:hidden;background:${f.bg};">
      ${posters[st.film]?'<img src="'+posters[st.film]+'" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.5);">':''}
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,0.2),rgba(7,7,15,0.97));"></div>
      <!-- Back button -->
      <div onclick="${st.filmSrc==='cinema-detail'?`go('cinema-detail')`:`go('home')`}" style="position:absolute;top:52px;left:18px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);">←</div>
      <!-- Want to see heart -->
      <div onclick="toggleWantToSee('${st.film}')" style="position:absolute;top:52px;right:18px;width:32px;height:32px;border-radius:50%;background:${isWanted?'rgba(255,63,91,0.3)':'rgba(0,0,0,0.4)'};border:1px solid ${isWanted?AC:'rgba(255,255,255,0.1)'};display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);font-size:16px;">${isWanted?'❤️':'🤍'}</div>
      <!-- Film info overlay -->
      <div style="position:absolute;bottom:18px;left:18px;right:18px;">
        <div style="font-size:9px;color:${GD};letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">${f.g}</div>
        <div class="serif" style="font-size:clamp(20px,6.2vw,28px);line-height:1.2;margin-bottom:8px;">${f.t}</div>
        <!-- Inline rating (LBD-style stars) -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          ${ratings[st.film]?`<div>${starsHTML(ratings[st.film].note,5,14)}</div><span style="font-size:clamp(9px,2.8vw,12px);color:${MU};">TMDB ${ratings[st.film].note}/10</span>`:''}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${chip('⏱ '+f.d,TX,'rgba(255,255,255,0.08)',BD,9)}
          ${chip('🎭 '+f.dir,TX,'rgba(255,255,255,0.08)',BD,9)}
          ${isVu(st.film)?chip('✓ Vu',LB,'rgba(0,192,48,0.18)','rgba(0,192,48,0.35)',9):''}
          ${isWatchlist(st.film)&&!isVu(st.film)?chip('🔖 Watchlist',GD,'rgba(240,192,96,0.14)','rgba(240,192,96,0.35)',9):''}
        </div>
        ${trailers[st.film]?`<div style="margin-top:8px;"><a href="https://www.youtube.com/watch?v=${trailers[st.film]}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,0,0.15);border:1px solid rgba(255,0,0,0.3);border-radius:9px;padding:5px 12px;font-size:clamp(8px,2.5vw,11px);font-weight:600;color:#ff4444;text-decoration:none;">▶ Bande-annonce</a></div>`:''}
      </div>
    </div>

    <!-- Synopsis -->
    <div style="padding:16px 18px 0;">
      <p style="font-size:clamp(10px,3vw,13px);line-height:1.7;color:${MU};margin-bottom:16px;">${f.s}</p>
    </div>

    <!-- Sortie dispo banner -->
    ${hasSortie?`<div onclick="st.homeTab='sorties';go('home')" style="margin:0 18px 14px;padding:10px 14px;border-radius:12px;background:rgba(255,63,91,0.08);border:1px solid rgba(255,63,91,0.2);font-size:clamp(9px,2.8vw,12px);color:${MU};cursor:pointer;display:flex;align-items:center;justify-content:space-between;">
      <span>🍿 <span style="color:${TX};font-weight:600;">${sortiesPubliques.filter(s=>s.film_id===st.film).length} sortie${sortiesPubliques.filter(s=>s.film_id===st.film).length>1?'s':''} publique${sortiesPubliques.filter(s=>s.film_id===st.film).length>1?'s':''}</span> pour ce film</span>
      <span style="color:${AC};">→</span>
    </div>`:''}

    <!-- Séances -->
    ${dayPicker()}
    <div style="padding:0 18px 20px;">
      ${(()=>{
        const seancesJour=cinemaFilm.map(c=>{const s=(SEANCES[c.id]||{})[st.film]||[];return{cinema:c,seances:s.filter(h=>!isPast(h))};}).filter(x=>x.seances.length);
        if(!seancesJour.length)return `<div style="text-align:center;padding:20px 0;color:${MU};font-size:clamp(10px,3vw,13px);">${T('aucuneSeanceJour')}</div>`;
        return `<div style="margin-bottom:18px;">
          <div style="font-size:clamp(8px,2.5vw,11px);color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Séances</div>
          ${seancesJour.map(({cinema:c,seances})=>`<div style="margin-bottom:10px;">
            <div style="font-size:clamp(9px,2.8vw,12px);font-weight:500;margin-bottom:6px;color:${CC[c.chain]||MU};">${c.name}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">${seances.map(h=>`<div onclick="createSortieScroll=0;st.newSortie={film:'${st.film}',cinema:'${c.id}',heure:'"+h+"'};st.screen='create-sortie';render()" class="tap" style="background:${S2};border:1px solid ${BD};border-radius:8px;padding:5px 12px;font-size:clamp(10px,3vw,13px);font-weight:500;cursor:pointer;">${h}</div>`).join('')}</div>
          </div>`).join('')}
        </div>`;
      })()}
      <button onclick="createSortieScroll=0;st.newSortie={film:'${st.film}'};st.screen='create-sortie';render()" style="width:100%;background:${AC};border:none;color:#fff;border-radius:14px;padding:14px;font-size:clamp(12px,3.6vw,15px);font-weight:600;cursor:pointer;">Rejoindre le groupe →</button>
    </div>
  </div>`;
}
</script>
<script>
function msgHTML(m){
  const me=m.pseudo===st.pseudo;
  const t=new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(m.pseudo==='📢 CinéMatch'){return `<div style="text-align:center;margin:10px 0;"><div style="display:inline-block;background:rgba(0,192,48,0.08);border:1px solid rgba(0,192,48,0.25);border-radius:12px;padding:7px 14px;font-size:clamp(9px,2.8vw,12px);color:#00c030;max-width:90%;">${m.texte}</div><div style="font-size:9px;color:${MU};margin-top:3px;">${t}</div></div>`;}
  return `<div style="display:flex;gap:8px;margin-bottom:6px;align-items:flex-end;flex-direction:${me?'row-reverse':'row'};">
    ${avatarEl(m.pseudo,26)}
    <div style="max-width:195px;">
      <div style="font-size:8px;color:${MU};margin-bottom:3px;text-align:${me?'right':'left'};">${m.pseudo} · ${t}</div>
      <div style="padding:8px 12px;border-radius:14px;font-size:clamp(10px,3vw,13px);line-height:1.55;word-break:break-word;background:${me?AC:S2};border-bottom-left-radius:${me?'14px':'3px'};border-bottom-right-radius:${me?'3px':'14px'};">${m.texte}</div>
      <div data-reactions="${m.id}" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;justify-content:${me?'flex-end':'flex-start'};">${reactionsHTML(m.id)}</div>
    </div>
  </div>`;
}

function renderMembresDOM(){
  const el=document.getElementById('membres-list');if(!el)return;
  const STATUTS={yes:{e:'✅',l:T('jeViens'),c:'rgba(0,192,48,0.15)',b:'rgba(0,192,48,0.4)'},maybe:{e:'❓',l:T('peutEtre'),c:'rgba(255,200,0,0.1)',b:'rgba(255,200,0,0.3)'},no:{e:'❌',l:T('jePeuxPas'),c:'rgba(255,63,91,0.08)',b:'rgba(255,63,91,0.25)'}};
  const oui=membresData.filter(m=>m.statut==='yes').length,peut=membresData.filter(m=>m.statut==='maybe'||!m.statut).length,non=membresData.filter(m=>m.statut==='no').length;
  const moi=membresData.find(m=>m.pseudo===st.pseudo);const monStatut=moi?.statut||'maybe';
  const statutPicker=`<div style="margin-bottom:14px;background:${S1};border:1px solid ${BD};border-radius:14px;padding:12px;"><div style="font-size:9px;color:${MU};letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">${T('presence')}</div><div style="display:flex;gap:6px;">${Object.entries(STATUTS).map(([k,v])=>`<div onclick="setStatut('${k}')" style="flex:1;text-align:center;padding:8px 4px;border-radius:10px;cursor:pointer;background:${monStatut===k?v.c:'rgba(255,255,255,0.02)'};border:1px solid ${monStatut===k?v.b:BD};"><div style="font-size:clamp(13px,4vw,17px);">${v.e}</div><div style="font-size:9px;color:${MU};margin-top:3px;">${v.l}</div></div>`).join('')}</div><div style="display:flex;gap:8px;margin-top:10px;justify-content:center;"><span style="font-size:clamp(8px,2.5vw,11px);color:${LB};">✅ ${oui}</span><span style="font-size:clamp(8px,2.5vw,11px);color:${MU};">❓ ${peut}</span><span style="font-size:clamp(8px,2.5vw,11px);color:${AC};">❌ ${non}</span></div></div>`;
  el.innerHTML=statutPicker+membresData.map(m=>{
    const s=STATUTS[m.statut||'maybe'];const cinema_pref=m.cinema_pref?CINEMAS.find(c=>c.id===m.cinema_pref)?.name:'';
    const vote_heure=Object.entries(votesData).find(([k,vs])=>vs.some(v=>v.pseudo===m.pseudo));const voteLabel=vote_heure?vote_heure[0].split(' ')[1]:'';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid ${BD};cursor:pointer;" onclick="${m.pseudo===st.pseudo?`go('profile')`:`openMemberProfile('${m.pseudo}')`}">
      ${avatarEl(m.pseudo,42)}
      <div style="flex:1;"><div style="font-size:clamp(11px,3.3vw,14px);font-weight:500;margin-bottom:3px;">${m.pseudo}${m.pseudo===st.pseudo?` <span style="color:${LB};font-size:clamp(8px,2.5vw,11px);">Vous</span>`:''}</div><div style="display:flex;gap:4px;flex-wrap:wrap;"><span style="font-size:9px;padding:1px 6px;border-radius:8px;background:${s.c};border:1px solid ${s.b};">${s.e} ${s.l}</span>${cinema_pref?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid ${BD};color:${MU};">🏛 ${cinema_pref}</span>`:''}${voteLabel?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,63,91,0.1);border:1px solid rgba(255,63,91,0.3);color:${AC};">🕐 ${voteLabel}</span>`:''}</div></div>
      ${m.pseudo!==st.pseudo?`<span style="color:${MU};font-size:clamp(12px,3.6vw,15px);">›</span>`:''}
    </div>`;
  }).join('');
}

function renderVotesDOM(){
  const el=document.getElementById('votes-container');if(!el||!st.film)return;
  const tousCinemas=CINEMAS.filter(c=>c.films.some(f=>f.id===st.film));
  const cinemasActifs=st.cinema?tousCinemas.filter(c=>c.id===st.cinema):tousCinemas;
  const heuresVues=new Set(),allSeances=[];
  cinemasActifs.forEach(c=>{((SEANCES[c.id]||{})[st.film]||[]).forEach(h=>{if(!heuresVues.has(h)){heuresVues.add(h);allSeances.push(h);}});});
  allSeances.sort();
  if(!allSeances.length){el.innerHTML=`<div style="text-align:center;padding:30px;color:${MU};font-size:clamp(10px,3vw,13px);">${T('aucuneSeanceJour')}</div>`;return;}
  let maxVotes=0,bestHeure=null;
  allSeances.forEach(h=>{const k=st.date+' '+h;const n=(votesData[k]||[]).length;if(n>maxVotes){maxVotes=n;bestHeure=h;}});
  const majority=membresData.length>0&&maxVotes>=Math.ceil(membresData.length/2);
  const confirmBtn=(majority&&bestHeure&&!groupeInfo.confirmed_heure)?`<div onclick="confirmerPlan('${st.cinema}','${bestHeure}','${st.date}')" style="margin-bottom:12px;padding:12px 14px;border-radius:14px;background:rgba(0,192,48,0.12);border:1px solid rgba(0,192,48,0.4);cursor:pointer;text-align:center;"><div style="font-size:clamp(11px,3.3vw,14px);font-weight:700;color:${LB};">${T('cestDecide')}</div><div style="font-size:clamp(8px,2.5vw,11px);color:${MU};margin-top:2px;">Confirmer ${bestHeure} · ${maxVotes} vote${maxVotes>1?'s':''}</div></div>`:'';
  el.innerHTML=confirmBtn+allSeances.map(h=>{
    const past=isPast(h);const k=st.date+' '+h;const voters=votesData[k]||[];const voted=voters.some(v=>v.pseudo===st.pseudo);
    return `<div onclick="${past?'':"voter('"+h+"')"}" class="${past?'':'tap'}" style="opacity:${past?'0.4':'1'};background:${voted?'rgba(255,63,91,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${voted?AC:BD};border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:${past?'default':'pointer'};display:flex;align-items:center;gap:10px;">
      <div style="flex:1;"><div style="font-size:clamp(15px,4.6vw,20px);font-weight:600;color:${voted?AC:past?MU:TX};">${h}${past?`<span style="font-size:9px;">${T('seancesPassee')}</span>`:''}</div><div style="font-size:clamp(8px,2.5vw,11px);color:${MU};margin-top:2px;">${voters.length} vote${voters.length!==1?'s':''}</div></div>
      <div style="display:flex;">${voters.slice(0,5).map(v=>`<div style="width:22px;height:22px;border-radius:50%;background:${pseudoColor(v.pseudo)};border:2px solid ${BG};display:flex;align-items:center;justify-content:center;font-size:clamp(9px,2.8vw,12px);margin-left:-4px;">${v.pseudo===st.pseudo?st.avatar:pseudoInitial(v.pseudo)}</div>`).join('')}</div>
      <div style="width:28px;height:28px;border-radius:50%;background:${voted?AC:'rgba(255,255,255,0.06)'};border:1px solid ${voted?AC:BD};display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.6vw,15px);">${voted?'✓':'+'}</div>
    </div>`;
  }).join('');
}

function sCreateSortie(){
  const ns=st.newSortie||{};
  const isPublic=ns.isPublic!==undefined?ns.isPublic:null;
