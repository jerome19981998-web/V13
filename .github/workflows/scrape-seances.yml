name: Scrape Séances

on:
  schedule:
    - cron: '0 7 * * *'   # 8h heure de Paris (UTC+1)
    - cron: '0 19 * * *'  # 20h heure de Paris (UTC+1)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no push to Supabase)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json
      - name: Install dependencies
        working-directory: scraper
        run: npm install
      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPA_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scraper.js
      - name: Done
        run: echo "✅ Séances mises à jour — $(date '+%d/%m/%Y %H:%M')"
