name: 🎬 CinéMatch — Mise à jour séances
on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (affiche sans écrire en base)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    name: Scraping AlloCiné → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: 📦 Installer les dépendances
        working-directory: scraper
        run: npm install

      # ← NOUVEAU : installe Chromium pour Playwright
      - name: 🌐 Installer Chromium (Playwright)
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: 🔍 Scraping + mise à jour Supabase
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            node scraper.js --dry-run
          else
            node scraper.js
          fi

      - name: ✅ Résumé
        if: success()
        run: echo "✅ Séances mises à jour — $(date '+%d/%m/%Y %H:%M')"

      - name: ❌ Notification d'échec
        if: failure()
        run: echo "❌ Le scraping a échoué — vérifier les logs"
